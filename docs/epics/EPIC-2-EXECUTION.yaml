# ───────────────────────────────────────────────────────────────────────────
# DECISION LOG (epic-level decisions taken at kickoff)
# ───────────────────────────────────────────────────────────────────────────
decision_log:
  - id: ED1
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Decompor em 11 stories (vs 9 do PRD §6)"
    rationale: >
      PRD §6 Epic 2 propõe 9 stories abstractas. Plan v0.1 (2026-05-06)
      decompõe em 11 mais granulares: separa benchmark suite (2.10) de
      pipeline core (2.5), e adiciona dashboards (2.11) como peça final.
      Granularidade L max por story alinha com diretiva "entrega incremental".
    alternatives_considered:
      - "Manter 9 stories do PRD (rejeitado: 2.4 Classifier seria L+ misturado com 2.5 Executor)"
      - "Quebrar em 13+ stories (rejeitado: overhead de validação @po sem ganho real)"

  - id: ED2
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Story 2.1 = validar schema existente (não criar do zero)"
    rationale: >
      Schema agent já existe em packages/db/src/schema/agent.ts (Story 1.3
      bootstrap criou 27 tabelas, incluindo agent_runs/intent_classifications/
      agent_reverse_ops/agent_quotas). RLS já tem 4 policies por tabela em
      0001_rls_policies.sql linhas 266-340+. Story 2.1 foca em (a) RLS coverage
      gate verificação, (b) ajustes mínimos vs db-schema.md §4.4, (c) testes
      cross-household, (d) immutability de agent_runs.
    evidence: "ls packages/db/src/schema/agent.ts + grep agent_runs em 0001_rls_policies.sql"

  - id: ED3
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Reuse @vercel/otel da Story 1.7 (não introduzir novo OTel SDK)"
    rationale: >
      Story 1.7 padronizou em @vercel/otel (Sentry sourcemap upload confirmado
      em deploy 08c0b44 — Node + Edge + Client). Epic 2 usa o mesmo wrapper
      para instrumentação do pipeline 3-stage. Handoff
      mj-handoff-1.7-post-deploy-grafana-20260508 explicitamente recomendou
      "tomar nota para Epic 2 (Cérebro AI) instrumentar o pipeline 3-stage
      usando o mesmo wrapper".
    refs: ["docs/runbooks/observability-setup.md", "Story 1.7 v1.4 Done"]

  - id: ED4
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Manter dual-emission Sentry+OTel (não migrar para Sentry OTLP nativo)"
    rationale: >
      Story 1.7 descobriu Sentry OTLP nativo (endpoint
      o4510848200278016.ingest.de.sentry.io/api/.../integration/otlp) mas
      decidiu manter dual-emission (Sentry para errors via SDK, Grafana para
      tudo via OTel). Re-avaliar duplicação em Story 2.11 se houver
      observability fatigue.
    refs: ["mj-handoff-secrets-configured-20260507 line 157"]

  - id: ED5
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Hard-cap 5 ops/prompt (DP3: B) parametrizável via env"
    rationale: >
      Recomendação Morgan (plan §8 DP3 B). >5 ops indica intent ambíguo ou
      abuso. Cobre 99% casos reais ("compras hoje: pão, leite, ovos, queijo,
      fruta"). Threshold em env (`AGENT_MAX_OPS_PER_PROMPT=5`) permite
      ajuste sem deploy.
    aguarda_validacao_eurico: true

  - id: ED6
    date: 2026-05-08
    by: pm (Morgan)
    decision: "Provider abstraction com fallback OpenAI flag-gated Fase 2 (DP4: B)"
    rationale: >
      MVP usa Anthropic Sonnet exclusivo (KISS, prompt caching nativo). Story 2.2
      entrega abstraction provider-agnostic; Story 2.5 usa Sonnet. Fallback OpenAI
      em outage = Fase 2 atrás de feature flag, activado por circuit breaker.
    aguarda_validacao_eurico: true

