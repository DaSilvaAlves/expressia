# ───────────────────────────────────────────────────────────────────────────
# STORIES BREAKDOWN (alinhado com plan §5 — 11 stories)
# ───────────────────────────────────────────────────────────────────────────
stories:
  - id: "2.1"
    title: "Schema agent + migrations + RLS coverage"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["epic-1.3", "epic-1.4", "epic-1.5"]
    blocked_by_external: []
    scope_summary: >
      Tabelas `agent_runs`, `intent_classifications`, `agent_reverse_ops`,
      `agent_quotas` JÁ desenhadas em packages/db/src/schema/agent.ts (criadas
      no bootstrap Story 1.3). Story 2.1 valida: (a) RLS coverage gate verde
      (4 policies × 4 tabelas = 16 policies), (b) ajustes mínimos derivados
      do plan §4 + db-schema.md §4.4, (c) testes RLS cross-household via
      Testcontainers harness (reuse da Story 1.4), (d) immutability de
      agent_runs (REVOKE UPDATE/DELETE).
    mapping_prd: ["FR3", "NFR5", "NFR9"]
    artefacts_expected:
      - "Migration adicional se gaps detectados (0005_agent_*.sql)"
      - "packages/db/test/rls-agent.test.ts (4 cenários cross-household)"
      - "Story file 2.1.agent-schema-rls.md em docs/stories/active/"

  - id: "2.2"
    title: "Package packages/agent + provider abstraction"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.1"]
    blocked_by_external: ["EB1", "EB2"]
    scope_summary: >
      Criar package `packages/agent` (não existe ainda). Adaptadores tipados
      Anthropic + OpenAI com retry/timeout/circuit-breaker, secrets via env,
      OTel instrumentation usando wrapper `@vercel/otel` herdado da Story 1.7.
      Provider interface agnostic (DP4 recomendação B).
    mapping_prd: ["NFR21", "NFR11 (excepção documentada §12.2)"]
    architectural_decisions:
      - "Provider interface deve ser provider-agnostic para suportar fallback OpenAI futuro"
      - "Anthropic prompt caching activo (DP5: cache standard 5min, ~5k token budget)"
      - "Reuse `@vercel/otel` da Story 1.7 (não introduzir novo SDK OTel)"

  - id: "2.3"
    title: "Tool Registry contract + 2 tools mínimas"
    estimate: L
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.2"]
    blocked_by_external: []
    scope_summary: >
      Definir `ToolDefinition<I,O>` com Zod schemas, `execute(input,ctx,tx)` +
      `reverse(output)`. ctx.householdId DERIVADO do JWT (R4 mitigation).
      Implementar 2 tools mínimas: `create_task_minimal` + `query_tasks_minimal`
      (DP6: A). Tool definitions JSON ≤5k tokens (DP5 enforce).
      Tabela `tasks` mínima em packages/db/src/schema/tasks.ts (Epic 3 estende sem rework).
    mapping_prd: ["FR1", "FR2", "CON5"]
    risk_mitigation: ["R4 (RLS leak via tool execute)"]

  - id: "2.4"
    title: "Classifier PT-PT (GPT-4o-mini) + Zod gate"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.2"]
    blocked_by_external: ["EB2"]
    scope_summary: >
      Implementar classifier com `ClassificationSchema` (intents[], confidence,
      language='pt-PT', needs_confirmation). Retry temperature=0 em deriva
      de schema. Fallback `unknown` em invalid output. Mensagens erro PT-PT.
    mapping_prd: ["FR1", "FR4", "CON3"]
    risk_mitigation: ["R1 (precisão classifier <90%)"]

  - id: "2.5"
    title: "Planner + Executor (Sonnet) + atomicidade Postgres"
    estimate: L
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.3", "2.4"]
    blocked_by_external: ["EB1"]
    scope_summary: >
      Pipeline tool calling Sonnet → wrapper transacção Postgres. BEGIN tx,
      for each tool_call: execute + insert agent_reverse_ops {expires_at = now() + 30s},
      COMMIT. Anthropic prompt cache no system prompt + tool definitions.
      Hard-cap 5 ops/prompt (DP3: B). Test integration "explode tool 2 de 3"
      → rollback as 3.
    mapping_prd: ["FR2", "FR4", "FR6", "NFR1"]
    risk_mitigation: ["R2 (latência p95)", "R7 (cache hit rate)", "R9 (atomicidade falha)"]

  - id: "2.6"
    title: "Endpoint POST /api/agent/prompt autenticado"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.5"]
    blocked_by_external: ["EB3"]
    scope_summary: >
      Route handler em apps/web/src/app/api/agent/prompt/route.ts. RLS context
      via JWT (reuse pattern Story 1.6 /api/me). Rate limit Upstash. OTel traces
      + métricas. Error handling padronizado PT-PT (helper apiError reuse Story 1.6).
      Resposta { runId, summary[], undoToken, expiresAt }.
    mapping_prd: ["FR1", "FR2", "NFR1", "NFR5", "NFR13"]
    architectural_decisions:
      - "Reuse pattern auth + RLS de /api/me (Story 1.6 — provado em prod)"
      - "Rate limit por household_id (não user_id) — alinha com quota model"

  - id: "2.7"
    title: "Preview-then-confirm flow (FR4)"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.6"]
    blocked_by_external: []
    scope_summary: >
      Quando confidence<0,70 OU `users_prefs.always_preview=true` (DP2: C):
      gerar plan + previewToken (HMAC, 5min TTL) e endpoint
      POST /api/agent/confirm-preview/{token}. Schema: adicionar coluna
      `users_prefs.always_preview boolean default false`.
    mapping_prd: ["FR4"]

  - id: "2.8"
    title: "Undo mechanism (FR6) + endpoint"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.6"]
    blocked_by_external: ["EB4"]
    scope_summary: >
      POST /api/agent/undo/{runId}. Validação ownership (RLS) + expires_at > now()
      + reverted_at IS NULL. BEGIN tx → execute reverse_ops em ordem reversa →
      COMMIT. Update agent_reverse_ops.reverted_at + agent_runs.status='reverted'.
      Inngest cleanup_expired_reverse_ops job (cron diário). Modelo: 30s só (DP1: A).
    mapping_prd: ["FR6"]
    risk_mitigation: ["R5 (undo race condition)"]

  - id: "2.9"
    title: "Cost router + cache + quotas"
    estimate: M
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.6"]
    blocked_by_external: ["EB3"]
    scope_summary: >
      Upstash cache 5min (key=sha256(prompt+household)). Routing especial
      `consultar_dados` → direct DB query sem executor (Architecture §4.6).
      Atomic quota increment em agent_quotas. Hard-stop 110% com mensagem
      PT-PT ("Limite de prompts atingido. Próxima janela em N min."). Trial=Família
      quota=Família (DP7: A).
    mapping_prd: ["NFR20"]
    risk_mitigation: ["R3 (custo LLM > 35% MRR)", "R7 (cache hit rate)"]

  - id: "2.10"
    title: "LLM Benchmark Suite (200 prompts PT-PT)"
    estimate: L
    executor: "@dev"
    quality_gate: "@qa"
    depends_on: ["2.5"]
    blocked_by_external: ["EB1", "EB2"]
    scope_summary: >
      Criar package `packages/agent-bench`. Dataset 200 prompts curated PT-PT:
      estratificar por intent (FR1: 6 intents), dialecto regional (Norte/Lisboa/Açores),
      complexidade (single-intent → multi-intent até 5). Harness precision/recall
      por intent. CI nightly (.github/workflows/agent-bench.yaml). Alarme <88%.
      Revisão @qa antes de aceitar como ground truth (R8 mitigation).
    mapping_prd: ["NFR1 (p95<6s)", "Epic 2 AC5", "Epic 2 AC6 (precisão >=90%)"]
    risk_mitigation: ["R1", "R8 (dataset enviesado)"]

  - id: "2.11"
    title: "Observability dashboards Agent Health"
    estimate: S
    executor: "@dev"
    quality_gate: "@architect"
    depends_on: ["2.6", "2.10"]
    blocked_by_external: []
    scope_summary: >
      Painel Grafana "Agent Health" (latência p95, custo eur_per_household_24h,
      intent_accuracy nightly, RLS denials, cache hit rates Upstash + Anthropic).
      Reuse infra da Story 1.7 (OTel + Grafana eu-west-6). Alarmes:
      p95>10s, custo>35% MRR rolling 7d, accuracy<88%. Dashboard JSON
      versionado em docs/dashboards/.
    mapping_prd: ["NFR13", "NFR14", "NFR15"]

