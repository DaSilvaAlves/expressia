epic_id: 2
epic_title: "Cérebro AI Multi-Intent"
epic_goal: >
  Pipeline 3 estágios (Classifier GPT-4o-mini → Planner+Executor Claude Sonnet
  → atomicidade Postgres) capaz de aceitar prompt PT-PT, executar até 5
  intents simultâneas em transacção atómica, com preview-then-confirm para
  confidence < 0,70, undo de 30s e telemetria fim-a-fim em Grafana.

mvp_phase: 1
created: 2026-05-08T13:00:00+01:00
created_by: pm (Morgan)
plan_doc: docs/epics/epic-2-cerebro-ai-multi-intent.md
plan_version: v0.1 (2026-05-06)
prd_section: "§6 Epic 2 (linhas 264-287)"
architecture_section: "§4 Arquitectura do Cérebro AI (linhas 268-438)"

