    M: 4   # 3.2, 3.3, 3.7, 3.8
    L: 2   # 3.4, 3.5
  total_effort: "≈ 8 stories — 2S + 4M + 2L"
  estimated_sprints: "5-6 sprints (1 dev) OU 3-4 sprints (2 devs paralelo após 3.2)"
  rebaseline_note: >
    Handoff Gage estimou "1S + 4M + 2L = 7-9 sprints". Pós cross-confirm
    schema/RLS/Inngest/toolRegistry pre-existentes, Story 3.1 desce de M
    para S (cargo de validation+tests, não de criar). Total 2S+4M+2L =
    5-6 sprints (1 dev). Saving ~1-2 sprints vs estimate original.

# ───────────────────────────────────────────────────────────────────────────
# SUCCESS CRITERIA (epic-level — alinhados com PRD §6.3 ACs)
# ───────────────────────────────────────────────────────────────────────────
success_criteria:
  prd_acceptance_criteria:
    - id: AC1
      criterion: "Criar tarefa via UI ou via cérebro tem mesmo resultado persistido"
      validates_in_story: "3.8 (tools cérebro) + 3.2 (API) + 3.3/3.4/3.5 (UI calls API)"

    - id: AC2
      criterion: "Recorrência semanal/mensal/dias-úteis funciona em horizonte de 90 dias"
      validates_in_story: "3.7 (Inngest function + rrule.js + 90d horizon DP6: A)"

    - id: AC3
      criterion: "Drag-and-drop em Kanban e calendário persiste sem reload"
      validates_in_story: "3.4 (Kanban) + 3.5 (calendário) — optimistic UI DP7: A"

    - id: AC4
      criterion: "Tarefa criada num household não é visível noutro household (RLS)"
      validates_in_story: "3.1 (Testcontainers cross-household 20 cenários)"

  operational_metrics:
    - "Latência p95 API /tasks list (50 items + filters) ≤ 200ms (NFR1 sub-budget)"
    - "Drag-and-drop PATCH ≤ 300ms p95 (UX feel responsive)"
    - "Inngest generate-recurring-tasks duração ≤ 60s para 1k recurrences activas"
    - "Cache hit rate Upstash em listar_tarefas tools cérebro ≥ 20% (re-avaliar 7d)"
    - "Zero RLS leaks em testes integration cross-household tarefas (NFR5)"
