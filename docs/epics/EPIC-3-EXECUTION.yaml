    - "Story 3.5 (calendário week navigation + DST handling visual)"
    - "Story 3.6 (TagPicker autocomplete + cor selection UX)"

# ───────────────────────────────────────────────────────────────────────────
# DECISION LOG (epic-level decisions taken at kickoff)
# ───────────────────────────────────────────────────────────────────────────
decision_log:
  - id: ED1
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Manter 8 stories conforme PRD §6.3 (não decompor mais granular nem agregar)"
    rationale: >
      PRD §6.3 propõe 8 stories. Análise pós cross-confirm não revela necessidade
      de re-decomposição — Stories 3.1 (S), 3.6 (S) já são granulares; Stories
      3.4/3.5 (L) são UI complexo que beneficia de single story focused (vs split
      em "Kanban backend + Kanban UI" que adicionaria overhead @po + handoffs).

  - id: ED2
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Story 3.1 = validation + RLS Testcontainers + seed defaults (NÃO criar schema)"
    rationale: >
      Cross-confirm revelou packages/db/src/schema/tasks.ts:59-221 já contém
      tasks + task_recurrences + tags + task_tags COMPLETE. tenancy.ts:152-173
      tem kanban_columns. 0001_rls_policies.sql:150-399 tem 20 policies.
      0000_initial_schema.sql:474-475 aplica FK circular. Story 3.1 redefinida
      para validation pass + Testcontainers cross-household + seed default
      kanban_columns per household. Estimate desce M→S.
    evidence:
      - "packages/db/src/schema/tasks.ts:59-221"
      - "packages/db/src/schema/tenancy.ts:152-173"
      - "packages/db/migrations/0001_rls_policies.sql:150-399"
      - "packages/db/migrations/0000_initial_schema.sql:474-475"
    invalidates_handoff_assumption: "mj-handoff-epic3-kickoff-20260515.yaml linha 158-170"

  - id: ED3
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Reuse Inngest setup Story 2.8 para Story 3.7 (não criar provider novo)"
    rationale: >
      apps/web/src/lib/inngest/client.ts + apps/web/src/app/api/inngest/route.ts
      JÁ EXISTEM (Story 2.8 Done v1.4). Story 3.7 só adiciona InngestFunction
      generate-recurring-tasks em apps/web/src/lib/inngest/functions/.
      Inngest workspace EU Frankfurt (EB4) provavelmente já provisionado durante
      Story 2.8 push — verificar pre-flight Story 3.7.
    evidence: "ls apps/web/src/lib/inngest/ + apps/web/src/app/api/inngest/route.ts"

  - id: ED4
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Reuse toolRegistry Story 2.3 para Story 3.8 (registar 4 tools novos sem rework)"
    rationale: >
      packages/tools/src/registry.ts existe e é estável. Story 3.8 cria tools
      em packages/tools/src/tasks/{criar,completar,listar,listar_atrasadas}.ts e
      regista no index. Pattern reverse_op herdado de Story 2.8.
    evidence: "packages/tools/src/registry.ts + planner-executor uses (8+ files)"

  - id: ED5
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Drag-drop library = @dnd-kit/core + @dnd-kit/sortable (DP1: A)"
    rationale: >
      docs/front-end-spec.md:1510 já indicado pre-Epic 3. A11y por defeito
      (vs react-dnd legacy). Mantém consistência se outras vistas drag forem
      adicionadas Epic 5+.
    aguarda_validacao_eurico: false  # já decidido em front-end-spec
    confirmed_by: "front-end-spec.md:1510"

  - id: ED6
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Calendário week-view = custom 7-col grid + @dnd-kit (DP2: A — DECISÃO NEW)"
    rationale: >
      docs/front-end-spec.md:1511 indica react-day-picker MAS essa lib é date
      picker (mês/ano), NÃO suporta week-view-with-drag-between-days. Epic 3
      Story 3.5 precisa de UX week-view + drag, não date selection.
      Recomendação A: custom 7-col CSS grid + @dnd-kit (reuse Story 3.4 lib +
      zero new dep + UX consistency entre Kanban e calendário).
      Alternativa B: react-big-calendar (dep extra ~80kb mas battle-tested).
      Alternativa C: FullCalendar — REJECT (license commercial).
    aguarda_validacao_eurico: true
    invalidates_assumption: "front-end-spec.md:1511 não cobre week-view scope Story 3.5"

  - id: ED7
    date: 2026-05-15
    by: pm (Morgan)
    decision: "RRULE library = rrule.js (DP3: A)"
    rationale: >
      Schema tasks.ts:7-8 já documenta "Recorrência usa formato iCal RRULE
      (`recurrence_rule`) — biblioteca `rrule` no client/server". iCal RFC 5545
      é standard. Suporta presets PRD §6.3 + RRULE livre via custom_rrule field.
    evidence: "packages/db/src/schema/tasks.ts:7-8"
    aguarda_validacao_eurico: false  # arquitectura schema já implica

  - id: ED8
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Default kanban_columns per household = 'A fazer / Em curso / Concluído' (DP4: A)"
    rationale: >
      UX onboarding zero-config. PT-PT explícito. is_done_column=true em última.
      Implementação via SQL function seed_household_defaults() chamada em
      accept_invite() existing trigger OR migration 0009_kanban_seed.sql com
      INSERT per household existente + trigger AFTER INSERT em households.
      Story 3.1 decide implementação concreta.
    aguarda_validacao_eurico: true

  - id: ED9
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Tools cérebro Story 3.8 scope = minimal (DP5: A)"
    rationale: >
      Precedente Story 2.3 DP6 (tools mínimas: create_task_minimal +
      query_tasks_minimal). criar_tarefa minimal = title + dueDate + priority
      opcional. Iterar full features (assignee, tags, kanban_column inline)
      em Epic 5+ quando UI Tarefas estável e telemetria mostre demand.
    aguarda_validacao_eurico: true

  - id: ED10
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Recurrence horizon = 90 dias (DP6: A — defer pre-flight, mas spec PRD)"
    rationale: "PRD §6.3 AC2 spec explícito 90 dias horizon. Sem alternativa viável."
    aguarda_validacao_eurico: false  # PRD spec authoritative

  - id: ED11
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Drag-and-drop persistence = optimistic UI + revert on error (DP7: A)"
    rationale: >
      UX padrão moderno (Linear, Notion, Trello). Latência percebida ≈ 0ms.
      Revert visual + toast erro PT-PT em caso de falha PATCH. NIT-002-NB Epic 2
      OTel counter rls_denials cobre observability se RLS leak detectado.
    aguarda_validacao_eurico: false  # padrão indústria

  - id: ED12
    date: 2026-05-15
    by: pm (Morgan)
    decision: "Tags inline criar = autocomplete + 'Criar nova tag' option (DP8: A)"
    rationale: >
      UX padrão moderno (GitHub labels, Linear tags, Notion). Modal dedicado
      adicionaria friction. Page /configuracoes/tags cobre CRUD avançado
      (rename, delete, merge).
    aguarda_validacao_eurico: false  # padrão indústria

# ───────────────────────────────────────────────────────────────────────────
# RISKS (R1-R8)
# ───────────────────────────────────────────────────────────────────────────
risks:
  - id: R1
    title: "Kanban drag-and-drop performance degradation com >100 tasks"
    probability: "Média"
    impact: "Alto"
    mitigation: >
      Story 3.4 implementa virtual scroll (@tanstack/react-virtual se necessário)
      + batch PATCH (debounce 200ms para reorder intra-coluna). Benchmark com
      seed 200 tasks pre-merge.
    affects_stories: ["3.4"]

  - id: R2
    title: "Recurrence generation duplicação (Inngest at-least-once delivery)"
    probability: "Média"
    impact: "Alto"
    mitigation: >
      Idempotent key (template_task_id, target_date) no INSERT generate-recurring-tasks
      + ON CONFLICT DO NOTHING. Cron diário com lock distribuído via Inngest
      step.run() que é idempotent por step ID.
    affects_stories: ["3.7"]

  - id: R3
    title: "RRULE timezone edge cases DST PT (2x/ano: Mar/Out)"
    probability: "Baixa"
    impact: "Médio"
    mitigation: >
      Story 3.7 tests Vitest cobrem casos DST explícitos (last Sunday Mar +
      last Sunday Oct para 2026-2030). Use date-fns-tz com timezone
      'Europe/Lisbon' (households.timezone default). Testar com `zonedTimeToUtc`
      e `utcToZonedTime` correctamente.
    affects_stories: ["3.7", "3.5 (calendário week display)"]

  - id: R4
    title: "RLS leak via API drag-and-drop PATCH (cross-household)"
    probability: "Baixa"
    impact: "Crítico"
    mitigation: >
      Story 3.2 PATCH /tasks/[id]/move usa getDb() (RLS authenticated role) +
      Zod input validation strict (não aceita household_id em payload — derivado
      de JWT). Tests cross-household em Story 3.1 cobrem cenário tentar mover
      task de outro household.
    affects_stories: ["3.2"]

  - id: R5
    title: "Calendário week start Monday vs Sunday (PT-PT vs US default)"
    probability: "Baixa"
    impact: "Baixo"
    mitigation: >
      date-fns locale `pt` (weekStartsOn: 1 = Monday). Test explicit em Story 3.5.
    affects_stories: ["3.5"]

  - id: R6
    title: "Tool cérebro criar_tarefa reverse_op completeness"
    probability: "Baixa"
    impact: "Crítico"
    mitigation: >
      Pattern Story 2.8 herdado. reverse_op = { kind: 'task.delete', task_id }
      é trivial (DELETE WHERE id = X — RLS impede cross-household). Test
      integration E2E /api/agent/prompt → undo verifica row eliminada.
    affects_stories: ["3.8"]

  - id: R7
    title: "EB4 Inngest workspace EU Frankfurt provisioning verification pending"
    probability: "Média"
    impact: "Alto"
    mitigation: >
      Story 3.7 pre-flight task 1: @devops verifica `docs/runbooks/inngest-setup.md`
      + Inngest dashboard mostra workspace EU. Se não provisionado, BLOQUEIA
      push apenas (dev local funciona com `npx inngest-cli dev`).
    affects_stories: ["3.7 push only"]

  - id: R8
    title: "UX review @ux-design-expert disponibilidade Stories 3.3/3.4/3.5/3.6"
    probability: "Média"
    impact: "Médio"
    mitigation: >
      Engagement early no kickoff Eurico (handoff sucessor pm→sm → @ux-design-expert
      pre-design Stories 3.4/3.5 antes de @sm draft). Permite paralelizar UX
      design com @sm story drafting.
    affects_stories: ["3.3", "3.4", "3.5", "3.6"]

