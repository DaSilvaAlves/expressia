      Pagination cursor-based (per limit=50). Filters via query params: status,
      tag_id, due_date_from/to, kanban_column_id, assigned_to_user_id, project.
      Zod schemas reuse `packages/tasks/` ou inline em `apps/web/src/lib/api-tasks/`
      (DP a decidir em pré-flight).
      Service de drag-and-drop: PATCH atómico (UPDATE kanban_column_id + position
      em transacção, rebalanceia positions sibling se necessário).
    mapping_prd: ["FR7", "FR8", "FR9", "FR10", "FR12", "NFR5"]
    artefacts_expected:
      - "8+ route handlers em apps/web/src/app/api/{tasks,tags,recurrences}/"
      - "Zod schemas centralizados em apps/web/src/lib/api-schemas/tasks.ts"
