  **SMOKE-6.2 VALIDADO E2E (localhost) + HOTFIX EMAIL-CONFIRM (aiox-master + Eurico).**

  SMOKE-6.2 (onboarding): PASS. Conta nova → /bem-vindo (gate) → tour 2 passos →
  demo canned (tarefa+despesa+recorrente) → Passo 2 trial Família €8,88 → "Começar
  a usar" → /visao?welcome=1 + toast "Bem-vindo, {nome}. O Expressia está pronto."
  Tudo bate byte-a-byte com o código. Decisão A confirmada para OBS-6.2-SMOKE-6b.

  **ACHADO LATERAL (Story 6.1, não 6.2): confirmação de email partida → RESOLVIDO.**
  Sintoma: link do email → /confirm?status=error "Link inválido ou expirado";
  utilizador novo não confirmava pela via normal (só contornando com login direto).
  Causa-raiz PROVADA por log instrumentado: `AuthPKCECodeVerifierMissingError` —
  o /callback usava o fluxo PKCE `?code=` + `exchangeCodeForSession`, que exige o
  cookie `code_verifier` (gerado no signUp) a sobreviver à navegação cross-site do
  link de email. Não sobrevive (`hasVerifierCookie: false`).
  FIX (padrão oficial SSR Supabase): trocar para fluxo `token_hash` + `verifyOtp`
  (stateless, sem cookie, imune a prefetch). 2 peças:
    1. CÓDIGO: `apps/web/src/app/(auth)/callback/route.ts` aceita `token_hash`+`type`
       via verifyOtp (com `code`+exchange como fallback retrocompat). +4 testes (7/7).
    2. SUPABASE DASHBOARD (PROD, projeto llpotuxlyiyjvvxzetoo) — feito pelo Eurico:
       - Email template "Confirm signup" → link
         `{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email`
       - Redirect URLs → adicionado `http://localhost:3000/**`
  PROVADO E2E (localhost, conta euricojsalves+t2@gmail.com): /confirm?status=ok
  "Email confirmado" → login sem contornar. Gates: lint·typecheck·test 1056/1056
  efetivo (1 flaky calendário verde isolado)·build MW 94.6 kB·check:rls — todos verdes.

