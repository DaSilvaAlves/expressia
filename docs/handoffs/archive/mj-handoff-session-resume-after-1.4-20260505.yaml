pending_decision:
  what: "Onde criar o repo GitHub para receber o push da Story 1.4 (e tudo o resto)"
  who_decides: Eurico (humano)
  delegate_to: "@devops (Gage) executa após Eurico decidir"

  options:
    A_private_recommended:
      action: |
        gh repo create DaSilvaAlves/meu-jarvis --private \
          --description "Expressia (codinome meu-jarvis) — SaaS PT-PT EUR multi-tenant"
        git remote add origin https://github.com/DaSilvaAlves/meu-jarvis.git
        git push -u origin main
        gh run watch
      pros:
        - Recomendado pelo Gage
        - SaaS comercial pré-launch — schema/IP não exposto até estar pronto
        - CI corre desde já
        - Permite onboarding futuro de colaboradores via convite
      cons:
        - Requer GitHub Pro / Team se quiseres branch protection em privados
      best_for: "Cenário default. Qualquer dúvida → A."

    B_public:
      action: "Igual a A mas com --public"
      pros:
        - Open-source desde dia 1
      cons:
        - Expõe schema multi-tenant + RLS pattern + arquitectura ao público
        - Posicionamento comercial (cobrar Família €8,88/mês) fica esquisito com código aberto
      best_for: "Apenas se quiseres assumir open-source como estratégia explícita"

    C_defer:
      action: "Não fazer push ainda — manter local-only"
      pros:
        - Sem decisão GitHub pressionada
        - Permite renomear ainda (codename `meu-jarvis` → marca pública `expressia`)
      cons:
        - Sem CI a correr
        - Risco de perder trabalho se o disco falhar (não há backup remoto)
        - Bloqueia o pipeline AIOX (push-after-QA é parte do Story Development Cycle)
      best_for: "Se ainda estás a deliberar sobre nome do repo, conta GitHub a usar, ou estratégia open-source vs fechado"

  considerations:
    repo_name:
      - "Codename `meu-jarvis` está OK para repo privado (interno)"
      - "Se algum dia for público, considera renomear para `expressia` (marca pública)"
      - "GitHub permite rename de repo sem partir clones existentes (redirect 301)"
    github_account:
      - "git config user.name actual: DaSilvaAlves"
      - "Confirma se queres usar conta pessoal ou criar org `Expressia`/`SinkraExpressia`"
      - "Org dá-te 2-factor enforcement + audit log + permissions granulares (vale a pena para SaaS)"
    trademark:
      - "Verificação INPI Portugal pendente para `Expressia`"
      - "Não-bloqueante para repo privado"
      - "Bloqueante apenas para marketing público / domínio principal"

  detailed_blocker_doc: docs/handoffs/mj-handoff-devops-blocker-no-remote-20260505.yaml

