context: |
  **Ficheiro da story:** docs/stories/active/6.7.convite-membros-limites-plano.story.md
  (v0.2, 11 ACs, 7 grupos de tasks).

  **Correcção importante (v0.1 → v0.2):** a v0.1 assumia erradamente que a tabela
  household_invites e o RLS não existiam (greps Bash falharam de forma intermitente
  nesta sessão). Verificação byte-a-byte com Grep nativo + Read confirmou que:
    - Tabela household_invites EXISTE (0000_initial_schema.sql:212-229).
    - 4 RLS policies EXISTEM (0001_rls_policies.sql:114-148) e já restringem
      owner/admin no INSERT/UPDATE/DELETE; SELECT deixa o convidado ver o próprio
      convite (email = auth.users.email). Helper is_household_owner_or_admin() existe.
    - household_members RLS já permite self-insert via accept_invite (0001:87-92).
    - Suite RLS household_invites.rls.test.ts já existe e passa (fixture
      insertHouseholdInvite em fixtures.ts:378).
    - check:rls já verde (sem alterações; nenhuma exempção no script).
  O ÚNICO trabalho de DB novo é a função accept_invite() (nunca implementada).

  **Âmbito (validado por Eurico 2026-06-01):**
    - Ciclo E2E completo numa story (não dividido) — sem aceitação não há valor E2E
      (directiva refocus-core).
    - Email de convite = LINK MANUAL na resposta da API (Resend congelado, GAP-2).
      Diverge do epic-6 §5 ("email Resend"); envio automático = follow-up pós-Resend.

  **11 ACs:** (1) accept_invite() SECURITY DEFINER + limites de plano; (2) POST invites
  (devolve link); (3) GET invites pendentes; (4) DELETE invite (revogar); (5) DELETE
  member (guard nunca o owner); (6) rota /aceitar-convite/{token}; (7) Zod/DTO em
  households.ts (REQ-INLINE-1); (8) UI real no household-editor.tsx; (9) RLS getDb()
  only + check:rls verde; (10) PT-PT + imports absolutos; (11) testes db-test
  (accept_invite) + web + gates (correr db-test com Docker antes do push).

  **Gotchas técnicos (nas Dev Notes):** auth.users não JOINable via getDb();
  rls-gate do CI corre @meu-jarvis/db-test (correr com Docker UP antes do push);
  não correr build com dev activo; autorização owner/admin na app + reforçada por RLS.

