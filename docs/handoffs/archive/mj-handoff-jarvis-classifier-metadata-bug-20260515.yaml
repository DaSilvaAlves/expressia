      error: "Provider openai returned 401"
      status: "RESOLVIDO — @devops configurou OPENAI_API_KEY/ANTHROPIC_API_KEY no Vercel"
    - run: "646f5f4c (2026-05-14 22:12)"
      error: "Invalid schema ... schema must be a JSON Schema of 'type: object', got 'type: None'"
