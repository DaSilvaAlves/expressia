summary: >
  O fix do @dev (remover `name` do zodToJsonSchema) FUNCIONOU — o erro do schema
  desapareceu. Mas a validação E2E pós-deploy revelou um TERCEIRO bug em fila:
  o classifier envia `metadata: { prompt_version }` no payload da OpenAI Chat
  Completions, e a API exige `store: true` para aceitar `metadata` → 400.
  Diagnóstico DEFINITIVO obtido via logs Vercel (streaming) + query read-only à
  tabela agent_runs. O /jarvis continua inoperável até este fix. Fix trivial:
  remover o campo `metadata` do payload (NÃO adicionar store:true — ver abaixo).

