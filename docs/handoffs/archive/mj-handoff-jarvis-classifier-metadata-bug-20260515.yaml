       — inútil) + `msg: "Classifier error"` + run_id. 2. Query read-only
       SELECT error_message FROM agent_runs WHERE id = run_id revelou a mensagem
       técnica real (que o route.ts NÃO loga — ver bug_observability abaixo).
  error_queue_full_history:
