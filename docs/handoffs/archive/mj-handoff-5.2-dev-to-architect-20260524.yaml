decisions:
  - id: D-5.2.E
    description: T4.7 DISCRICIONÁRIA NÃO EXERCIDA — manter date-fns local em CardStatementCard.tsx
    rationale: |
      F4 PO_FIX_INLINE marcou T4.7 (substituir `format(parseISO(iso), 'dd/MM/yyyy')`
      por `Intl.DateTimeFormat`) como DISCRICIONÁRIA. Decisão @dev: NÃO substituir.
      Razões:
        - parseISO+format (date-fns) é proven em produção desde Story 4.8
        - Substituição introduz risco timezone subtle em datas civis de
          facturação (closing_day/due_day) sem benefício imediato
        - Função local é one-liner — over-engineering substituir
        - PO_FIX F4 explicitamente "OPCIONAL, não bloqueia merge"
        - Story 5.8 (sweep dark mode + tokens materialization) pode revisitar
          uniformização date-fns vs Intl quando outros sítios beneficiarem
      FUP-5.2.B mantido para Story 5.8.

  - id: FIX-IMPL-5.2.1
    description: tsconfig.json packages/ui adicionou `types: ["vitest/globals", "@testing-library/jest-dom"]`
    rationale: |
      Typecheck inicial falhou com `Property 'toBeInTheDocument' does not exist
      on type 'Assertion<HTMLElement>'`. Pattern exacto de `apps/web/tsconfig.json:13`
      resolve. Sem [DEV-DECISION] ID porque é fix de scaffolding alinhado com
      pattern existente — não decisão original.

  - id: D-5.2.A-EXEC
    description: DP-5.2.A executada — tokens.ts TypeScript only, zero CSS/Tailwind sweep
    rationale: |
      Conforme @po ratification (PO Validation §E + §F). Stories 5.3/5.6 podem
      consumir tokens via TypeScript inline ou Tailwind arbitrary values até
      Story 5.8 materializar CSS variables + Tailwind config dark strategy.
      tokens.ts exporta JS objects + type unions; globals.css inalterado nesta
      story.

  - id: D-5.2.B-EXEC
    description: DP-5.2.B executada — MoneyDisplay MOVER + ELIMINAR atómico
    rationale: |
      rm dos 2 ficheiros (original + test) + sed search-replace dos 11 call-sites
      no mesmo PR. Zero janela onde repo tem path antigo + path novo. API
      preserved byte-a-byte.

  - id: D-5.2.D-EXEC
    description: DP-5.2.D executada — TYPE-only re-export Theme/WidgetId/WidgetsEnabled
    rationale: |
      `export type { ... } from '@meu-jarvis/db'` em packages/ui/src/index.ts.
      Cross-confirm dep cyclical: grep `@meu-jarvis/ui` em packages/db = ZERO
      matches confirmado. Single source preservada em
      packages/db/src/schema/prefs.ts:34,43,57.

  - id: F3-CONSOLIDATE
    description: PO_FIX_INLINE F3 executada CONSOLIDADO — preservar 10 testes original
    rationale: |
      Inspecção do test original revelou 10 testes (não 4 ou 8 — eu pensava 8
      mas é 3 formatEuroCents + 4 MoneyDisplay + 3 signed = 10). Cobertura
      RICA superior aos 4 mínimos pedidos em AC7. Decisão: preservar todos
      no novo `packages/ui/src/components/MoneyDisplay/MoneyDisplay.test.tsx`
      + eliminar original. Single source of truth + zero regressão de cobertura.

