summary: >
  Sucessor do handoff `mj-handoff-1.7-post-deploy-grafana-20260508`. A sessão
  @devops anterior (02:50–03:00) executou em modo CLI-only e descobriu durante
  a Acção 1 (confirmar Vercel deploy) um bug real: `turbo.json` não declarava
  os 8 env vars Sentry/OTel/Grafana no `tasks.build.env`, pelo que Turbo nunca
  os passava ao build do Next.js. Resultado: Sentry SDK em production estava
  a falhar silenciosamente com "No auth token provided. Will not upload source
  maps". Fix aplicado: `turbo.json` agora inclui `SENTRY_DSN`, `SENTRY_ORG`,
  `SENTRY_PROJECT`, `SENTRY_AUTH_TOKEN`, `OTEL_EXPORTER_OTLP_ENDPOINT`,
  `OTEL_EXPORTER_OTLP_HEADERS`, `GRAFANA_API_TOKEN`, `GRAFANA_STACK_NAME`.
  Próximo deploy auto-trigger pelo push desta sessão terá sourcemap upload
  activo. Restam 4 acções UI manuais para Eurico (ou sessão futura @devops com
  browser automation): importar dashboard Grafana, criar 2 alertas, smoke test
  Sentry, validar Vercel Analytics. Estimated 25-35 min UI work.

