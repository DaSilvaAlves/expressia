next_action_steps:
  - id: 2
    label: 'Importar dashboard Grafana e re-exportar populated'
    description: |
      Levar `docs/dashboards/grafana-epic1.json` para a UI Grafana, ajustar
      datasources reais, confirmar que os 4 painéis renderizam, depois re-exportar
      e substituir o scaffold no repo.
    como: |
      1. Browser: https://expressia.grafana.net → Dashboards → New → Import
      2. Upload `docs/dashboards/grafana-epic1.json`
      3. Mapear datasources placeholder para datasources reais da stack expressia
      4. Save → confirmar 4 painéis: latência p95 /api/me, error rate 5xx,
         RLS violations, DB query latency p95
      5. Dashboard → Share → Export → Save to file (with values JSON populated)
      6. Substituir `docs/dashboards/grafana-epic1.json` pelo export final
      7. Commit local + push em commit `chore(observability): grafana dashboard populated`
    estimated_minutes: 10
    referencia: 'docs/runbooks/observability-setup.md §5 (queries por painel)'
    automação_possível_via_API: |
      Alternativa CLI: POST /api/dashboards/db da Grafana HTTP API com payload
      JSON do scaffold, bearer GRAFANA_API_TOKEN. Não testado nesta sessão.
      Vantagem: idempotente, repo-driven. Desvantagem: datasource UID resolution
      precisa de ser feita primeiro via GET /api/datasources.

  - id: 3
    label: 'Criar 2 alertas via UI Grafana'
    description: |
      Implementar os 2 alertas documentados no runbook §6. Queries idênticas ao
      dashboard.
    como: |
      Alerta 1 — Error rate >1% em janela 5min:
        Query: PromQL sobre http_server_response_count filtrado status_code 5xx
        Threshold: > 0.01 (1%)
        Window: last 5m
        Notification: contact point email euricojsalves@gmail.com
        Severity: critical

      Alerta 2 — Latência p95 /api/me >200ms em janela 5min:
        Query: histogram_quantile(0.95, http_server_duration_milliseconds_bucket)
        Threshold: > 200
        Window: last 5m
        Notification: contact point email euricojsalves@gmail.com
        Severity: warning

      Para cada alerta: Save → Test → confirmar contact point recebe notificação.
    estimated_minutes: 10
    referencia: 'docs/runbooks/observability-setup.md §6 (queries completas)'
    automação_possível_via_API: |
      Alternativa CLI: POST /api/v1/provisioning/alert-rules com payload JSON.
      Os YAML/JSON dos alertas podem ser versionados em docs/dashboards/alerts/*.json
      e aplicados idempotentemente. Não criado nesta sessão.

  - id: 4
    label: 'Smoke test pós-deploy — erro 5xx contra Sentry'
    description: |
      Forçar evento de erro intencional para validar que: (a) Sentry recebe
      o evento com banner "European Union (Frankfurt)", (b) sourcemap aplicado
      (stack trace legível), (c) PII redaction `beforeSend` activa.
    pré-requisito: |
      O deploy auto-trigger por esta sessão TEM de estar Ready com sourcemap
      upload bem-sucedido (verificar nos logs: ausência de "No auth token
      provided. Will not upload source maps" e presença de "Source maps
      uploaded successfully"). Só depois faz sentido fazer o smoke test.
    como: |
      Opção A (recomendada — preserva production limpa):
        Criar branch curta com endpoint `/api/_smoke` que faz `throw new Error("Sentry EU smoke test")`.
        Deploy preview, hit GET, depois apagar branch.

      Opção B (menos invasiva):
        Forjar JWT inválido em request a /api/me production:
          curl -H "Authorization: Bearer broken.jwt.token" https://expressia-black.vercel.app/api/me
        captureException no error path já existente capta erros 5xx.

      Verificação:
        1. https://eurico-xw.sentry.io/issues → ver issue novo
        2. Issue → Details → confirmar banner "Stored in: European Union (Frankfurt)"
        3. Stack trace → confirmar nomes de ficheiros legíveis (sourcemap aplicado)
        4. Event payload → confirmar zero PII (sem email/Authorization/Cookie)
    estimated_minutes: 10
    bloqueador: 'aguardar deploy verde com sourcemap upload (após push desta sessão)'

  - id: 5
    label: 'Validar Vercel Analytics activo'
    description: |
      Confirmar que Vercel Analytics está a recolher dados RUM em production.
    como: |
      1. Visitar https://expressia-black.vercel.app (gerar pageview real)
      2. Esperar ~1-2 min para data ingestion
      3. https://vercel.com/euricojsalves-4744s-projects/expressia/analytics
      4. Confirmar: contagem de visitors >0, Web Vitals (LCP/FID/CLS) presentes
      5. Speed Insights tab — confirmar runtime metrics presentes
    estimated_minutes: 5

  - id: 6
    label: 'Fechar handoff'
    description: |
      Após acções 2-5 concluídas, marcar este handoff como consumed e arquivar.
    estimated_minutes: 5

