decision_points:
  - id: "DP-3.4.7"
    title: "Endpoint /api/kanban-columns CRUD"
    severity: "RESOLVED"
    resolved_by: "@architect (Aria)"
    resolved_at: "2026-05-17T01:50:00+01:00"
    verdict: "A — sub-task em 3.4. Story 3.2 ratificou defer via DP4-3.2 (B ACCEPT, linhas 410+753)."
    impact: "Story estimate L → XL (~25-30% scope adicional). Manter 3.4 XL único, não spin-off"
    evidence:
      - "apps/web/src/app/api/ sem directório kanban-columns (variantes confirmadas ausentes)"
      - "apps/web/src/app/api/tasks/[id]/move/route.ts existe (Story 3.2)"
      - "Schema kanban_columns existe (packages/db/src/schema/tenancy.ts:152-173) com 4 RLS policies (delete = owner/admin only)"
    gaps_schema:
      - "HIGH — sem CHECK count ≤ 6 per household"
      - "HIGH — sem partial unique is_done_column=true per household"
      - "MEDIUM — is_done_column é text não boolean"
    blocking_for_sm: false
    next_action_for_sm: "Adicionar AC-7 a AC-11 (ver pre-flight §11.1) + sub-tasks T-X.1 (migration 0010) + T-X.2 (text→bool housekeeping). Coordenar com @data-engineer ANTES de @dev começar."

  - id: "DP-3.4.1"
    title: "Drag handle no card"
    severity: "LOW UX"
    options:
      A: "Todo card draggable (sem handle visível) — RECOMMENDED"
      B: "Handle ⋮⋮ explícito"
    who_decides: "@architect"

  - id: "DP-3.4.2"
    title: "Click no body do card"
    severity: "LOW UX"
    options:
      A: "EditTaskModal — RECOMMENDED"
      B: "Inline edit título (como Lista)"
    who_decides: "@architect"

  - id: "DP-3.4.3"
    title: "Filter bar mínima na Kanban"
    severity: "MEDIUM UX"
    options:
      A: "Sem filtros"
      B: "Subset (search + tag) — RECOMMENDED"
      C: "Filtros completos Lista"
    who_decides: "@architect + @po"

  - id: "DP-3.4.4"
    title: "Threshold virtualização"
    severity: "MEDIUM tech"
    options:
      A: "50 tasks/coluna — RECOMMENDED"
      B: "100 tasks/coluna"
      C: "Sempre virtualizar"
    who_decides: "@architect"

  - id: "DP-3.4.5"
    title: "Haptic feedback mobile"
    severity: "LOW UX"
    recommendation: "A — navigator.vibrate(10) no onDragStart"
    who_decides: "@architect"

  - id: "DP-3.4.6"
    title: "Batch save column config"
    severity: "HIGH tech"
    options:
      A: "Single PATCH /api/kanban-columns/batch (atomicidade) — RECOMMENDED"
      B: "Múltiplos PATCHs paralelos"
    who_decides: "@architect"

  - id: "DP-3.4.8"
    title: "Mobile coluna full-width vs 1.5 colunas"
    severity: "MEDIUM UX"
    options:
      A: "1 coluna full-width com snap forte — RECOMMENDED"
      B: "1.5 colunas (peek)"
      C: "2 colunas tap-zoom"
    who_decides: "@architect"

  - id: "DP-3.4.9"
    title: "Animação especial coluna 'Concluído'"
    severity: "LOW UX"
    recommendation: "B — check icon + fade strike-through 800ms (delight)"
    who_decides: "@architect"

