# ───────────────────────────────────────────────────────────────────────────
# 6 DECISÕES ARQUITECTURAIS PARA REVIEW @architect
# ───────────────────────────────────────────────────────────────────────────
architect_focus_points:
  - id: D1
    title: "Cross-package boundary: DrizzleDbClient estrutural local + SQL puro em vez de import de @meu-jarvis/db"
    rationale: >
      O TypeScript cross-package não consegue resolver os `paths` aliases
      internos (`@/*`) do `@meu-jarvis/db` quando o package tools faz
      typecheck — mesma limitação documentada em
      `packages/agent/src/contracts.ts` linhas 7-13 (Story 2.2 D1) e em
      uso em `apps/web/src/app/api/me/route.ts:49`. Solução consistente:
      tipo `DrizzleDbClient` estrutural local em `contracts.ts` (apenas
      `transaction`, `insert`, `execute`) + `executeAtomic` faz o INSERT
      em `agent_reverse_ops` via SQL puro com `tx.execute(sql\`...\`)`
      em vez de `tx.insert(agentReverseOps).values(...)`. Mantém
      `expires_at = sql\`now() + interval '30 seconds'\`` server-side
      (AC6 invariant preservado — o SQL é literal no template).
    article_iv_compliance: >
      Article IV (No Invention) preservado por SQL literal correspondente
      ao schema real (`agent_reverse_ops` columns confirmed em
      `packages/db/src/schema/agent.ts:188-218`). Divergência seria
      detectada em runtime production.
    alternatives_considered:
      - "Refactor `packages/db/src/schema/index.ts` para usar imports relativos: rejeitado — out of scope desta story, afecta outros consumers"
      - "Configurar `paths` no tools tsconfig para apontar para db: rejeitado — TS paths são per-project, não cross-project"
      - "Usar `tx.insert(agentReverseOps)` com schema partial: rejeitado — propaga o problema cross-package"
    risk: low
    test_coverage: "atomic.test.ts 'insert SQL contém `expires_at = now() + interval` (não JS Date)' valida via mock que captura sqlText do template Drizzle"

  - id: D2
    title: "ReverseOpPayload composite guard: per-level recursivo (não top-level only) — endereça PO suggestion #2"
    rationale: >
      AC2 prescreve `composite.ops.length` máximo 10. PO suggestion #2 do
      gate Pax 2026-05-08 pediu clarificação sobre se o guard é por
      payload top-level ou em cada nível recursivo. Escolhi **per-level
      recursivo** (defensivo) por 2 razões:
      (1) Top-level only permitiria `10^depth` ops em aninhamento profundo
          (ex: 1000 ops em 3 níveis composite-de-composite — payload jsonb
          descontrolado em `agent_reverse_ops`).
      (2) Per-level mantém payload bounded em `O(10^depth)` mas a
          implementação Zod via `z.lazy(() => discriminatedUnion(...))`
          aplica naturalmente — sem checks adicionais.
      Uso real esperado ≤2 níveis (ex: `criar_parcelada` cria parent
      transaction + 12 child installments → 1 composite com ~13 ops top-
      level, sem aninhamento adicional). Documentado em README + JSDoc do
      `COMPOSITE_REVERSE_OP_MAX_OPS` constant.
    test_coverage:
      - "contracts.test.ts 'composite com EXACTAMENTE 10 ops aceita (limite inclusivo)'"
      - "contracts.test.ts 'composite com 11 ops é REJEITADO via ToolValidationError'"
      - "contracts.test.ts 'guard per-level: composite com nested composite oversize falha'"
      - "contracts.test.ts 'round-trip composite aninhado (1 nível) — guard per-level passa'"
    risk: low
    open_question: "Confirmar se @architect prefere top-level only — se sim, pequeno refactor em `ReverseOpPayloadSchema` para validar só na raiz. Decisão recursiva é a mais defensiva."

  - id: D3
    title: "ToolPlanGateError DEFINIDO aqui mas INVOCADO pela Story 2.5 — endereça PO suggestion #1"
    rationale: >
      AC8 lista `ToolPlanGateError` na taxonomia mas a story 2.3 não
      contém lógica `assertPlanAllowed(tool, plan)`. PO suggestion #1
      pediu clarificação. Documentado explicitamente no JSDoc do
      `errors.ts` (35 linhas comment) + README secção "Locus de invocação":
      a classe é DEFINIDA aqui (parte da taxonomia para `instanceof`
      checks) mas INVOCADA pela Story 2.5 (Planner+Executor) ANTES de
      chamar `executeAtomic`. Story 2.5 verifica `tool.requiredPlan`
      contra plano do household no contexto e lança esta excepção se o
      gate não passa. Story 2.3 só fornece a classe + teste de
      instanciação + teste de propagação via AtomicFailure (ver
      atomic.test.ts "ToolPlanGateError lançado pela tool propaga como
      AtomicFailure" — confirma que se uma tool concreta lançar
      ToolPlanGateError, executeAtomic propaga correctamente como
      AtomicFailure com `error: ToolPlanGateError`).
    test_coverage:
      - "errors.test.ts (instanciação correcta com requiredPlan/actualPlan)"
      - "atomic.test.ts (propagação como AtomicFailure)"
    risk: low

  - id: D4
    title: "InternalAtomicAbort marker class privada para distinguir rollback intencional vs uncontrolled"
    rationale: >
      Drizzle's `transaction(fn)` faz rollback automático quando `fn`
      throws. Mas precisamos distinguir 2 cenários:
      (a) Tool falhou → controlled rollback → caller deve receber
          AtomicFailure com `success: false, rolledBack: true, error:
          ToolError`.
      (b) Transacção falhou (deadlock, connection drop, raised exception
          do Postgres) → uncontrolled → caller deve receber
          ToolTransactionError com `retryable: true` (re-lançado).
      Solução: class `InternalAtomicAbort extends Error` privada (não
      exportada) que envolve o `ToolError` concreto + `failedToolName`.
      Quando tool falha, throw deste marker → Drizzle rollback → catch
      fora da transacção converte em AtomicFailure. Outros throws (não
      InternalAtomicAbort) são wrapped em ToolTransactionError. Dispatch
      via `instanceof`.
    trade_off: "Cria 1 class privada extra. Alternativa seria sentinel value mas perderia type safety + stack trace."
    test_coverage: "atomic.test.ts 'rollback quando tool 2 falha' + 'rollback quando input inválido' + 'AtomicResult shape'"
    risk: low

  - id: D5
    title: "Tracing 2 níveis: `agent.tool.atomic` (1 por executeAtomic) + `agent.tool.call` (1 por tool individual)"
    rationale: >
      Permite Grafana queries por (a) tool individual — latência por
      tool, success rate por tool, household_hash distribution; e (b)
      execução completa — rollback rate por executeAtomic, tool_count
      distribution. Whitelist total tem 10 keys (4+6 distribuídas pelos
      2 spans), todas validadas em testes para excluir PII (não emite
      tool.input, tool.output, tool.snapshot, tool.prompt, tool.message,
      tool.amount, tool.titulo). `householdId` raw NUNCA emitido — sempre
      via `hashForCorrelation` produzindo `tool.household_hash`. Pattern
      consistente com `withProviderSpan` da Story 2.2 (10 attributes
      whitelist, validado em tracing.test.ts da agent package).
    test_coverage:
      - "tracing.test.ts 'annotateToolMetrics aplica APENAS keys whitelisted (4 keys)'"
      - "tracing.test.ts 'NÃO emite tool inputs/outputs/snapshots como attributes (PII guard)'"
      - "tracing.test.ts 'household_hash usa hashForCorrelation (não expõe UUID raw)'"
      - "tracing.test.ts 'TOOL_SPAN_ATTRIBUTE_KEYS contém exactamente 10 keys e nenhuma se chama input/output/snapshot'"
    risk: low

  - id: D6
    title: "ToolRegistry.has() adicional além do AC + clear() exposto mas marcado @internal"
    rationale: >
      AC3 lista `register/get/list/getByDomain/getAnthropicToolDefinitions/clear`.
      Adicionei `has(name): boolean` por utilidade — Story 2.5 (Planner)
      pode querer verificar tool existence sem try/catch wrap em
      `get()` (que lança ToolNotFoundError). Custo zero (Map.has é O(1)),
      JSDoc completo. NÃO exportado por engano — está na class pública
      e no barrel `index.ts`. Se @architect prefere remover, é uma linha.
      `clear()` está marcado `@internal — apenas para testes` no JSDoc;
      o linter TypeScript do Vitest aceita-o nos testes mas alertaria
      se um caller produção tentasse usar (warning sob TSDoc strict).
    risk: low
    test_coverage: "registry.test.ts 'has() devolve true/false sem lançar' + 'clear() esvazia o Map interno'"

