outcome: |
  ADR-001-openrouter-llm-gateway.md produzido em docs/adr/. VEREDICTO: NO-GO
  para produção (GO-PARCIAL condicional só para tráfego sem PII, sem aplicação
  prática hoje). Gate #1 (data residency UE) FALHA: o único caminho do
  OpenRouter que mantém PII na UE — EU in-region routing via eu.openrouter.ai
  + DPA RGPD — é enterprise-only/by-request, incompatível com MVP pré-receita.
  ZDR (disponível a todas as contas) resolve retenção mas NÃO garante
  processamento na UE → transferência internacional ainda exige SCCs/DPA.
  Gates #2-#5 ficaram informativos: caching Anthropic propaga-se (não
  bloquearia), integração técnica seria barata (classifier 1 linha baseURL;
  executor ~3-5 linhas via "Anthropic Skin" baseURL=openrouter.ai/api mantendo
  tool calling + cache_control), sem markup (5,5% créditos / 5% BYOK). Decisão:
  Fase 0 segue com OPENAI_API_KEY + ANTHROPIC_API_KEY DIRECTAS (DPAs self-serve,
  base legal RGPD imediata). NÃO provisionar OPENROUTER_API_KEY.

