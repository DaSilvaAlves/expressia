    - DP-5.8.B: persistência híbrida C (DP2 validada por Eurico) — `user_prefs.theme`
      = fonte de verdade cross-device; cookie `expressia-theme` (SameSite=Lax;
      Path=/; Max-Age=31536000) = leitura síncrona pré-paint; localStorage = cache
      UI reactivo. PATCH actualiza DB + cookie. Opção C (só localStorage) rejeitada
      (per-device, viola FR22).
    - DP-5.8.C: **`packages/ui/src/tokens.ts` hex = fonte canónica.** Migrar
      `globals.css` HSL → hex exactos. **ATENÇÃO PO-FIX-2 (3 superfícies):** a
      reconciliação tem de cobrir (1) CSS vars `:root`/`.dark`, (2) bloco
      `theme.extend.colors` no `tailwind.config.ts` — que HOJE NÃO EXISTE (só tem
      `fontFamily`), (3) componentes. As classes `text-muted-foreground`/
      `bg-background`/`text-foreground` são usadas em 10+ ficheiros (ex.:
      `conta/preferencias/page.tsx:59,63`) mas não estão mapeadas no config —
      sem mapear o Tailwind, ficam SILENCIOSAMENTE sem estilo após a migração.
      @dev decide: manter nomes legacy (`--background`/`--foreground`/`--muted`)
      como aliases (menos sweep) OU renomear para `--bg-canvas`/`--text-primary`
      (mais sweep). @architect ratifica no gate.
    - DP-5.8.D: sweep cobre `apps/web/src` + `packages/ui/src`; whitelist de
      falsos positivos (ex.: `bg-white/N` em glass effects); `theme:'system'` via
      `window.matchMedia('(prefers-color-scheme: dark)')` no ThemeProvider.
    - DP-5.8.E: GET estende para `{ always_preview, widgets_enabled, theme }`;
      `ThemeSchema.safeParse(rows[0]?.theme).data ?? 'system'` (análogo ao
      `WidgetsEnabledSchema.safeParse` da 5.7 — `route.ts:142-145`).
    - DP-5.8.F: toggle 3 opções PT-PT ("Claro"/"Escuro"/"Sistema"), radiogroup
      a11y, co-localizado com `always_preview`, optimistic + PATCH + banner 3s
      (precedente `prefs-toggle.tsx`).

  **PO-FIX-1 (AC5.d) — atenção crítica anti-invenção (Article IV):** o parity
  test de tokens NÃO PODE exigir simetria. `colorsLight` = **19 tokens**,
  `colorsDark` = **16** (`successSubtle`/`warningSubtle`/`dangerSubtle` omissos —
  documentado em `tokens.ts:50-58` PO_FIX_INLINE F2, front-end-spec §3.2 não os
  define). O teste verifica: cada entrada de `colorsLight` → CSS var em `:root`
  E cada de `colorsDark` → CSS var em `.dark`, com os 3 `*Subtle` só em `:root`.
  @dev decide (com @ux-design-expert, como nota o `tokens.ts`) se preenche os 3
  omissos em `colorsDark`+`.dark` ou mantém a omissão — **NUNCA inventar hex**;
  o teste reflecte a decisão tomada.

  **Lição FIX-1 da Story 5.7 (CRÍTICA) — aplicada explicitamente (AC1.d + Dev
  Notes linha 241):** Client Components renderizam no SSR. A mutação da classe
  `dark` no `document.documentElement` no `ThemeProvider` DEVE estar em `useEffect`
