notes: |
  Avisos para @dev em T10:

  1. Feature flag `KANBAN_AUDIT_ENABLED` (env var) — JÁ existe em
     apps/web/src/lib/api-helpers/audit.ts:65. Default false. Liga após
     correr db:migrate. T10.3 pode remover o flag em PR follow-up
     (housekeeping NIT-AR-3.4.1 mencionado pela Aria).

  2. Migration ÚNICA + atomicidade: runner envolve em sql.begin() — se passo
     (e), (f), (g) ou (h) falhar, rollback completo (incluindo passos a-d que
     adicionaram enum values, exceto se PG já tiver flushed catalog — ver
     PG docs ALTER TYPE atomicity caveats). Re-run é safe via IF NOT EXISTS.

  3. Ressalva G3.2-2 (defensive check em f): se a migration abortar com
     "data violation — household com múltiplas done columns", isto indica
     data antigo (de antes do partial unique). Cleanup manual:
       UPDATE public.kanban_columns
         SET is_done_column = false
         WHERE household_id = '<HOUSEHOLD_UUID>'
           AND id != '<KEEP_THIS_DONE_COLUMN_ID>';
     Depois re-correr db:migrate (idempotente).

  4. Order check: migration 0011 corre DEPOIS de 0010 (lexicographic). Runner
     ignora ficheiros já em __schema_migrations — re-run skip 0000-0010.

  5. Production roll-out (futuro): mesma migration aplica-se em prod via
     CI/CD ou manual `pnpm db:migrate` com DIRECT_URL prod. Defensive check
     (f) torna prod-safe — não há risco de fail silently.

  Sucessor: nenhum directo. Após @dev aplicar a migration em T10 e fechar
  Story 3.4, o sucessor natural é o handoff @architect final-gate
  mj-handoff-3.4-ready-for-architect-final-gate-20260517 que @dev criará em T13.7.
