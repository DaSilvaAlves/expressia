# -----------------------------------------------------------------------------
# VALIDATION EVIDENCE
# -----------------------------------------------------------------------------
validation_evidence: |
  G3.1-G3.3 confirmadas pela Aria (HIGH confidence) + 2 ressalvas Dara aplicadas
  + 1 gap (Drizzle sync) coberto:

  G3.1 — Single consolidated migration viable:
    Confirmado contra `apply-migrations.ts:93` (sql.begin() per file).
    PG 12+ permite ALTER TYPE ADD VALUE em transação desde que os novos
    values NÃO sejam USED na mesma transação. Migration 0011 apenas adiciona
    values (zero INSERT que referencie kanban_column.*) — safe.
    Precedent: 0010 fez 13 ALTER TYPE em 1 transação → PASS.

  G3.2 — Ordem dentro do ficheiro (validada + 2 ressalvas Dara):
    (1) ALTER TYPE × 4 primeiro idempotent
    (2) text→boolean: RESSALVA-1 Dara — drop default ANTES de alter type
        (cast text 'false' → boolean default pode falhar dependendo da
        versão PG / configuração local). Aplicado em (e).
    (3) RESSALVA-2 Dara — defensive DO block em (f) ANTES do partial unique.
        Aborta cedo com mensagem clara se data existente tem >1 done column
        por household. Evita create index fail mid-tx (que provocaria
        rollback completo + ruído).
    (4) Partial unique kanban_columns_done_unique
    (5) Trigger CHECK count ≤ 6

  G3.3 — RLS policies SAFE (NFR5 preservada):
    `0001_rls_policies.sql:150-168` — 4 policies (select_member, insert_member,
    update_member, delete_owner_admin) usam apenas is_household_member() +
    is_household_owner_or_admin(). ZERO referências a is_done_column.
    Conversão text→boolean preserva check:rls gate GREEN.

  GAP-3.4-DARA-1 — Drizzle schema sync (não coberto por G3.x Aria):
    O schema Drizzle em packages/db/src/schema/{tenancy.ts, audit.ts} tem que
    ser sincronizado com a migration SQL para que (1) `pnpm typecheck` continue
    GREEN em consumers do `kanbanColumns` table object + (2) `pnpm check:rls`
    detecte o schema actualizado sem regressão. Coberto pelos 2 edits acima.

  App-side audit helper já preparado:
    apps/web/src/lib/api-helpers/audit.ts JÁ tem (a) `TasksAuditAction` type
    union com os 4 kanban_column.* values (linhas 41-44) + (b) `'kanban_columns'`
    no `entityTable` literal (linha 51) + (c) feature flag `KANBAN_AUDIT_ENABLED`
    (default false) que protege INSERTs até migration 0011 estar aplicada.
    @dev SÓ precisa de flippar a env var para `true` depois de correr db:migrate
    (T10.3 housekeeping pode remover o flag em PR follow-up).

