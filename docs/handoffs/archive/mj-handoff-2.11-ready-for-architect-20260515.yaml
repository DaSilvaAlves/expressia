  - id: D64
    classification: "ARCHITECTURAL"
    decision: "Estratégia OTel span attrs → Prometheus métricas via `traces_spanmetrics` Grafana extension"
    rationale: >
      Painéis 3 (custo planner) + 5 (cache hit Upstash + Anthropic) + alarme 2 (custo > 35% MRR)
      assumem Grafana Cloud `traces_spanmetrics_*` extension activa para converter span attrs
      numéricos em métricas Prometheus queryable via PromQL. Zero código TS novo necessário —
      decisão de configuração Grafana (activação no stack `expressia.grafana.net`).
    alternative_rejected: >
      Custom OTel meter emission em cada componente — cada package (classifier/planner-executor)
      criaria explicit Gauges/Counters duplicando dados já em spans. Adicionaria ~50 linhas TS
      em packages tracing.ts + Vercel runtime overhead. @dev rejeita por violação KISS.
    status: "REVIEW REQUIRED — @architect ratifica path canónico para o projecto"
    impact_if_changed: "Se @architect ordenar custom emission: painéis 3+5+alarme 2 requerem código adicional em tracing.ts files; Story 2.11 reabre em ~30min refactor"

