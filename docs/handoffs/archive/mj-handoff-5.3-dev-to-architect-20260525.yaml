    - Sidebar usa cores **hardcoded** `#1F4F6A`/`#E6EEF3` em vez de `import { tokens } from '@meu-jarvis/ui'`. Valores idênticos aos do tokens.ts mas o import foi omitido para minimizar peso do bundle Client. Story 5.8 sweep CSS variables torna o import desnecessário (DP-5.3.B ratificada por @po: "tokens consumo TypeScript directo (sem CSS vars nesta story)"). Dev Notes da story sugeriam grep ≥1 match `from '@meu-jarvis/ui'` em shell/*.tsx; o resultado actual é 0. Mantém-se coerente com DP-5.3.B mas notar que o ponto literal do sugerido em Dev Notes não bate. @architect decide se aceita ou exige refactor para usar `import { tokens }`.

