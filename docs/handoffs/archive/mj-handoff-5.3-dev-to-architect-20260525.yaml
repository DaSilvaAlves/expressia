  Implement) sobre a Story 5.3 Ready for Dev v1.1 do @po. Implementação completa
  do layout shell aplicacional (sidebar fixa + topbar + chat panel slot).

  Story 5.3 status transição: `Ready for Dev v1.1` → `Ready for Review v1.2`
  em `docs/stories/active/5.3.layout-shell-sidebar-topbar-chatslot.md`.

  **Resultado: 8/8 Tasks `[x]` · 9/9 ACs PASS · 5/5 quality gates GREEN.**

  **Quality gates executados localmente:**
    - `pnpm lint`              → **PASS** 10/10 packages FULL TURBO (`next lint --max-warnings=0` ✓ No ESLint warnings or errors)
    - `pnpm typecheck`         → **PASS** 10/10 packages FULL TURBO
    - `pnpm --filter @meu-jarvis/web test` → **PASS 759/759** (742 baseline + 17 novos — overshoot vs target 14)
    - `pnpm build`             → **PASS** 10/10 packages; Next.js build OK; 12 rotas (app)/ presentes (incluindo /financas redirect 307 — PO_FIX_INLINE F1 honrado)
    - `pnpm check:rls`         → **EXIT 0** — 28 tabelas, 120 policies (inalteradas)

  **5 [DEV-DECISION] resolvidas + 1 emergente:**
    - **D-5.3.1** — ícones via **EMOJIS** (🏠 💬 ✅ 💰 ⚙); zero icon library
    - **D-5.3.2** — breadcrumb **INCLUÍDO** via sub-componente Client `BreadcrumbLabel`
    - **D-5.3.3** — transições CSS triviais (`transition-[width]`); refinamento delegado para Story 5.4 com `<ChatPanel>` real
    - **D-5.3.4** — default `sidebarCollapsed=false` (expandida); racional minimalista
    - **D-5.3.5** — hook `useShellHydrated()` (wrapper sobre `persist.hasHydrated()` + `onFinishHydration`) — evita hydration mismatch SSR↔CSR
    - **D-5.3.6 (emergente)** — `mobileDrawerOpen` adicionado ao `shellStore` como estado **efémero** (excluído do `partialize`) — solução superior a prop drilling para comunicação cross-tree `HamburgerButton`(TopBar)↔`Sidebar`. **REQUER RATIFICAÇÃO @architect.**

  **4 [AUTO-DECISION]:**
    - AD-5.3.1 — db-test integration ENV-BLOCKER Docker PROCEED (precedente Stories 3.1-5.2; CI rls-gate cobre)
    - AD-5.3.2 — CodeRabbit SKIPPED (`coderabbit_integration` disabled em core-config)
    - AD-5.3.3 — baseline real apps/web = **742** testes (não 752 conforme handoff @po — derivação errada; story 5.2 reportou "760 totais" = 742 apps/web + 18 packages/ui)
    - AD-5.3.4 — smoke browser visual SUBSTITUÍDO em YOLO por `pnpm build` PASS + 17 testes vitest comportamentais (precedente Stories 5.1+5.2 `@architect *qa-gate` faz validação visual)

  **PO_FIX_INLINE F1 HONRADO** — `pnpm build` confirma todas as 12 rotas (app)/ presentes, incluindo `/financas` (redirect 307 → `/financas/este-mes` Story 4.6 AC1).

  **Anti-hallucination cross-checks executados:**
    1. `git diff --stat` confirma ZERO modificações em: `middleware.ts`, `logout-action.ts`, `visao/page.tsx`, `jarvis/`, `tarefas/`, `financas/` (excepto smoke validation), `conta/`, `app/page.tsx`, `tailwind.config.ts`, `next.config.ts` ✓
    2. `pnpm build` manifesto confirma 12 rotas ✓
    3. `pnpm --filter @meu-jarvis/web test src/lib/stores/__tests__/shellStore.test.ts` 7 PASS — persist round-trip + partialize confirmam que `mobileDrawerOpen` NÃO persiste ✓
    4. Zero invenções: cada componente trace para AC documentado; cores hardcoded `#1F4F6A`/`#E6EEF3` são valores exactos de `packages/ui/src/tokens.ts` linhas 35+37 (light primary + primarySubtle); logoutAction byte-a-byte preservado.

