decisions:
  - id: DEV-5.3.1
    description: 5 [DEV-DECISION] resolvidas + 1 emergente (D-5.3.6) durante implementação
    rationale: |
      Todas as 5 [DEV-DECISION] AC9 ratificadas pelo @po na fase Phase 2 foram
      implementadas conforme decisão registada. Adicionalmente, D-5.3.6 emergiu
      durante a implementação: `mobileDrawerOpen` no `shellStore` como estado
      efémero (excluído do partialize) — solução superior a prop drilling porque
      `HamburgerButton` (no TopBar Server) e `Sidebar` (árvore separada) precisam
      partilhar estado sem lift ao layout. **Requer ratificação @architect.**

  - id: DEV-5.3.2
    description: TopBar fragmentado em 4 componentes (Server + 3 Client) em vez de 1
    rationale: |
      Para preservar `TopBar` como Server Component (conforme nota T4.2 do @sm),
      extraí 3 sub-componentes Client mínimos: `HamburgerButton` (SVG button base),
      `TopBarHamburger` (wrapper que liga ao store), `BreadcrumbLabel` (usePathname).
      Resultado: TopBar (100 linhas) continua a renderizar SSR; apenas porções
      interactivas viajam para o Client bundle. Total adicional: 110 linhas em 3
      ficheiros vs ~50 linhas inline num único Client TopBar. Trade-off favorável
      para SSR + bundle size.

  - id: DEV-5.3.3
    description: Cores hardcoded `#1F4F6A`/`#E6EEF3` no Sidebar em vez de import tokens
    rationale: |
      DP-5.3.B ratificada por @po: "Tokens consumo TypeScript directo (sem CSS vars
      nesta story)". Valores hardcoded são exactamente os de `packages/ui/src/tokens.ts`
      linhas 35+37 (light.primary + light.primarySubtle). Decisão de não importar
      `tokens` evita peso adicional no Client bundle do Sidebar — em Story 5.8 o
      sweep CSS variables torna o import desnecessário. **Desvio nominal em relação
      ao Dev Notes "Suggested Files" (que sugeriam grep ≥1 match `from '@meu-jarvis/ui'`
      em shell/*.tsx) — actual é 0 matches.** Comunicado para @architect ratificar
      ou exigir refactor.

