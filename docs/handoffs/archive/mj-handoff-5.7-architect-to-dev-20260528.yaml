context: |
  **Story:** docs/stories/active/5.7.widget-config-ui-persistence.story.md
  (Changes Requested v1.2 — QA Results tem o detalhe completo do gate FAIL).

  **FIX-1 [HIGH] — único blocker:**
    - Ficheiro: `WidgetConfigHydrator.tsx:27-36`.
    - Causa: `'use client'` + `useWidgetConfigStore.getState().hydrate(initial)`
      **no corpo do render**. Client Components renderizam no SERVIDOR durante o
      SSR (App Router) → `hydrate()` muta o `widgetConfigStore` singleton de
      módulo no servidor. Com a idempotência (`if (get().hydrated) return`), o 2º
      request num lambda warm NÃO re-hidrata → reutiliza `widgets_enabled` do 1º
      request → HTML SSR de B com a visibilidade de widgets de A; client de B
      corrige (store client fresh) → hydration mismatch + flash.
    - NÃO é data leak de segurança (DADOS via RSC sob RLS por-utilizador; só a
      visibilidade on/off transiente do wrapper pode ficar errada). Mas escala
      mal em serverless e a afirmação "SSR-safe" (D-5.7.4) está incorrecta.
    - Fix: `useEffect` (não corre no SSR). Pré-hidratação: `useWidgetEnabled(null)
      → true` mostra os widgets do RSC (já só os ON de B); `AddWidgetMenu` usa
      `?? initial` (B) → estado correcto, sem leak, sem mismatch. `hydrate`
      idempotente preserva o optimistic entre `router.refresh()`.

  **Tudo o resto RATIFICADO (não tocar):**
    - 5/5 quality gates GREEN (re-corridos pelo @architect).
    - D-5.7.1 overlay (`<WidgetSlot>`) — OK. OBS-1 não-bloqueante: o slot
      `WidgetCard.headerActions` reservado pela 5.6 fica órfão; numa iteração
      futura usar o slot OU remover o `headerActions?`. NÃO mexer nesta story.
    - D-5.7.2 `sql.raw` seguro (whitelist), D-5.7.3, D-5.7.5 — ratificadas.
    - RLS getDb only, REQ-INLINE-1, `.strict()`, PO-FIX-1 (AC6) — verificadas.
    - 3 PRAISE (UPSERT parcial, fronteira RSC↔Client, retrocompat).

  **Escopo do fix:** APENAS o `WidgetConfigHydrator` (+ JSDoc/Completion Notes).
  Não tocar route.ts, store, WidgetSlot, WidgetGrid, AddWidgetMenu, page.tsx.

  **Baseline testes:** 879/116. CodeRabbit SKIPPED (precedente 3.1-5.6).
  **Git:** commits locais à frente de origin (push delegado a @devops após gate PASS).

