    - id: "D-3.3.1"
      topic: "<TaskListClient> wrapper client para bulk-selection context"
      decision: "Criar wrapper client que provê `useBulkSelection` context aos TaskRow filhos. RSC <TaskList> faz grouping server-side + passa sections+allTaskIds ao wrapper."
      rationale: "KISS — React useState + Context vs Zustand. Avoid hydration mismatch (sections calculadas server-side). Aligns com pattern Story 2.7 (RSC + client islands separation)."
      impact: "Estrutura limpa: page.tsx RSC → TaskList RSC (grouping) → TaskListClient client (state + bar) → SectionGroup → TaskRow client island"

