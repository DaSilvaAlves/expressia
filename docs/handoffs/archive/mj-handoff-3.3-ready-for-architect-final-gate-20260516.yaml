      impact: "BulkActionsBar tem state machine progress/success/partial/error com auto-clear 4s; InlineEditTitle tem role='alert' inline; RowActionsMenu usa alert() nativo para confirm Eliminar/Adiar"

    - id: "D-3.3.3"
      topic: "getTodayLisbon exportado para tests deterministicos"
      decision: "`getTodayLisbon(now: Date = new Date()): Date` é export público (não apenas helper interno). Permite tests passarem `now` fixo (2026-05-16T12:00Z) para reproducibility."
      rationale: "DST PT 2026 boundary tests precisam de exact reference date. Evita timing flakiness em CI."
      impact: "17 tests task-sections passam consistently; pattern reusable Story 3.7 (Inngest cron) + Story 6.x (Visão dashboard atrasadas)"

    - id: "D-3.3.4"
      topic: "BulkActionsBar usa Promise.allSettled (não Promise.all)"
      decision: "`Promise.allSettled(...)` permite progress counter incremental + partial failure handling proper. Counter `done` increment per task completion (ok ou fail)."
      rationale: "DP1-3.3 A intent — primeira rejeição não deve cancelar restantes. Audit_log per-row é mais granular FR21."
      impact: "Banner partial 'N de M atualizadas' real-time; user pode reverter manualmente as falhadas via UI"

