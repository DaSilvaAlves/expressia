      topic: "Toast UI deferred — usado alert() + banners inline"
      decision: "Para feedback em RowActionsMenu + BulkActionsBar + InlineEditTitle usar combo alert() (confirm destructivo) + banner inline reactive (status/alert role). Stack toast (sonner/react-hot-toast) deferred."
