consumed_outcome: |
  GO. Mecânica de auth+withHousehold em RSC/SSR confirmada e documentada na Adenda §10
  do ADR-003. withHousehold é agnóstico ao tipo de handler (só recebe {userId, householdId};
  zero dependência de Span/NextResponse/streaming). Auth RSC já existe inline nas 5 pages
  (createServerSupabaseClient + auth.getUser + resolveHouseholdId) — NÃO centralizar (UI de
  erro por-página). Âmbito refinado: superfície de edição = 5 SSR pages (patrimonio, cartoes,
  recorrentes, variaveis, este-mes), 1 getDb() cada. Os 8 helpers lib/finance são puros e
  ficam intactos (handoff dizia "4 helpers"; correcção factual na Adenda §10.5). Sem migration
  nova. Próximo: @sm draftar SEC-4 com o padrão da Adenda §10.3.

