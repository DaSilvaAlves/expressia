dev_decisions:
  - id: D-3.8.1
    severity: NORMAL
    title: 'T6.4 apply migration produção delegado a @devops'
    rationale: |
      Ambiente local @dev não tem credenciais Supabase produção. SQL é
      idempotente (`IF NOT EXISTS`) — safe para apply em produção sem riscos.
      T6.3 typecheck verde confirma sincronismo schema Drizzle ↔ SQL — qualquer
      divergência seria detectada antes do deploy. @devops corre
      `pnpm --filter @meu-jarvis/db db:migrate` contra ambiente alvo durante
      push pipeline.
    cross_confirm: 'T6.3 typecheck verde → array Drizzle agentIntentEnum em
                   `agent.ts` sincronizado com SQL (3 valores novos adicionados)'
    impact: 'Zero — pattern consistente com Stories 3.1/3.4/3.6 onde migrations
             SQL foram aplicadas no deploy pipeline @devops'

  - id: D-3.8.2
    severity: NORMAL
    title: 'Imports relativos `../contracts` dentro de packages/tools/src/tasks/'
    rationale: |
      Alias `@/` colide quando o package é consumido cross-package (apps/web
      tem `@/` → `apps/web/src/`). O alias `@/` no vitest config do package
      tools só funciona dentro do tools próprio. Imports relativos garantem
      que o package compila/testa correctamente em qualquer consumidor.
      Pattern consistente com a limitação já documentada em `contracts.ts`
      (linha 80, sobre `paths` alias do package db).
    cross_confirm: 'Constitution Article VI (absolute imports) — esta excepção
                   é dentro do source-only package sem build step; a regra
                   aplica-se a imports entre packages (`@meu-jarvis/*`), não
                   a imports relativos dentro do mesmo source tree.'
    impact: 'Zero funcional — apenas estilo. Documentado no JSDoc de cada
             ficheiro afectado para clarificar para futuros contributors.'

  - id: D-3.8.3
    severity: NORMAL
    title: 'Zod `default()` movido de inputSchema para body de execute()'
    rationale: |
      `z.optional().default(X)` cria input/output type asymmetric — `z.infer`
      resolve para o output type (default aplicado, required), mas
      `ToolDefinition<I>` espera `z.ZodType<I>` onde I é o parsed output type.
      O `_input` type asymmetric quebra a assignment a `inputSchema: z.ZodType<I>`.
      Solução: schema `.optional()` apenas; default literal aplicado em
      `execute()` via nullish coalescing (`input.priority ?? 'medium'`,
      `input.limit ?? 10`).
    cross_confirm: 'Funcionalidade equivalente — LLM continua a poder omitir
                   campos. Validação Zod activa. Default visível no
                   description PT-PT da tool (LLM auto-documentação).'
    impact: 'Zero — affecta `criar_tarefa.priority`, `listar_tarefas.limit`,
             `listar_atrasadas.limit`. Comportamento user-facing idêntico.'

