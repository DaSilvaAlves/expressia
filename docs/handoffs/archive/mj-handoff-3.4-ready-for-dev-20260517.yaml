# -----------------------------------------------------------------------------
# 8 GUIDANCE NOTES Aria para @dev impl (G1.x DP-3.4.4 + G2.x DP-3.4.6)
# -----------------------------------------------------------------------------
guidance_notes_for_dev:
  dp_3_4_4_virtualization:
    - id: "G1.1"
      note: |
        React.memo(KanbanCard, deepEqual) deve usar SHALLOW comparator (não deep).
        Props primitivas/refs estáveis: taskId, columnId, position, dueDate ISO string,
        priority enum, isOverdue boolean.
      why: "Deep equal em 50+ cards comparando objectos complexos pode comer o ganho de memo. Props primitivas faz React.memo default shallow ser suficiente."

    - id: "G1.2"
      note: |
        Token --kanban-column-min-tasks-virtualize: 50 deve ser declarado em
        apps/web/src/app/globals.css (ou módulo CSS Kanban dedicado) COM comentário inline
        "/* configurável — subir se famílias reais excederem */".
      why: "Auto-documenta o kill-switch para futuro maintainer. Token sem comentário é magia."

    - id: "G1.3"
      note: |
        Footer "Ver mais N →" deve fazer SCROLL VERTICAL INTERNO à coluna (não modal
        nem navegação). Implementação: click → column.scrollIntoView({ block: 'end',
        behavior: 'smooth' }) + revela cards adicionais incrementalmente (chunk size 25).
      why: "Modal/navegação quebra fluxo drag-and-drop. Scroll incremental mantém contexto visual."

  dp_3_4_6_batch_endpoint:
    - id: "G2.1"
      note: |
        Input schema Zod .strict() obrigatório em /api/kanban-columns/batch:
        {
          columns: [{ id: uuid, sort_order: int, name?: string, is_done_column?: boolean }],
          creates?: [{ name: string, color?: hex, sort_order?: int }],
          deletes?: [{ id: uuid, move_to?: uuid }]
        }
        Validações: (a) columns[].id ∈ household, (b) deletes[].move_to ∈ household e
        ≠ deletes[].id, (c) creates[].name ≠ existing names.
      why: "Schema explícito previne payload malicioso (inject coluna doutro household via UUID). .strict() rejeita campos extra (defesa em profundidade ataque payload bloat)."

    - id: "G2.2"
      note: |
        Ordem de operações dentro de db.transaction():
          (1) DELETEs primeiro — com UPDATE tasks SET kanban_column_id = move_to ANTES de DELETE
          (2) CREATEs depois
          (3) UPDATEs por último — incluindo sort_order rebalance + is_done_column toggle
      why: "Evita constraint violations transitórias (ex: UPDATE 2 colunas para sort_order=1 mid-transaction). Postgres faz unique check no COMMIT mas separação por fase reduz superfície de bug."

    - id: "G2.3"
      note: |
        Invariants pós-batch validados SERVER-SIDE PRÉ-COMMIT: SELECT count(*) +
        is_done_column count + names array → reject 422 UNPROCESSABLE_ENTITY com payload
        { violations: ['count_out_of_range', 'multiple_done_columns', 'duplicate_names'] }
        se qualquer falhar. Client recebe lista exacta para inline display.
      why: "App-layer enforcement em cima de DB constraints (migration 0011 cobre count ≤ 6 + partial unique done). Defesa em profundidade NFR5. Mensagens PT-PT no mapErrorToCopy()."

    - id: "G2.4"
      note: |
        Response shape: { columns: KanbanColumn[] } — estado FINAL completo do household
        pós-batch (NÃO diff). Client substitui state inteiro sem race com optimistic update.
        audit_log entry com after_state.changes_summary = {
          creates_count, updates_count, deletes_count, renames: [{id, from, to}]
        }
      why: "Optimistic update na Sheet pode divergir do estado server (sort_order rebalance). Response com estado completo permite client reconciliar deterministicamente. Summary em audit log dá traceability sem flooding after_state com snapshot completo."

