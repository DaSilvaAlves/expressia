  description: |
    @data-engineer (Dara) pode draftar migration 0011 EM PARALELO com @dev impl
    (não bloqueia start mas bloqueia merge final). Aria emitiu 3 G3.x technical
    notes no gate report e Architect Ratification Block:

    Migration: packages/db/migrations/0011_kanban_columns_schema_and_audit_enum.sql
    Consolidando 4 alterações:
      (a) ALTER TYPE audit_action ADD VALUE IF NOT EXISTS 'kanban_column.created';
      (b) ALTER TYPE audit_action ADD VALUE IF NOT EXISTS 'kanban_column.updated';
      (c) ALTER TYPE audit_action ADD VALUE IF NOT EXISTS 'kanban_column.deleted';
      (d) ALTER TYPE audit_action ADD VALUE IF NOT EXISTS 'kanban_column.batch_updated';
      (e) ALTER COLUMN is_done_column TYPE boolean USING is_done_column::boolean + DEFAULT false
      (f) CREATE UNIQUE INDEX kanban_columns_done_unique ON kanban_columns (household_id)
          WHERE is_done_column = true
      (g) ADD CHECK count ≤ 6 via trigger BEFORE INSERT OR UPDATE
          (Postgres não suporta subquery correlated em CHECK directo)

    G3.x notes Aria (HIGH confidence, todas baseadas em codebase real):
      G3.1: Migration 0011 pode ser UMA única migration consolidada — PG 12+ permite
            ALTER TYPE ADD VALUE em transaction desde que novos values não sejam USED
            na mesma transaction. Migration 0011 apenas adiciona + schema changes,
            zero INSERT. Precedent 0010 fez 13 ALTER TYPE em 1 transaction PASS.
      G3.2: Ordem dentro do ficheiro: (1) ALTER TYPE ADD VALUE × 4 primeiro idempotent,
            (2) ALTER COLUMN text→boolean, (3) ADD partial unique index (DEPENDE de step 2),
            (4) ADD CHECK trigger.
      G3.3: RLS policies (0001_rls_policies.sql:150-168) SAFE — 4 policies sem
            referência is_done_column.

