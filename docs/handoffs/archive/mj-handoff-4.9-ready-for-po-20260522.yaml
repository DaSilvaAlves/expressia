summary: |
  @sm River drafted a Story 4.9 do Epic 4 (Módulo Finanças): "Vista
  'Património' — balanço por banco/conta". Status Draft v1.0. Story file:
  docs/stories/active/4.9.finance-patrimony-view.story.md

  Vista `financas/patrimonio` (FR17) — saldo computado on-read de cada conta
  (DP1=A), agregado por banco, com património total e drilldown. É a ÚLTIMA
  vista do Módulo Finanças: após o merge, as 5 páginas `financas/*` estão
  entregues e `FinanceViewTabs` fica sem placeholders.

  Reuse-heavy sobre as Stories 4.6/4.7/4.8 (MoneyDisplay, FinanceViewTabs,
  FinanceEmptyState, padrão RSC fetch direct, helper db-injectável). Núcleo de
  risco — computação do saldo on-read — isolado no helper puro
  `getAccountBalances`. ~7 ficheiros novos + 2 modificados (FinanceViewTabs +
  MoneyDisplay). Zero migration, zero RLS, zero alteração de schema.

  8 ACs · 7 Tasks · 8 [AUTO-DECISIONS] D-4.9.1-8 · 6 riscos · 11 verificações
  anti-hallucination.

next_action: |
  `@po *validate-story-draft 4.9` — 10-point checklist + cross-confirm
  anti-hallucination contra o codebase real.

  DOIS recortes marcados explicitamente para confirmação do @po:
  - D-4.9.2 — `transfer` EXCLUÍDO da computação do saldo. Justificação: o
    schema modela uma transacção com um único account_id (não as duas pernas
    de uma transferência); a direcção é indeterminável; precedente D-4.6.5 /
    D-4.8.6 / R-4.10 do Epic exclui sempre transfer. Limitação conhecida do
    MVP — se o agregado usar transfers, o saldo não as reflecte.
  - D-4.9.7 — vista read-only; SEM caminho de criação de contas no scope do
    Epic 4. A lista de tools do cérebro (Epic §5 Story 4.10) NÃO inclui
    `create_account` — só `create_card`/`create_finance_*`. O único caminho de
    criação de conta é a API POST /api/financas/contas (Story 4.2). @po decide:
    aceitar a lacuna no MVP ou abrir story dedicada de gestão de contas.

  Restantes 6 AUTO-DECISIONS (D-4.9.1/3/4/5/6/8) são ratify silent.
  Após @po GO → `@dev *develop 4.9`.

