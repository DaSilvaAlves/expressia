decisions:
  - id: PO-5.4.A
    description: GO-WITH-FIXES 9.5/10 HIGH — story sólida, 2 PO_FIX_INLINE corrigem
                 itens reais não-críticos
    rationale: |
      10-point checklist 9/10 PASS + 1 N/A. Cross-confirm 8 verificações: 4 PASS
      EXACT + 2 PASS-COM-DRIFT trivial + 2 PO_FIX_INLINE + 1 GO-CONFIRM.
      Implementation Readiness Score 9.5/10 com 0.5 desconto pelos 2 fixes
      aplicados (não falhas críticas) + 2 drifts triviais (±1 linha).

  - id: PO-5.4.B
    description: F1 PO_FIX_INLINE aplicado — net change real +5 (não +10-15);
                 expected baseline 759→764 PASS
    rationale: |
      Grep `grep -c "it(\|test(" apps/web/src/app/(app)/jarvis/_components/__tests__/
      jarvis-chat.test.tsx` retornou 13 patterns. Cálculo aritmético:
      eliminação -13 + ChatPanel +8 + chatStore +8 + integration +2 + 4
      moved (0) + ChatPanelSlot ajustes (0) = +5 net. @dev mantém liberdade de
      registar [DEV-DECISION] D-5.4.X se contagem real diferir.

  - id: PO-5.4.C
    description: F2 PO_FIX_INLINE aplicado — two-step rename obrigatório para
                 3 renames tsx kebab→PascalCase em Windows MINGW64
    rationale: |
      `git config --get core.ignorecase = true` confirmado em ambiente local
      do Eurico (MINGW64_NT-10.0-26200 Windows 11 Pro). Renomeação directa em
      filesystem case-insensitive PODE falhar silenciosamente (ficheiro
      renamed mas git ainda vê só uma versão) ou criar duplicado ghost. Two-step
      rename via tempfile elimina o risco. Validação pós-rename obrigatória
      via `git status -s | grep` para detectar bug silencioso. Alternativa
      permitida temporariamente desactivar core.ignorecase=false. @dev escolhe
      e documenta em [DEV-DECISION].

  - id: PO-5.4.D
    description: F3 GO-CONFIRM positivo — imports unidireccional ratificado
                 (não-fix); T2.9 nova garante preservação pós-migração
    rationale: |
      Grep `grep -rE "from '@/app/(app)/jarvis/_components/'" apps/web/src/app/
      (app)/jarvis/_components/` retornou ZERO matches cíclicos. Pattern actual:
      jarvis-chat.tsx importa 4 sub-comp; cada test importa component testado.
      ZERO imports A↔B entre sub-componentes. T2.9 adicionada para @dev verificar
      pós-migração que estrutura unidireccional sobreviveu.

  - id: PO-5.4.E
    description: 7 DPs RATIFICADAS (DP-5.4.A a DP-5.4.G)
    rationale: |
      DP-5.4.A confirmada via grep architecture §8.4 linha 727 EXACT match.
      DP-5.4.B confirmada via precedente Stories 5.2+5.3 + F2 safety adicional.
      DP-5.4.C confirmada via architecture §8.3 + pattern shellStore Story 5.3.
      DP-5.4.D KISS aceite (95% lógica idêntica).
      DP-5.4.E racional sólido (chatStore não persiste).
      DP-5.4.F privacy + grep packages/db/src/schema/ zero matches chat_history.
      DP-5.4.G carry-over consciente Story 5.3 DP-5.3.D consistente.

  - id: PO-5.4.F
    description: 2 PASS-COM-DRIFT trivial aceites (line counts ±1)
    rationale: |
      ChatPanelSlot.tsx claim 134 vs real 133 — ±1 não-bloqueante.
      shellStore.ts claim 217 vs real 216 — ±1 não-bloqueante.
      Precedente Story 5.3 teve drifts análogos aceites pelo @po (layout.tsx
      59 vs 60; logout-action.ts 20 vs 21) — pattern consistente.

  - id: PO-5.4.G
    description: 2 carry-overs confirmados não-bloqueantes
    rationale: |
