po_fix_inline:
  - 'F1 (AC3 + AC6c) — guarda `total_amount_cents >= num_installments` no
     `InstallmentCreateSchema` via `.refine()`. Sem ela, `per_installment_cents
     = floor(total/num) = 0` faz os N-1 primeiros transactions terem
     `amount_cents = 0`, o que viola o CHECK `transactions_amount_positive`
     (finance.ts:422-423 — `amount_cents > 0`): o INSERT falha dentro de
     `db.transaction()`, faz rollback e o handler devolve 500 INTERNAL_ERROR
     em vez de um 400 VALIDATION_ERROR limpo. Mensagem PT-PT: "O valor total
     tem de ser pelo menos o número de parcelas (mínimo 1 cêntimo por
     parcela)." Test obrigatório em AC6 PASS (ex.: total=5, num=10 -> 400).'

decision_points_ratified:
  - 'DP-4.4.1 RATIFIED — namespace /api/financas/recorrencias + /prestacoes
     (precedente DP-4.2.1/DP-4.3.1 — padrão de rotas de todo o Epic 4).'
  - 'DP-4.4.2 RATIFIED — ficheiro distinto finance-recurrences.ts + exports
     FinanceRecurrence*. `api-schemas/recurrences.ts` confirmado existente e
     Tarefas-scoped (task_recurrences) — colisão de nome real. Mesma disciplina
     de scope do DP-4.3.2.'
  - 'DP-4.4.3 RATIFIED — recurrences DELETE soft via `active=false` (schema tem
     `active boolean`, NÃO tem `archived_at` — confirmado finance.ts:262);
     installments imutáveis, sem endpoint PATCH (coerente com 0014 que omite
     `installment.updated`).'
  - 'DP-4.4.4 RATIFIED — installments POST gera N transactions atomicamente via
     `getDb().transaction()`. `db-shim.ts:31` confirma `transaction<T>(fn)`.'
  - 'DP-4.4.5 RATIFIED — installments DELETE em cascata: DELETE transactions
     WHERE installment_id ANTES de DELETE installments, na mesma transacção.
     A ordem inversa viola o CHECK `transactions_installment_index_coherent`
     (finance.ts:425-428) via `ON DELETE set null`.'
  - 'DP-4.4.6 RATIFIED — cadência mensal das transaction_date a partir de
     first_installment_on (`first_installment_on::date + interval 1 month *
     (k-1)`).'

