  servidor com runId/traceId, 3 peças de causa raiz, ficheiros-chave com linhas).

  Decidir a abordagem do fix (provável combinação):
    1. Context injection — injetar lista de contas/cartões do household (id+nome)
       no system prompt do planner, substituindo os '<uuid>' placeholder literais
       (planner-system.ts:96/100/104). Montagem em
       apps/web/src/app/api/agent/prompt/route.ts.
    2. Conta "Dinheiro" default no onboarding — estender handle_new_user
       (0003_auth_user_trigger.sql) ou seed; tools usam-na como fallback quando
       o input não traz conta/cartão.
    3. Clarificação conversacional — cérebro pergunta "de que conta?" quando >1.

  Avaliar se requer mudança de schema (não deve — `accounts` já existe; a peça 2
  é INSERT no onboarding + delegar DDL a @data-engineer se mexer no trigger).

  Output esperado: decisão de design (qual combinação 1/2/3) + complexity
  assessment, para @sm draftar a story e @dev implementar (SDC normal).

  Respeitar directiva activa refocus_core_before_billing: este é CORE
  (cérebro+finanças a conectar de verdade), logo ALTA prioridade. NÃO billing.

