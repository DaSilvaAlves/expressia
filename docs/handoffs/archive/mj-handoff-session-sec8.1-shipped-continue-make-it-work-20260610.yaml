summary: >
  SESSION PAUSE — SEC-8 (Cérebro AI) e SEC-8.1 (hotfix crítico) EM PRODUÇÃO. O smoke E2E
  manual desta sessão (1.º exercício runtime real do withHousehold) revelou que a 2.ª rede
  RLS estava PARTIDA em runtime desde SEC-2 (02/06) — drizzle(pgTx) via pgSql.begin lançava
  TypeError, fazendo TODA a cadeia SEC-2→8 (109 call-sites) falhar com 500. Causa raiz
  diagnosticada + corrigida (withHousehold → db.transaction()), validada E2E no browser, gate
  @architect PASS 9,7/10 com counter-proof, pushed (prod d49f4db). A 2.ª rede RLS está agora
  GENUINAMENTE viva. NADA a meio, NADA bloqueado. PRÓXIMO: continuar core/make-it-work —
  exercitar E2E as outras áreas pela UI directa (os 109 call-sites nunca testados em runtime).

context: |
  ════════ ESTADO EM PRODUÇÃO (origin/main = d49f4db) ════════
  Esta sessão (aiox-master + Eurico) shipou DUAS coisas:
    1. SEC-8 (208a632) — Cérebro AI / executeAtomic via TxRunner→withHousehold (fecha Fase 4 ADR-003).
    2. SEC-8.1 (d49f4db) — HOTFIX crítico do withHousehold (ver abaixo). Working tree LIMPO.

  ════════ O BUG CRÍTICO QUE ENCONTRÁMOS (e corrigimos) ════════
  O smoke E2E do cérebro AI no browser (localhost:3000) deu erro 500 no confirm. Diagnóstico
  provado EMPIRICAMENTE contra a DB real (não especulação):
    - `withHousehold` (packages/db/src/client.ts) abria a tx com `pgSql.begin()` (postgres-js
      cru) + `drizzle(pgTx as unknown as Sql)`. Esse cliente Drizzle está PARTIDO: qualquer
      query lança `TypeError: Cannot read properties of undefined (reading 'parsers')` (o
      TransactionSql não tem `.options.parsers`).
    - Impacto: withHousehold é usado por 109 ficheiros (TODA a superfície SEC-2→8: Finanças,
      Tarefas, Visão, Household, Cérebro AI). TODOS rebentavam em runtime real desde SEC-2.
      A "2.ª rede RLS" que os gates afirmavam viva NUNCA funcionou em runtime — fazia a
      operação FALHAR com 500, não ficava "inerte".
    - Porque é que os gates não apanharam: os testes (incl. o AC9 da SEC-8) exercitavam uma
      RÉPLICA Drizzle (`db.transaction()`), nunca o `pgSql.begin` REAL de produção. Os gates
      @architect validaram o CÓDIGO byte-a-byte mas não o runtime real.
    - Segurança: a 1.ª rede (filtro household_id app-enforced) SEMPRE intacta → SEM vazamento
      cross-tenant em momento algum; o sintoma era só operações a falhar.

  ════════ A CORRECÇÃO (SEC-8.1, validada) ════════
  withHousehold reescrito para `db.transaction()` (Drizzle) + SET LOCAL ROLE authenticated +
  set_config(claims/householdId BOUND). 1 ficheiro de produção (client.ts), corrige SEC-2→8 de
  uma vez. Validado E2E no browser: prompt "gastei 13 euros no almoço e segunda-feira dia 15 às
  09h estar no notário em Tavira" → run fd0f96ee status=success, confirm 200 (era 500), despesa
  €13 (amount_cents 1300) + tarefa (due 15/06) gravadas correctamente, RLS activa (auth.uid()
  ≠ NULL). Gate @architect PASS 9,7/10 com COUNTER-PROOF independente (reverteu o fix → 3 testes
  falham com TypeError; restaurou → 3/3 GREEN). Novo teste `packages/db-test/src/tests/
  withHousehold.rls.test.ts` exercita o withHousehold REAL via DATABASE_URL→Testcontainer.

  ════════ LIÇÃO (registada em memória) ════════
  Gates que validam código byte-a-byte + testes com RÉPLICAS podem passar enquanto o caminho de
  produção real está partido. Só o smoke E2E em runtime real apanhou. Gates RLS DEVEM exercitar
  o código de produção (withHousehold real via Testcontainer), nunca uma réplica. O novo
  withHousehold.rls.test.ts é o template de referência. DIRECTIVE no commit: withHousehold DEVE
  usar db.transaction(), NUNCA pgSql.begin()+drizzle(pgTx).

  ════════ AMBIENTE PARA RETOMAR O SMOKE E2E ════════
  - Dev server: `pnpm --filter @meu-jarvis/web dev` (localhost:3000). Pode já estar a correr no
    terminal antigo — se sim, mexer em packages/db precisa de RESTART (matar porta 3000 e
    rearrancar) para carregar código transpilado.
  - User de teste do Eurico (já confirmado, logado): user_id df5b403f-dedd-47a5-a960-b66c6dc7faab,
    household_id 2dedb1ec-dc6f-4445-a5b4-b5f942755655. Email euricojsalves@gmail.com.
  - "Confirm email" está ON no Supabase (religado 31/05) — registar novo user exige confirmar;
    para teste sem inbox usar `packages/db/src/scripts/dev-confirm-user.ts`.
  - Smoke do cérebro AI: chat → prompt multi-intent → preview "Vais fazer" → Confirmar → deve dar
    "Feito ✓" + undo 30s; verificar /visao. Logs do dev server mostram POST .../confirm 200|500.
  - Ler error real de uma run: SELECT error_code, error_message FROM agent_runs WHERE id=...
    (o confirm grava lá a causa quando falha).

