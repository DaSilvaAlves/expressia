summary: >
  Investigação do C1 (GAP-4 Inngest em prod) virou o problema do avesso. As 2 env
  vars (INNGEST_EVENT_KEY + INNGEST_SIGNING_KEY) JÁ ESTÃO na Vercel, scope
  Production, desde 20/05 (confirmado por screenshot do Eurico). O endpoint
  /api/inngest está montado e a validar assinatura (GET → 401 = signing key
  activa). O VERDADEIRO bloqueio das recorrências em prod NÃO são as keys — é o
  DNS: o domínio expressia.pt NÃO resolve (sem registo A no Cloudflare desde
  20/05, carry-over DNS-001). O Inngest Cloud regista as funções em
  https://expressia.pt/api/inngest, que não resolve, por isso o cron nunca
  dispara. O site público inteiro só está acessível em expressia-black.vercel.app.
  Eurico escolheu o CAMINHO MAIS FÁCIL / MENOS COMPLICAÇÕES agora e migrar para
  terminal novo. Caminho fácil = re-sync do Inngest no domínio que JÁ resolve
  (vercel.app), sem tocar no Cloudflare. DNS-001 (registo A para o domínio
  público) fica como tarefa separada, necessária antes de lançamento público mas
  NÃO necessária para desbloquear as recorrências.

