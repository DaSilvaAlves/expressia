dps_to_ratify:
  - id: "DP-3.4.1"
    topic: "Drag handle no card (todo o card vs ícone ⋮⋮)"
    uma_recommendation: "A — Todo o card draggable (Trello/Notion/Linear padrão; activationConstraint distance: 8 distingue click de drag)"
    priority: MEDIUM
    suggested_action: "APPROVE silent (UX choice consolidada na indústria)"

  - id: "DP-3.4.2"
    topic: "Click no body do card (EditTaskModal vs inline edit)"
    uma_recommendation: "A — EditTaskModal (drag conflitaria com inline edit; modal dá mais espaço)"
    priority: MEDIUM
    suggested_action: "APPROVE silent (aligned com pattern Story 3.3 RowActionsMenu)"

  - id: "DP-3.4.3"
    topic: "Filter bar na Kanban (sem filtros vs subset Lista vs completo)"
    uma_recommendation: "B — Subset (search + tag) (úteis em Kanban; filtros data/projecto são mais Lista)"
    priority: MEDIUM
    suggested_action: "APPROVE silent (KISS — Story 3.6 substituirá tag dropdown)"

  - id: "DP-3.4.4"
    topic: "Threshold virtualização (50 vs 100 tasks/coluna vs sempre)"
    uma_recommendation: "A — 50 tasks/coluna (famílias MVP raramente > 50; threshold dá margem; token configurável)"
    priority: HIGH
    suggested_action: "RATIFY explicit — afecta AC14 budget + token `--kanban-column-min-tasks-virtualize`. Aria pode confirmar que naive-first (sem virtualização) + footer 'Ver mais N →' é suficiente para MVP Fase 1."

  - id: "DP-3.4.5"
    topic: "Haptic feedback mobile (navigator.vibrate(10) vs não)"
    uma_recommendation: "A — Sim (custo 1 linha, impacto UX mobile; feature-detect obrigatório)"
    priority: LOW
    suggested_action: "APPROVE silent (1 linha + feature-detect = baixo risco)"

  - id: "DP-3.4.6"
    topic: "Batch save column config (single PATCH batch transacção vs múltiplos PATCHs)"
    uma_recommendation: "A — Single PATCH /api/kanban-columns/batch (atomicidade; alinha pattern Story 3.2)"
    priority: HIGH
    suggested_action: "RATIFY EXPLICIT — Story 3.4 AC11 implementa A com db.transaction(). Aria deve validar design batch endpoint shape (input schema: columns[] + creates?[] + deletes?[] + invariants pós-batch 3≤count≤6 + exactly 1 is_done_column=true + names únicos). Decisão chave porque @dev impl T3.3."

  - id: "DP-3.4.8"
    topic: "Mobile coluna (full-width snap forte vs 1.5 colunas vs 2 colunas tap-zoom)"
    uma_recommendation: "A — 1 coluna full-width snap forte (padrão Trello/Asana mobile)"
    priority: LOW
    suggested_action: "APPROVE silent (alinhado AC13 + R7 mitigation)"

  - id: "DP-3.4.9"
    topic: "Coluna Concluído → animação especial (normal vs check icon + fade strike-through 800ms)"
    uma_recommendation: "B — Check icon + fade strike-through 800ms (delight; alinhado micro-interaction Lista)"
    priority: LOW
    suggested_action: "APPROVE silent (delight + consistente com Lista)"

