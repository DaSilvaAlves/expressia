summary: |
  Verificação EB4 (Inngest workspace EU Frankfurt provisioning) executada
  pelo @devops Gage em 2026-05-19 22:15Z. **Resultado: CASO 3 — EB4
  BLOCKED (workspace NÃO provisionado).** Evidência concreta cruzada
  via 4 fontes independentes mostra que o runbook
  `docs/runbooks/inngest-setup.md` Step 1-4 NUNCA foi executado, apesar
  do código Inngest da Story 2.8 estar em produção há ~8 dias. Story 3.7
  (cron `generate-recurring-tasks`) push para produção VAI falhar pelo
  mesmo motivo se for tentada sem provisioning prévio.

  **Cadeia de evidência (4 fontes):**

  (1) **Vercel env vars Production:** `vercel env ls production` corrido
  pelo @devops (auth `euricojsalves-4744` válida, projecto
  `expressia` org `team_Z7HN1UF28iHpUxCnZ4gT7wMF`) → 16 env vars
  registadas (Sentry/Supabase/Anthropic/OpenAI/Grafana/etc.) **ZERO
  Inngest**. Nem `INNGEST_EVENT_KEY` nem `INNGEST_SIGNING_KEY`
  existem em Production.

  (2) **Vercel env vars Preview:** `vercel env ls preview` → mesmas 15 vars
  (KANBAN_AUDIT_ENABLED só Production). **ZERO Inngest** também em
  Preview. Ou seja, o workspace `expressia-dev` do runbook Step 1.4
  também nunca foi criado.

  (3) **Production deploys existem mas inacessíveis publicamente:**
  `vercel ls --prod` → 4 deploys Ready em 2h (HEAD `expressia-ds11jab2m
  -euricojsalves-4744s-projects.vercel.app`). Tentativa
  `curl https://expressia-ds11jab2m-.../api/inngest` retorna **HTTP 401
  `{"message":"Unauthorized"}`** — Vercel SSO gate em URLs `.vercel.app`
  brutos (esperado, não é erro Inngest). Tentativa `curl https://
  expressia.pt/api/inngest` → **DNS unresolved** (`curl (6) Could not
  resolve host`). `vercel domains ls` confirma `expressia.pt` registado
  como Vercel domain (Third Party registrar, 51d idade) mas DNS/NS
  ainda não configurados — Step 3 do runbook (`https://expressia.pt
  /api/inngest`) não é ainda chamável por Inngest Cloud mesmo que o
  workspace existisse.

  (4) **Código Inngest deployed mas inerte:** Read confirmado em
  `apps/web/src/lib/inngest/client.ts` (Inngest client `id:
  'expressia-web'`), `apps/web/src/app/api/inngest/route.ts` (serve()
  GET/POST/PUT handler), `apps/web/src/lib/inngest/functions/cleanup
  -expired-reverse-ops.ts` (cron `0 3 * * *`). **Comments inline da
  Story 2.8 explicitamente avisam:** `apps/web/src/lib/inngest
  /client.ts:7-8` documenta "vazias em dev local — usar `npx
  inngest-cli dev` para engine local; em prod Vercel as keys são
  populadas pelo runbook `docs/runbooks/inngest-setup.md`". Story 2.8
  AC4 (linha 77 da story file) tagged literalmente: "Status:
  instruções para @devops Eurico-side antes do push." Inferência:
  AC4 foi marcado [x] (instruções escritas) mas o runbook em si nunca
  foi executado pelo Eurico — push 2.8 ocorreu sem os secrets em
  Vercel, função `cleanup_expired_reverse_ops` está deployed mas
  Inngest Cloud NUNCA chamou o endpoint (sem signing key, e DNS
  expressia.pt ainda não resolve para registar URL pública).

  **Impacto operacional:**

  - Story 2.8 cron `cleanup-expired-reverse-ops` (housekeeping
    `agent_reverse_ops` table) — **NÃO executa em produção há ~8 dias**.
    Risco: tabela `agent_reverse_ops` pode acumular rows (não crítico
    porque TTL `expires_at` já elimina pela lógica de application
    quando endpoint `/undo` faz claim; mas housekeeping job nocturno
    não está activo). Mitigação aplicação-side existe (D38 Architecture
    cron ≥2 jobs trigger refactor pendente).
  - Story 3.7 (Recurrences) — **push impossível para produção sem
    provisioning prévio**. Pre-condição EB4 explicitamente bloqueia
    Phase 5 SDC `@devops *push 3.7`. Drafting + implementação local
    permanecem possíveis (mockable via `npx inngest-cli dev` per AC
    Story 3.7 quando @sm draftar).
  - **Domain `expressia.pt`:** Vercel knows o domínio mas DNS
    nameservers Third Party ainda não apontam — segundo gap
    infrastrutural que deve ser resolvido antes do go-live público
    (mesmo sem Inngest, qualquer SEO/marketing depende disto). Não é
    estritamente bloqueador EB4 — Inngest Cloud pode ser configurada
    para apontar a `<vercel-prod-url>.vercel.app` interim — mas é
    inelegante. **OUT OF SCOPE deste verify-eb4** — documentado aqui
    para visibilidade Eurico.

