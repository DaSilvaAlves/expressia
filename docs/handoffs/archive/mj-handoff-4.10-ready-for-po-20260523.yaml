summary: |
  Story 4.10 — Tools do cérebro Finanças — Draft v1.0 criada por @sm (River) e
  pronta para validação @po. É a ÚLTIMA story do Epic 4 — após ciclo
  validate→dev→gate→push, Epic 4 = 10/10 Done.

  Scope: 5 tools concretas em EN (per Epic §5 literal) em
  `packages/tools/src/finance/`, espelhando a estrutura da Story 3.8
  (tools Tarefas):
    1. `create_finance_variable` — transacção variável (INSERT em
       `transactions`, reverse delete_row).
    2. `create_finance_recurrence` — recorrência (INSERT em `recurrences`,
       reverse delete_row).
    3. `create_card` — cartão de crédito/débito (INSERT em `cards`, reverse
       delete_row).
    4. `create_installment` — compra parcelada (INSERT em `installments` +
       N transactions atomicamente; reverse composite ANINHADO).
    5. `query_finance_summary` — read-only consulta sumário do mês
       (consome helpers `getMonthSummary` da 4.6 + `getAccountBalances` da
       4.9; reverse sentinela `_noop` pattern 3.8 R1b).

  Bumps prompts versionados:
    - classifier v1 → v2 (header "11 intents canónicos"; 5 few-shots Finance).
    - planner v1 → v2 (11 intents; 5 few-shots Finance; corrige drift
      `create_task` → `criar_tarefa` no Exemplo 1; substitui Exemplo 3 por
      `create_installment` único).

  Zero migration (D-4.10.2): todas as 5 intents `criar_financa_*`/
  `criar_cartao`/`criar_parcelada`/`consultar_dados` já estão em
  `agent_intent` desde a migration `0000_initial_schema.sql:125`.

  FUP-4.9.A honrado: SEM `create_account` no scope (D-4.9.7 da Story 4.9
  validada pelo @po Pax 2026-05-23).

next_action: |
  No próximo terminal (ou aqui mesmo se @po activar-se nesta sessão):

    @po *validate-story-draft 4.10

  Executar o 10-point checklist + cross-confirm anti-hallucination das 15
  verificações documentadas em §"Anti-Hallucination Verificações Executadas".
  Atenção especial às 4 DPs em §"Decisões Pendentes de Validação @po":

    - DP-4.10.A (naming EN vs PT) — recomendação @sm: A (aceitar heterogeneidade;
      Epic literal manda EN; refactor de 3.8 é scope creep e parte snapshot
      test). @po decide se concorda ou exige refactor.

    - DP-4.10.B (`monthAnchor` parametrizado em `query_finance_summary`) —
      recomendação @sm: A (parametrizado; espelha `getMonthSummary` da 4.6).

    - DP-4.10.C (`kind` só `expense`/`income` em `create_finance_variable`/
      `create_finance_recurrence`) — recomendação @sm: B (sem `transfer`;
      schema modela 1 `account_id` único, precedente D-4.6.5/D-4.8.6/D-4.9.2).

    - DP-4.10.D (`categoryId` fallback "Outros") — recomendação @sm: B
      (resolve "Outros" via SELECT em `categories WHERE household_id IS NULL
      AND slug='outros' LIMIT 1` do seed `0001_default_categories.sql`).

  Atenção também à R-4.10.4 — Task 11 do plano: validar a ordem de execução
  das ops dentro de um composite reverse_op no endpoint `/undo` (FIFO/LIFO/
  paralelo). A ordem afecta a viabilidade do composite aninhado de
  `create_installment` (transactions devem ser apagadas ANTES do installment
  row para evitar CHECK `transactions_installment_index_coherent`).
  Recomendação @sm: investigar no T11 da implementação; se LIFO, ajustar
  ordem no payload de reverse_op.

  Se @po der GO: criar handoff sucessor `mj-handoff-4.10-po-go-to-dev-
  20260523.yaml` para `@dev *develop 4.10`. Se NO-GO: handoff de volta para
  `@sm` com lista de fixes.

