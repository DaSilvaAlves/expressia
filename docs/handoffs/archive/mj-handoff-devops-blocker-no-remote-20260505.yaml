decisao_pendente_do_eurico:
  opcao_a:
    label: Criar repo privado meu-jarvis em github.com/DaSilvaAlves
    comando: |
      gh repo create DaSilvaAlves/meu-jarvis --private \
        --description "Expressia (codinome meu-jarvis) — SaaS família PT-PT, Next.js 15 + Supabase + Drizzle, Frankfurt"
      git remote add origin https://github.com/DaSilvaAlves/meu-jarvis.git
      git push -u origin main
    riscos:
      - Repo torna-se visível no perfil GitHub (mesmo privado, contagem visível)
      - Não há branch protection configurado ainda — push directo a main permitido
      - GitHub Actions CI vai correr na primeira run — verificar quotas
    mitigacoes:
      - Privado por defeito (--private)
      - Branch protection pode ser configurada após primeiro push via *setup-github
      - Quotas GitHub Actions: 2000 min/mês free, suficiente para projecto inicial

  opcao_b:
    label: Criar repo público meu-jarvis em github.com/DaSilvaAlves
    nao_recomendada: true
    razao: |
      Repo contém SaaS comercial (Expressia) com decisões estratégicas, design
      decisions A-G, pricing (€8,88), e tech stack interna. Manter privado até
      lançamento público.

  opcao_c:
    label: Adiar push, manter trabalho local-only
    razao_aplicavel: |
      Se o Eurico ainda não está pronto para sincronizar com GitHub, o trabalho
      Story 1.4 fica seguro em main local. Próximas stories podem continuar
      offline. Risco: sem backup remoto, se a máquina falha o trabalho perde-se.

  recomendacao: opcao_a (privado, criar agora)
  rationale: |
    - Backup remoto crítico (4 stories Epic 1 já concluídas, ~100 ficheiros código)
    - GitHub Actions CI já configurado em .github/workflows/ci.yaml — só funciona
      com remote
    - Branch protection + CodeRabbit + DevOps pre-push hooks dependem de remote
    - Privado mantém confidencialidade comercial até MVP launch

