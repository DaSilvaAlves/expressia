dev_focus_points:
  - title: "Article IV — naming reality"
    detail: >
      Usar SEMPRE nomes reais do schema agent (carry-over Story 2.1):
      - `intent_classifications` (NÃO `agent_intents`)
      - `agent_runs.tool_calls` JSONB (NÃO tabela `agent_tool_calls`)
      - `agent_runs.intents_detected` JSONB
      Cross-check: `packages/db/src/schema/agent.ts` (linhas 36-61 enums).
      Derivar `LlmModel` do enum real exportado de `@meu-jarvis/db` —
      NUNCA duplicar valores literais.

  - title: "Resistir a alargar scope (NÃO entregar nesta story)"
    detail: >
      ❌ Pipeline lógica (Classifier 2.4, Planner+Executor 2.5)
      ❌ Tool registry contract definitivo (Story 2.3)
      ❌ Endpoint /api/agent/prompt (Story 2.6)
      ❌ Tools concretas (`create_task`, etc. — Stories 2.3, 3.x, 4.x)
      ❌ Real E2E API calls (Story 2.10 benchmark)
      ❌ Distributed circuit breaker via Upstash (Story 2.9)
      Esta story entrega APENAS contracts + 2 adaptadores + retry/CB
      in-memory + errors + tracing reuse + tests com mocks.

  - title: "Reuse `@meu-jarvis/observability` — não duplicar"
    detail: >
      AC8/AC9 obrigam uso dos exports de `packages/observability/src/index.ts`:
      - `withSpan` para tracing
      - `annotateSpan` para attributes
      - `recordSpanError` para errors
      - `logger`/`childLogger` para logs estruturados
      - `hashForCorrelation` para correlation IDs sem PII
      - `PII_REDACT_PATHS` para reuse na redaction layer
      NUNCA criar novo logger Pino, novo tracer OTel, ou redefinir
      `PII_REDACT_PATHS`. EPIC-2-EXECUTION ED3.

  - title: "PII redaction obrigatória"
    detail: >
      AC9: prompt content, messages, tools input_schema NUNCA aparecem em
      logs/Sentry/span attributes. Helper `redactProviderPayload` shallow
      copy + `householdHash = hashForCorrelation(householdId)`. AC8: span
      attributes WHITELIST (provider, model, tokens, cost, latency, cache,
      retry_count, fallback_used, trace_id) — sem prompt/messages/tools.
      Errors `message`/`userMessage` PT-PT sem PII.

  - title: "Pattern de mock Vitest (refinado pelo @po)"
    detail: >
      Dev Notes secção "Padrão de mock Vitest para SDK Anthropic" tem o
      pattern canónico actualizado pelo @po: usar `vi.hoisted()` para
      criar `messagesCreate` ANTES de `vi.mock()` (evita race em hoisting).
      `beforeEach(() => { messagesCreate.mockReset(); })`. Para erros usar
      `mockRejectedValueOnce(Object.assign(new Error('...'), { status: 429 }))`.
      Pattern análogo para `openai` SDK com `chat.completions.create`.

  - title: "Imports absolutos + PT-PT"
    detail: >
      CON5/NFR19: `@/contracts`, `@/errors`, `@/providers/anthropic`. NUNCA
      relativos `../../`. Comments + error messages + doc strings em PT-PT.
      No `any` em TS — usar `unknown` + type guards para SDK errors.
      No `console.log` — sempre Pino via observability.

