  Aria recomendação (G3.1/G3.2/G3.3 do gate report):
    - **Single consolidated migration** OK (PG 12+ permite ALTER TYPE ADD VALUE
      dentro de transaction desde que novos values NÃO sejam USED na mesma
      transaction — esta migration apenas adiciona+altera schema, zero INSERT).
    - **Ordem dentro do ficheiro:**
      1. ALTER TYPE audit_action ADD VALUE IF NOT EXISTS × 4 (idempotent)
      2. ALTER COLUMN is_done_column text → boolean USING is_done_column::boolean
      3. ADD partial unique index ON (household_id) WHERE is_done_column = true
      4. ADD CHECK constraint count(*) ≤ 6 per household (via trigger BEFORE
         INSERT OR UPDATE — PG não suporta subquery em CHECK directo)
    - **RLS policies actuais** (`0001_rls_policies.sql:150-168`) já confirmadas
      compatíveis text→boolean (zero referência is_done_column nas 4 policies).

  4 enum values a adicionar:
    - kanban_column.created
    - kanban_column.updated
    - kanban_column.deleted
    - kanban_column.batch_updated

  Precedent: migration 0010 (Story 3.2) fez 13 ALTER TYPE ADD VALUE numa única
  transaction → PASS. Mesmo pattern aplicável aqui.

