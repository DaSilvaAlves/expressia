  (lines 215-242) + Story 3.1 v1.3 Done APPROVED 9.5/10 HIGH precedente
  template. **13 ACs + 8 Tasks/Subtasks + 4 Decision Points + NFR Coverage
  + Risks R2/R4 mitigation.**

  **Scope:** API surface (15+ Next.js Route Handlers) sob
  `apps/web/src/app/api/{tasks,tags,recurrences}/` com Zod schemas
  centralizados em `apps/web/src/lib/api-schemas/` (DP1-3.2 recommendation
  A inline), auth Supabase JWT + RLS automático via `getDb()`, paginação
  cursor-based (DP3-3.2), drag-and-drop atómico, tags pivot CRUD, soft
  delete via `status='archived'` (DP2-3.2), defer `kanban_columns` CRUD
  para Story 3.4 (DP4-3.2). ~69 integration tests mockable-friendly
  pattern Stories 2.6-2.11.

  **Cross-confirm anti-hallucination contra codebase real (8 fontes
  verified):** schema tasks.ts:59-221 + tenancy.ts:152-173 + RLS
  0001:150-435 + client.ts:36-86 (getDb/getServiceDb) + errors.ts:43-60
  (apiError) + conta/preferencias/route.ts (template canónico Story 2.7)
  + agent/prompt/__tests__/route.test.ts:1-80 (mockable-friendly Vitest
  pattern Story 2.6) + packages/auth/src/server.ts
  (createServerSupabaseClient).

  **@po executa:** `*validate-story-draft 3.2` com 10-point checklist +
  cross-confirm anti-hallucination contra mesmas 8 fontes (defensive
  re-verify) + PO_FIX_INLINE se detectar gaps. 4 DPs aguardam Eurico
  ratify OR @po silent accept per pattern Stories 2.X+3.1.

