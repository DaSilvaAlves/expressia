  `@architect *qa-gate 5.6` — quality gate da Story 5.6.

  **Pontos que requerem ratificação arquitectural (deferidos ao gate):**

  - **DP-5.6.A = B (RATIFICAR):** o SQL dos 7 route handlers `/api/visao/*`
    (código Story 5.5 recém-gated) foi extraído para
    `apps/web/src/lib/visao/queries.ts` (7 funções: getTasksToday,
    getTasksOverdue, getFinancesMonth, getRecurrencesNext, getAccountsBalance,
    getCalendarWeek, getBriefing). Os handlers ficaram **wrappers finos** —
    chamam a função + **mesmo `Zod.parse()` + mesmo `NextResponse.json<T>(validated)`
    + mesmo `getDb()`/`requireAuth`**. Contrato HTTP **preservado 1:1**.
    Os widgets RSC chamam as funções directamente via `getDb()` de
    `@/lib/agent/db-shim` (sem HTTP self-call — NFR2/NFR4). Era o "ajuste minor"
    antecipado por CO-5.5.A.
    **Evidência do contrato 1:1:** os 21 testes de route handler existentes
    (`apps/web/src/app/api/visao/__tests__/*`) passaram **INALTERADOS** após o
    refactor — verificar que confirma a equivalência.

  - **DP-5.6.F (RATIFICAR):** mobile "tasks_today primeiro" implementado via
    **CSS `order-first md:order-none`** no item `tasks_today` do grid (não
    reordenação condicional). Mantém fonte única da ordem (`WIDGET_ORDER`),
    ordem DOM/tab canónica (WCAG 1.3.2 — só a ordem visual flexbox muda em mobile).

  **Verificar também:**
  - RLS NFR5: só `getDb()` (authenticated), zero `getServiceDb()` em código de
    utilizador. `check:rls` EXIT 0 INALTERADO (28 tabelas).
  - REQ-INLINE-1: `getDb` via `@/lib/agent/db-shim`; só imports de **tipo** de
    `@meu-jarvis/db` (`WidgetsEnabled`/`WidgetId`).
  - PO-FIX-1 (calendar_week footer → `/tarefas/calendario`) + PO-FIX-2
    (`DEFAULT_WIDGETS_ENABLED` local + parity guard) honrados.
  - FUP-5.5.B (LOW, não-bloqueante): predicado RLS redundante explícito não foi
    adicionado nas queries extraídas — RLS já cumprida pelo JWT; deixar como
    follow-up se @architect quiser defesa em profundidade.

