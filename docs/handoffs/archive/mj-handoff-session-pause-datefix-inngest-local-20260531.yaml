context: |
  **Handoff-mãe (LER PRIMEIRO):** mj-handoff-refocus-core-freeze-billing-20260529.yaml
  — directiva billing-CONGELADO / core-first, mantém-se pending por desenho.

  **O que esta sessão fez, em detalhe:**

  1. BUG-FIX "AMANHÃ" (commit 4f11eaf, PUSHED origin/main). Sintoma: o cérebro AI
     criava tarefas com data relativa errada — "amanhã reunião" caía em 2026-05-24
     (passado) em vez de 01/06. Causa raiz: o Planner (packages/planner-executor)
     nunca injectava a data actual na mensagem ao LLM, por isso o modelo copiava as
     datas ILUSTRATIVAS dos exemplos few-shot do system prompt (Exemplo 1 tinha
     dueDate '2026-05-24' literal). Fix: (a) planner.ts injecta um prefixo
     "[Data de hoje]" na user message — hoje + amanhã pré-calculado + dia da semana,
     derivados no fuso Europe/Lisbon (evita escorregão à meia-noite em Vercel fra1
     UTC); (b) schemas.ts ganha campo opcional currentDate (override p/ testes);
     (c) planner-system.ts ganha secção "DATA E PRAZOS" + bump versão v3->v4 +
     aviso de que as datas dos exemplos são ilustrativas. 5 ficheiros (3 código +
     2 testes). 5/5 quality gates GREEN re-corridos: lint exit 0 · typecheck 10/10
     · test (incl. db-test 152/152 RLS contra Postgres real) · build (Middleware
     94,6 kB intacto) · check:rls exit 0. Provado E2E na app: "amanhã reunião às
     16h" -> tarefa em 01/06/2026 (hoje=31/05). CodeRabbit SKIPPED (precedente).

  2. GAP-4 INNGEST — RECORRÊNCIAS PROVADAS LOCALMENTE (sem chaves cloud). Caminho:
     `npx inngest-cli@latest dev -u http://localhost:3000/api/inngest` arranca o
     Inngest Dev Server local (painel http://localhost:8288, engine sqlite em
     memória, ZERO chaves/conta necessárias — Step 5 do runbook). As 3 funções
     sincronizaram (Cleanup expired reverse ops, Generate finance recurrences,
     Generate recurring tasks). Validação E2E: Eurico criou "renda de 600 euros
     todo dia 1" via chat -> recorrência aparece no widget "Próximas Recorrências"
     da /visao (prova a criação, NÃO precisa de Inngest). Depois "Invoke" da função
     Generate finance recurrences no painel -> run Completed em ~1s, zero erros
     (prova o motor cron ligado à app). Hoje materializa 0 transacções (a renda só
     vence dia 1, next_run_on=01/06) — comportamento CORRECTO. Ambas as funções de
     recorrência são cron diário '0 3 * * *' (apps/web/src/lib/inngest/functions/).
     Conclusão: a engrenagem de recorrências está completa e funcional localmente;
     só falta provisionar as chaves de PRODUÇÃO no dia do deploy.

  **GOTCHA NOVO (importante p/ próximas sessões):** NÃO correr `pnpm build` e
  depois `next dev` partilhando a mesma pasta apps/web/.next — os artefactos de
