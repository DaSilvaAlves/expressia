      fallback.

    estado_tecnico_actual:
      - "`RESEND_API_KEY` declarado em .env.example (linha 55, 'Email transaccional (Resend, EU)'). Confirmar se está definido em prod (Vercel) — o Resend HOJE só está ligado via SMTP do Supabase para emails de AUTH (registo/confirmação/reset, provado E2E — memória go_live_email_live)."
      - "NÃO existe lib/helper de envio de email custom na app (sem package @meu-jarvis/email, sem sendEmail). Enviar email de convite é via API Resend DIRECTA (não o fluxo de auth do Supabase) → trabalho novo."
      - "Handler do convite: apps/web/src/app/api/conta/household/invites/route.ts (POST, ~linha 165-225). Já constrói o convite e devolve acceptPath. O link absoluto na UI é window.location.origin + acceptPath; num email server-side usar a origin de confiança (env SITE_URL=https://expressia.pt já em prod; ver .env.example linha 78 sobre origin de confiança para links de email)."
      - "Template/copy: PT-PT obrigatório. Remetente: confirmar domínio Resend (memória soft_launch: `@expressia.pt` no Resend é Caminho B, pode ainda não estar verificado — validar)."

    decisoes_a_tomar_po_architect:
