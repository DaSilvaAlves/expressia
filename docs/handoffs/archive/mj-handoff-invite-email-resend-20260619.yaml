  estado_a_preservar:
    HOTFIX_0024_EM_PROD_POR_COMMITAR:
      o_que: >
        Bug real apanhado pelo smoke INVITE-E2E em prod (expressia.pt): criar/listar
        convites dava 500. Causa-raiz (log Vercel): SQLSTATE 42501 "permission denied
        for table users". A policy `household_invites_select_household_or_invited`
        (0001_rls_policies.sql:117-124) acedia `auth.users` INLINE:
        `or email = (select email from auth.users where id = auth.uid())`.
        A subconsulta corre como role `authenticated` (sem SELECT em auth.users) → 42501.
        Como o POST faz INSERT...RETURNING, o RETURNING avalia a policy SELECT → o INSERT
        também rebentava. (Era a ÚNICA policy do schema com auth.users inline.)
      fix: >
        Nova migration `packages/db/migrations/0024_fix_invites_select_policy_auth_users.sql`:
        função `public.current_user_email()` SECURITY DEFINER (padrão idêntico a
        is_household_member; devolve só o email do próprio auth.uid()) + recriação da
        policy a usá-la. NÃO se fez `GRANT SELECT ON auth.users TO authenticated` (inseguro).
      validado: >
        Revisão @data-engineer = APROVADO. Suite RLS local (Testcontainers, Docker) aplicou
        TODAS as migrations incl. 0024 e passou 12/12 (9 accept_invite + 3 household_invites.rls).
        APLICADO EM PROD via `pnpm --filter @meu-jarvis/db db:migrate` (DIRECT_URL) — sucesso.
        Re-teste em prod: GET/POST /invites passaram a 200 (antes 500); zero 42501 nos logs.
      ACCAO_DEVOPS_URGENTE: >
        Commitar `packages/db/migrations/0024_*.sql` ao repo (branch própria a partir de main +
        PR, ou conforme estratégia @devops) — o ficheiro está SÓ no working tree mas a migration
        JÁ corre em prod (registada em __schema_migrations). Sem commit, o repo diverge de prod.
      nota_0023: >
        O runner também (re)aplicou a 0023_finance_cross_tenant_fk_guard.sql — não estava
        registada em __schema_migrations em prod (apesar de a memória a dar como aplicada).
        É idempotente (drop+create trigger), re-aplicação inócua. Mas indica POSSÍVEL
        dessincronização do tracking de migrations em prod — vale a pena o @data-engineer/@devops
        auditar `__schema_migrations` vs ficheiros 0000..0024 num momento calmo.

