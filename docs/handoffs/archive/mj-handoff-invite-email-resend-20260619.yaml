      - "Onde vive o cliente Resend: lib nova em apps/web/src/lib/email/ ou package @meu-jarvis/email. Seguir convenção do repo (imports absolutos @/..., PT-PT, sem any)."
      - "Reenvio/expiração: o convite expira em 7 dias; avaliar botão 'reenviar email' (pode ficar fora de scope)."

