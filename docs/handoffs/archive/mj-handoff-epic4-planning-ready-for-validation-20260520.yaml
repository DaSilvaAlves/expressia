summary: |
  @pm Morgan criou o documento de planeamento do Epic 4 (Módulo Finanças) em
  docs/epics/epic-4-modulo-financas.md (v0.1 Draft, ~10 stories alta-nível).
  Decisão do Eurico que originou o trabalho: handoff consumido
  mj-handoff-session-pause-post-3.7-done-20260520 — Opção A (avançar Epic 4).
  Epic 3 (Tarefas) 8/8 Done; Epic 4 é o próximo módulo do MVP Fase 1.

  ACHADO DE PLANEAMENTO QUE REDEFINIU O SCOPE: o PRD §6 Epic 4 sugeria a
  Story 4.1 como "criar schema de accounts/cards/transactions/recurrences/
  installments/categories". Verificação contra o codebase real (2026-05-20)
  confirma que esse schema JÁ FOI MATERIALIZADO na Story 1.3 — as 6 tabelas
  existem em packages/db/src/schema/finance.ts (435 linhas), as 24 RLS
  policies estão em 0001_rls_policies.sql, os 7 enums Postgres estão
  definidos, e as categorias default PT-PT estão seeded. Os intents de
  Finanças (criar_financa_variavel/recorrente, criar_cartao, criar_parcelada,
  consultar_dados) já estão no enum agent_intent. O que NÃO existe e é o
  trabalho real do Epic 4: API routes /api/financas/*, páginas (app)/financas/*,
  tools de Finanças em packages/agent/src/tools/, e o job Inngest de geração
  de recorrências/prestações. A Story 4.1 foi por isso reduzida de "criar
  schema" para "validar schema + reconciliação documental".

