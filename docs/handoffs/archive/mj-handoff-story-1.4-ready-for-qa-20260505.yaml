decisoes_tecnicas:
  - id: imagem-pgvector
    descricao: |
      Trocou postgres:16 → pgvector/pgvector:pg16 porque a migration 0000 cria
      `extension "vector"` (Architecture §11.2 prepara Fase 3 RAG). Service do CI
      também actualizado para a mesma imagem.
  - id: bootstrap-auth
    descricao: |
      Bootstrap SQL isolado em packages/db-test/src/harness/bootstrap.ts cria role
      `authenticated` + schema `auth` + funções `auth.uid()`/`auth.jwt()`. Não tocou
      nas migrations de produção (essas assumem ambiente Supabase).
  - id: container-partilhado
    descricao: |
      Vitest globalSetup boots 1 container para toda a suite. Cada teste usa
      resetData() em beforeEach (TRUNCATE CASCADE). Isolamento garantido sem custo
      de subir container novo.
  - id: pool-singlefork
    descricao: |
      vitest.config.ts: pool='forks' + singleFork=true para evitar race conditions
      com o container partilhado.
  - id: type-querysql
    descricao: |
      Criado type alias QuerySql = Sql | TransactionSql para que helpers em
      fixtures.ts aceitem ambos os contextos (admin vs transactional).
  - id: revoke-explicit-tests
    descricao: |
      audit_log UPDATE/DELETE são bloqueados via REVOKE explícito (não policy).
      Os testes usam expect(...).rejects.toThrow(/permission denied/) em vez de
      verificar count=0.

areas_para_qa_atencao:
  - tempo_ci: |
      Local 7.88s mas primeiro run em CI tem cold pull da imagem (~150MB).
      Estimativa 30-45s. Se passar 60s, considerar pre-pull no workflow ou cache de layers.
  - testcontainers_ci: |
      Docker está disponível em ubuntu-latest mas Testcontainers requer DOCKER_HOST acessível.
      Se houver problemas, adicionar `docker version` no workflow para diagnose.
  - categorias_defaults: |
      categories.rls.test.ts faz delete from public.categories no beforeEach (limpa tudo
      incluindo defaults). Se Story 1.5 adicionar mais defaults via seed, este teste continua válido
      (testa policy, não contagem).
  - payment_events_select_universal: |
      authenticated nunca pode ver payment_events — apenas service_role via webhook.
      Confirmar se este nível é desejado para debugging em Supabase Studio
      (alternativa: permitir owner/admin ver mas continuar a bloquear escrita).

