decisions:
  - id: SM-5.2.1
    description: Estimate M (não S) justificado por cross-package scope
    rationale: |
      Story 4.1 (S — schema validation + audit migration) era focada num único
      subsistema. Story 4.5 (M — cron Inngest + helper date-fns puro + migration
      + 27 testes) é o precedente directo de M: pieces pequenas mas com cross-
      cutting concerns. Story 5.2 é equivalente em complexidade (workspace
      bootstrap + tokens extraction + 2 components + refactor 8 call-sites + 3
      configs touched + 8 unit tests). M confirmado.

  - id: SM-5.2.2
    description: Refactor 8 call-sites incluído em scope (não diferido)
    rationale: |
      R-5.1 do Epic 5 §6 alerta para "refactor cross-package potencialmente
      extenso". Mitigação aplicada: refactor atómico no mesmo PR — todos os 8
      imports actualizados na mesma sessão @dev; sem janela onde repo tem path
      antigo + path novo. API byte-a-byte preserved (AC3.f) garante zero call-
      site precisa de mudança lógica. Single source of truth atingida no PR
      desta story.

  - id: SM-5.2.3
    description: `<DateDisplay>` introdução nova em vez de refactor
    rationale: |
      Apenas 1 ocorrência local de `formatDate` em `CardStatementCard.tsx:21`
      (helper inline `iso → DD/MM/YYYY`). Em vez de só extrair, criar componente
      `<DateDisplay>` com 4 presets (short/long/time/datetime) prepara Stories
      sucessoras (5.5 APIs Visão com timestamps; 5.6 WidgetGrid com datas;
      5.10 calendário Tarefas potencial migração). Helper `formatDate` também
      exportado para uso em strings (não-JSX). Substituição do formatDate local
      em CardStatementCard.tsx é discricionária @dev (T4.7).

  - id: SM-5.2.4
    description: Sweep dark mode adiado para Story 5.8 (não esta story)
    rationale: |
      DP2 Epic 5 = C híbrido — Story 5.8 implementa toggle UI + persistência
      Zustand+localStorage + sweep CSS variables. Story 5.2 só EXPORTA tokens
      tipados; aplicação no DOM é da Story 5.8. Permite paralelização: Story 5.3
      (shell), 5.6 (WidgetGrid) podem arrancar antes de 5.8 consumindo tokens
      inline via TypeScript (`tokens.colors.light.primary`) ou Tailwind arbitrary
      values até 5.8 materializar. Risco mitigado (DP-5.2.A em AC9).

