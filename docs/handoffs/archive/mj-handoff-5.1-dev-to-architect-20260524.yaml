decisions:
  - id: D-5.1.1
    description: PO_FIX_INLINE F1 — JSDoc cross-ref para AC8(a) em prefs.ts:32-39 e 89-94
    rationale: |
      AC2 propõe text+enum narrowing divergindo do pattern pgEnum standard. JSDoc
      cross-ref ao AC8(a) reduz friction para @dev futuro entender a decisão sem ter
      de ler toda a story. Pattern alinhado com PO_FIX_INLINE F1 da @po validation.

  - id: D-5.1.2
    description: PO_FIX_INLINE F2 — Helper insertUserPrefs em fixtures.ts
    rationale: |
      RLS test pattern exige helpers domain-specific. Criado helper com suporte a
      overrides.useDefaults para testar que defaults SQL são aplicados (não substituídos
      por valores TS default da função). Alinhado com pattern insertAccount/insertCard/etc.

  - id: D-5.1.3
    description: Type parity guard cross-package (preferences.ts:57-66) — beyond AC3.f
    rationale: |
      AC3.f pedia "Verificar ... se divergir, ajustar uma das fontes". Implementação
      automatiza: alias `_WidgetsEnabledParityCheck` falha compilação TS se Zod-inferred
      type divergir do DB type. Single source of truth garantido em compile-time.

  - id: D-5.1.4
    description: visao/page.tsx tinha 2 ocorrências de "Epic 6" — story listava só uma
    rationale: |
      Story AC5(c) referia linha 79 (UI text). Grep encontrou 2 ocorrências (linha 11
      JSDoc + linha 79). Ambas corrigidas para consistência — JSDoc desactualizado
      teria propagado confusão em IDE tooltips e auditoria futura. Out-of-scope mínimo
      e justificado.

