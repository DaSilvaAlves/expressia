decisions:
  - id: PO-5.3.1
    description: Verdict GO-WITH-FIXES 8.5/10 MEDIUM-HIGH
    rationale: |
      10-point checklist 9 PASS + 1 PASS-COM-FIX em #9 (cross-confirm). Score
      8.5/10 reflecte (a) 1 PO_FIX_INLINE MED (smoke 12 rotas em vez de 11) +
      2 LOW informativas, (b) drift 11→12 rotas + zustand ausente captados em
      cross-confirm sem invalidar a story. MEDIUM-HIGH confidence porque a
      story tem trace exaustivo, 5 [DEV-DECISION] AC9 ratificadas sem objecção,
      mas a surface area é cross-cutting (12 rotas + 5 componentes + 1 store)
      vs additive das 5.1/5.2. Precedentes Epic 5: 5.1 GO 10/10 (zero fixes),
      5.2 GO 9/10 (4 fixes), 5.3 GO-WITH-FIXES 8.5/10 (3 fixes) — degradação
      esperada conforme stories crescem em surface area.

  - id: PO-5.3.2
    description: Ratificação integral das 5 [DEV-DECISION] AC9 (DP-5.3.A/B/C/D/E)
    rationale: |
      Cada [DEV-DECISION] avaliada contra (a) Epic 5 §8 DPs validated, (b)
      architecture.md §8.x, (c) front-end-spec §x.y, (d) Stories 5.1+5.2
      precedentes ratificadas. Todas as 5 mantêm coerência arquitectural e
      respeitam Constitution Article IV (No Invention). DP-5.3.C (1 slot vs 2)
      foi a única com decisão close — front-end-spec §11.2 prescreve sidebar
      bottom mas a implementação é Story 5.8; KISS de @sm aceite.

  - id: PO-5.3.3
    description: CARRY-OVERS DP-5.3.E + DP5 — Opção B folding em Story 5.10
    rationale: |
      4 opções avaliadas para cada:
        A) Mini-story dedicada — REJEITADO (overhead administrativo > trabalho
           técnico; fragmentaria Epic 5 em 11 stories vs 10 validadas por Eurico
           2026-05-23; 1-line/3-line changes não justificam Story Development
           Cycle completo para cada)
        B) Folding em Story 5.10 — **ACEITE** (Story 5.10 "responsive sweep +
           branding auth + Lighthouse mobile ≥ 85" é encaixe natural; auth gate
           + landing branding são scope nominal; sweep responsive vai re-testar
           todas as rotas em todos os breakpoints incluindo path deslogado
           redirect — fix encaixa atomicamente)
        C) Folding em Story 5.3 — REJEITADO (@sm rationale válido: tocar
           middleware exige re-teste regressão Story 1.5 fora de scope shell)
        D) Defer post-MVP — REJEITADO (UX degradada permanente para janela
           indefinida; não aceitável)
      Acção: @sm regista AC novo na Story 5.10 quando draftar.

  - id: PO-5.3.4
    description: 3 PO_FIX_INLINE F1/F2/F3 aplicados directamente ao story file
    rationale: |
