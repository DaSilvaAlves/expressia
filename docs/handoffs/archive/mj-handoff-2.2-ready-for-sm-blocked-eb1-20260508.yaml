sm_focus_points:
  - title: "Article IV (No Invention) — usar nomes reais do schema"
    detail: >
      Schema agent já existe (Story 1.3 + 2.1). Quando @sm criar a story 2.2,
      DEVE referenciar nomes reais: `agent_runs`, `intent_classifications`,
      `agent_reverse_ops`, `agent_quotas`. NÃO inventar tabelas (não há
      `agent_intents` nem `agent_tool_calls`). Os enums também são realidade
      a respeitar. Validação cross-source: `packages/db/src/schema/agent.ts`,
      `packages/db/migrations/0001_rls_policies.sql`, `0005_agent_immutability_and_ttl.sql`,
      `docs/db-schema.md §4.4`.

  - title: "Provider abstraction NÃO é pipeline"
    detail: >
      Story 2.2 entrega APENAS o package `packages/agent/` com client wrappers
      tipados (Anthropic + OpenAI), retry/backoff, error mapping, prompt cache,
      tracing OTel, PII redaction. **NÃO entrega**: classifier (Story 2.4),
      planner+executor (Story 2.5), endpoint (Story 2.6), tool registry (Story 2.3).
      @sm deve resistir a alargar scope.

  - title: "Tracing OTel — reutilizar `@meu-jarvis/observability`"
    detail: >
      Story 1.7 entregou package `@meu-jarvis/observability` com logger Pino +
      tracer OTel + Sentry wrapper. Story 2.2 deve consumir esse package, NÃO
      duplicar instrumentação. Span por LLM call: `agent.provider.call`
      attributes (model, prompt_tokens, completion_tokens, latency_ms,
      provider, fallback_used).

  - title: "PII redaction antes de Sentry/Grafana"
    detail: >
      Prompts PT-PT podem conter dados pessoais (nomes, IBANs, montantes).
      Antes de log/Sentry capture, prompts/responses devem passar por
      redactor. Story 1.7 já tem 3 camadas de redaction — reutilizar pattern.
      `agent_runs.prompt` na DB também deve ser redacted (decisão arquitectural
      do Story 2.6 — flagar para review).

  - title: "Mock providers em testes"
    detail: >
      Story 2.2 testes Vitest devem usar Vitest mocks para Anthropic/OpenAI
      SDKs — sem calls reais (caro e flaky). Smoke test E2E com call real
      fica para Story 2.10 (benchmark suite). @sm deve mencionar este
      pattern explicitamente nos testes acceptance criteria.

  - title: "EB1 visibility na story"
    detail: >
      Bloco BLOQUEADORES EXTERNOS no header da story DEVE listar EB1
      (ANTHROPIC_API_KEY) com nota "@dev *develop bloqueado até key em
      runtime; @sm draft + @po validation NÃO bloqueados". Acompanhar pattern
      da Story 1.7 v1.0 que tinha B3+B4 listados claramente.

