risks_for_qa_to_audit:
  - id: D2
    title: Fail-hard atomicidade trigger
    detail: |
      Migration 0003 trigger handle_new_user usa BEGIN/EXCEPTION genérico — em
      falha de qualquer dos 3 INSERTs (households, membership, subscription)
      a transacção rollback inteira. Validar comportamento sob falhas reais
      (ex: tentar criar household com nome duplicado se houver UNIQUE).
  - id: D4
    title: audit_log scrita no trigger (NFR9)
    detail: |
      Trigger escreve audit_log entry. Validar que o registo é completo
      (actor_user_id, action, resource_type, resource_id, household_id).
  - id: D8_conflito_dashboard
    title: Email confirmation ON no Dashboard mas D8 dizia OFF
    detail: |
      Decisão D8 no actions.ts:71 dizia "OFF para MVP". Dashboard real tem ON.
      Smoke test mostrou que funciona (user confirma + login), mas é fricção
      extra. Quinn decide: aceitar como follow-up Epic 6 ou bloquear gate.
  - id: smoke_test_manual_unico
    title: Smoke test manual feito apenas em browser do Eurico
    detail: |
      Validado para 1 utilizador real. Não testado para casos como: signup
      com email já registado, password fraca a passar, recovery flow completo.
      Quinn pode complementar com Playwright/manual.

