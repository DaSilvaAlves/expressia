      `{ $ref, definitions }`). Resolve o 400 "got type: None".
  dev_decision_strict_false:
    file: "packages/classifier/src/classifier.ts:303"
    change: "`strict: true` → `strict: false` em response_format.json_schema."
    rationale: >
      Análise estática confirmou o aviso do handoff: o `ClassificationSchema`
      gera `const` (de `z.literal('pt-PT')`), `minItems`/`maxItems` (de
      `.min(1).max(5)`) e `minimum`/`maximum` (de `.min(0).max(1)`) — keywords
      que o strict mode da OpenAI rejeita → daria outro 400. Como não há key
      real disponível para testar localmente e o classifier JÁ valida o output
      com `ClassificationSchema.safeParse` (classifier.ts:338) + retry 1×
      (callLlmWithRetry), `strict: false` é a escolha mínima e segura: o schema
      passa a ser guidance best-effort, a validação rigorosa fica no Zod.
      Alternativa rejeitada: `zodResponseFormat` de `openai/helpers/zod` —
      violaria a decisão arquitectural Story 2.4 D9 (`OpenAIClientLike` é
      abstracção estrutural, sem acoplamento ao SDK).
