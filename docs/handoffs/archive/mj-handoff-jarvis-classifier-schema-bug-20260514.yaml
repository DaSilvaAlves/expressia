bug_primary:
  title: "Classifier envia JSON Schema malformado à OpenAI — 400 Bad Request"
  severity: "BLOQUEANTE — /jarvis inoperável em produção"
  observed_error: >
    Classifier LLM call failed (j): Provider openai returned 400 (bad request):
    400 Invalid schema for [REDACTED] '[REDACTED]': schema must be a JSON Schema
    of 'type: "object"', got 'type: "None"'.
  location: "packages/classifier/src/classifier.ts:290-306 (método callLlmOnce)"
  root_cause: >
    Linha 290: zodToJsonSchema(ClassificationSchema, { name: 'classification',
    $refStrategy: 'none' }). Passar a opção `name` faz a biblioteca
    zod-to-json-schema envolver o output em { $ref: '#/definitions/classification',
    definitions: { classification: {...} } }. O objecto de topo NÃO tem `type`.
    Esse objecto é passado directamente em response_format.json_schema.schema
    (linha 304) — a OpenAI exige que o schema de topo seja type:"object" e vê
    type ausente ("None"), rejeitando com 400.
  why_not_caught: >
    Epic 2 inteiro foi desenvolvido mockable-only. O mock do OpenAI client
    (packages/classifier/src/__fixtures__/mock-openai-client.ts) não valida o
    schema enviado — devolve sempre uma resposta canned. Só a API real valida o
    payload. Este é o primeiro contacto do classifier com a OpenAI real.
  suggested_fix:
    primary: >
      Remover a opção `name` do zodToJsonSchema (linha 290-293) — sem `name`,
      a biblioteca devolve o schema inline com `type: "object"` no topo, que é
      o que a OpenAI espera. Manter `$refStrategy: 'none'`.
    alternatives:
      - "Extrair jsonSchema.definitions.classification antes de passar à OpenAI"
      - "Usar zodResponseFormat do helper oficial da OpenAI SDK (openai/helpers/zod) — mais robusto, alinha com structured outputs"
    verify_also: >
      OpenAI structured outputs com strict:true (linha 303) exige
      additionalProperties:false em TODOS os objectos aninhados e todos os
      campos em `required`. Confirmar que ClassificationSchema (schemas.ts)
      gera isso — se não, pode aparecer um 400 diferente a seguir. Testar com
      a key real, não só com mock.
  regression_guard: >
    O mock atual passa testes mas não apanhou este bug. Recomendação: adicionar
    um teste que assert o shape do schema enviado (jsonSchema.type === 'object'
    no topo, sem $ref) — para que o mock deixe de mascarar este tipo de erro.
  files_likely_touched:
    - "packages/classifier/src/classifier.ts (fix linha 290)"
    - "packages/classifier/src/__tests__/classifier.test.ts (teste de regressão do shape)"
    - "packages/classifier/src/schemas.ts (verificar additionalProperties/required se strict:true falhar a seguir)"
  env_versions:
    openai_sdk: "^4.78.1 (apps/web/package.json)"
    zod: "^3.23.8"
    zod_to_json_schema: "ver packages/classifier/package.json"

