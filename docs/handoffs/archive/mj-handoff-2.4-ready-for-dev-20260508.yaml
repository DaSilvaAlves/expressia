      - unknown

  no_real_openai_calls:
    description: |
      ZERO chamadas reais à API OpenAI nos testes. `pnpm test` deve passar
      sem `OPENAI_API_KEY` no ambiente. Toda a injecção é via OpenAIClientLike
      mockado em __fixtures__/mock-openai-client.ts.
    rationale: "EB2 pending. Story é 100% mockável (padrão 2.2 e 2.3)."

  reuse_libraries:
    description: |
      Reutilizar SEMPRE de packages existentes — não duplicar:
    reuse:
      - "OpenAIClientLike → @meu-jarvis/agent"
      - "ProviderError, RateLimitError, mapOpenAIError → @meu-jarvis/agent"
      - "OPENAI_GPT4O_MINI_DEFAULT, LlmModel, LLM_MODEL_VALUES → @meu-jarvis/agent"
      - "sanitizeHint → @meu-jarvis/agent (re-export ou import directo)"
      - "withSpan, annotateSpan, recordSpanError, hashForCorrelation, logger → @meu-jarvis/observability"

  pii_redaction_3_layers:
    description: |
      AC10 obrigatório — 3 camadas de defesa:
    layers:
      - "L1: error messages NUNCA contêm input.text bruto"
      - "L2: sanitizeHint para qualquer hint vindo do provider"
      - "L3: hashForCorrelation(householdId/userId) em spans, NUNCA raw"
    test_dedicated: "__tests__/errors.test.ts assertions com NIF, email, telefone PT"

  pt_pt_user_messages:
    description: "TODOS os userMessage das 4 subclasses de erro DEVEM estar em PT-PT (não PT-BR, não EN)"
    examples:
      good: '"Texto inválido — não pode estar vazio."'
      bad_pt_br: '"Texto inválido — você precisa fornecer texto."'
      bad_en: '"Invalid text — must not be empty."'

  language_gate_conservatism:
    description: |
      A lista de palavras PT-BR/EN/ES deve ser CONSERVADORA (não tentar
      cobertura 100%). Falsos negativos (PT-PT enviado ao LLM) são aceites;
      falsos positivos (PT-PT rejeitado) NÃO são aceites. Suite de 10+
      frases PT-PT legítimas deve passar todas.

  zod_to_json_schema_dep:
    description: |
      Antes de adicionar `zod-to-json-schema` como dep, verificar:
      1. Já está no monorepo (pnpm-lock.yaml)?
      2. Zod 3.24+ tem `z.toJSON()` nativo? (verificar package.json/pnpm-lock)
    fallback: "Conversão manual para JSON Schema se ambos falharem"

  d6_max_input_length:
    description: |
      maxInputLength default 1000 chars é decisão @sm sem rastreabilidade FR
      explícita. @po aceitou no validation com nota. Se @architect quiser
      reduzir/aumentar no gate, ajustar — mas justificar explicitamente em
      Dev Agent Record.

  d8_max_5_intents_guardrail:
    description: |
      AC3 max(5) é guardrail anti-hallucination [AUTO-DECISION D8] adicionada
      pelo @po. Architecture.md só especifica `min(1)`. Se @architect rejeitar
      no gate, alternativas:
