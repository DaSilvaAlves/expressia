  dev_decisions_for_architect_ratification:
    D-3.7.8:
      title: "withSpan usa a assinatura real de 3 argumentos"
      detail: |
        A Story (AC7/Dev Notes) mostrava withSpan(name, fn) (2 args). A
        assinatura real de @meu-jarvis/observability é withSpan(name,
        initialAttrs, fn). O handler usa withSpan('agent.recurrences.generate',
        {}, async (span) => {...}) — initialAttrs={} porque os counts só
        existem após o step.run; os 7 atributos AC7 aplicam-se via
        span.setAttribute antes do return. Aplica NIT-PO-3.7.1.
      trace: "packages/observability/src/tracer.ts:124"
    D-3.7.9:
      title: "horizonEnd ao fim do dia + nextRunAfterHorizon via after(horizonEnd, false)"
      detail: |
        As ocorrências fixam-se ao meio-dia Lisboa (DST-safe). Com horizonEnd
        à meia-noite, a ocorrência do último dia caía fora do between() —
        N-1 ocorrências. horizonEnd levado a 23:59:59.999 garante horizonDays+1.
        nextRunAfterHorizon = after(horizonEnd, false) (fronteira exclusiva)
        para não saltar a ocorrência seguinte. isExhausted = nextRun === null.
        Validado por 22 testes incluindo DST spring/fall.
      trace: "AC3, AC8 testes (1)+(11)+(14), R-3.7.2"
    D-3.7.10:
      title: "audit after_state via ${JSON.stringify}::jsonb (padrão do codebase)"
      detail: |
        sql.json não existe em drizzle-orm@0.34. Adoptado o padrão de
        apps/web/src/lib/api-helpers/audit.ts:106-107 (Story 3.2):
        ${JSON.stringify(state)}::jsonb — Drizzle parametriza com segurança.
      trace: "apps/web/src/lib/api-helpers/audit.ts:106-107, AC6"

  nits_applied_silently:
