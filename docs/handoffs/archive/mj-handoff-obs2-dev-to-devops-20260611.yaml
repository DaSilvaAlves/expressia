  4 ficheiros alterados:
    • `packages/tools/src/tasks/criar-tarefa.ts`
        - Input schema: novo campo `dueTime` (regex `^[0-2][0-9]:[0-5][0-9]$`,
          HH:MM 24h, opcional) + `.refine()` com regra de domínio: `dueTime` SÓ
          permitido quando há `dueDate` (uma hora exige um dia — mesma regra do
          P1, onde o campo Hora fica disabled sem prazo).
        - Output schema: + `dueTime: z.string().nullable()`.
        - `TasksInsertReturn`: + `due_time: string | null`.
        - `execute()`: INSERT inclui `due_time` (`${input.dueTime ?? null}::text`)
          + RETURNING due_time; output devolve `dueTime: row.due_time`.
        - `preview()`: inclui a hora ("... para DD/MM/YYYY às HH:MM").
        - `description`: menciona a hora opcional + a regra hora-exige-dia.
    • `packages/tools/src/tasks/__tests__/criar-tarefa.test.ts`
        +11 testes (formato HH:MM, limite 23:59, rejeição de formato errado e de
        minutos >59, REJEIÇÃO de dueTime sem dueDate, output com hora, preview com
        hora) + mocks existentes alinhados (todas as rows ganham `due_time`, todos
        os literais de output de reverse() ganham `dueTime`).
    • `packages/planner-executor/src/prompts/planner-system.ts`
        Bump versão v4→v5. Exemplos 1 e 2 corrigidos para incluir
        `dueTime: '15:00'`. Nova secção "HORA DA TAREFA" instrui: extrair a hora
        quando mencionada ("às 15h"→"15:00", "ao meio-dia"→"12:00", "9 da
        manhã"→"09:00"), normalizar para HH:MM, e — regra crítica — `dueTime` só
        com `dueDate`; se houver hora SEM dia explícito, assumir o dia de HOJE
        (evita hard-fail do refine e dá ao utilizador a hora que pediu).
    • `packages/planner-executor/src/__tests__/prompts.test.ts`
        Versão esperada v4→v5 + asserção de que o prompt contém "HORA DA TAREFA"
        e `dueTime: '15:00'`.

  ════════ DECISÕES DE DESIGN ════════
    • Exposição ao LLM é automática: o registry usa `zodToJsonSchema` sobre o
      `inputSchema`, logo `dueTime` aparece no payload Anthropic sem código extra.
      O `.refine()` NÃO é exprimível em JSON Schema → a regra é reforçada na
      `description` (LLM) e validada em runtime no parse do `executeAtomic`.
    • `.refine()` em vez de `.default()`: mantém input/output simétricos,
      preserva `ZodType<I>` em `ToolDefinition` (o `.default()` partiria — já
      documentado no ficheiro).
    • `reverse_op` INALTERADO: continua `delete_row` por `taskId` (apagar a row
      remove a hora junto). Zero alteração de DB/migration/schema — a coluna
      `tasks.due_time text` + check `tasks_due_time_format` já existem.

