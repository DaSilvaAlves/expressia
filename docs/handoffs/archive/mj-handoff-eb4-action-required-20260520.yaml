eurico_action_runbook:
  total_estimate: '~25-35 min de trabalho activo + janela DNS opcional (Step 0)'
  reference: 'docs/runbooks/inngest-setup.md (Steps 1-6 detalhados)'

  step_0_dns_optional:
    title: 'DNS expressia.pt (PARALELO — opcional mas recomendado)'
    estimate: '~10 min + propagação (normalmente <1h, máx 24-48h)'
    blocking: false
    detail: |
      Não é estritamente bloqueador de EB4 (pode-se usar URL .vercel.app
      interim no Step 3), mas o DNS terá de ser feito para go-live público
      de qualquer forma. Fazer em paralelo evita refactor da URL do Step 3.
    actions:
      - 'Aceder ao registrar Third Party onde expressia.pt está registado.'
      - 'Configurar os nameservers a apontar para a Vercel (Vercel dá os NS em vercel.com/<team>/expressia/settings/domains — tipicamente ns1.vercel-dns.com / ns2.vercel-dns.com).'
      - 'Aguardar propagação. Verificar com: curl -I https://expressia.pt'

  step_1_inngest_workspace:
    title: 'Criar workspace Inngest EU Frankfurt'
    estimate: '~5 min'
    blocking: true
    actions:
      - 'Aceder a https://app.inngest.com — criar conta ou login com email do Eurico.'
      - 'Ao criar workspace, no selector de region escolher EU (Frankfurt) — CRÍTICO para data residency (Vercel fra1 + Supabase eu-central-1).'
      - 'Nomear o workspace expressia-prod.'
      - 'Criar workspace adicional expressia-dev (para preview deploys + dev local).'
    verify: 'Dashboard Inngest mostra 2 workspaces, region badge EU (Frankfurt) em ambos.'

  step_2_keys:
    title: 'Gerar Event Key + Signing Key (em ambos os workspaces)'
    estimate: '~3 min'
    blocking: true
    actions:
      - 'expressia-prod → Settings → Event Keys → copiar a Event Key (Production).'
      - 'expressia-prod → Settings → Signing Keys → copiar a Signing Key (formato signkey-prod-...).'
      - 'expressia-dev → Settings → Event Keys → copiar a Event Key.'
      - 'expressia-dev → Settings → Signing Keys → copiar a Signing Key (formato signkey-dev-...).'
      - 'Guardar as 4 keys num gestor de secrets (1Password/Vault). NUNCA comitar ao repo.'
    handoff_to_devops: |
      Passar as 4 keys ao @devops Gage de forma segura (NÃO por chat público,
      NÃO em ficheiro commitado). O @devops corre então os `vercel env add`
      do Step 4.

  step_3_sync_endpoint:
    title: 'Registar endpoint /api/inngest (Apps → Add app → Sync)'
    estimate: '~3 min'
    blocking: true
    actions:
      - 'expressia-prod → Apps → Add app → Sync → URL: https://expressia.pt/api/inngest (se DNS resolver) OU https://<vercel-prod-url>.vercel.app/api/inngest interim.'
      - 'expressia-dev → Apps → Add app → Sync → URL: https://<vercel-preview-branch>.vercel.app/api/inngest'
    note: |
      O Sync só funciona DEPOIS do Step 4 (env vars + redeploy) porque o
      endpoint precisa da signing key para autenticar o PUT de introspecção.
      Ordem prática: Step 1 → Step 2 → entregar keys ao @devops → @devops
      faz Step 4 + redeploy → Eurico volta ao Step 3 Sync → @devops faz push 3.7.

devops_steps_after_keys:
  step_4_vercel_env_add:
    title: '@devops: popular Vercel secrets'
    estimate: '~5 min'
    commands: |
      # @devops corre, com as keys fornecidas pelo Eurico (Step 2):
      vercel env add INNGEST_EVENT_KEY production     # event key expressia-prod
      vercel env add INNGEST_SIGNING_KEY production   # signing key expressia-prod
      vercel env add INNGEST_EVENT_KEY preview        # event key expressia-dev
      vercel env add INNGEST_SIGNING_KEY preview      # signing key expressia-dev
    note: 'vercel env add é interactivo — pede o valor em stdin. @devops cola a key sem a logar.'
  step_4b_redeploy:
    title: '@devops: redeploy obrigatório'
    estimate: '~3 min'
    detail: 'Redeploy do último deploy production para o runtime Next.js ver os novos secrets.'
  push_story_37:
