context: |
  ===== O QUE É SEC-4 (2 redes, decisão Eurico 02/06) =====
  Fase 3 do ADR-003. Duas partes numa só story:
   - PARTE A (1.ª rede — FECHA O LEAK): adicionar param `householdId: string` aos 6
     helpers de leitura em apps/web/src/lib/finance/ e o filtro `household_id` a cada
     uma das 16 queries. Espelha exactamente o que SEC-1 fez a lib/visao/queries.ts.
   - PARTE B (2.ª rede — hardening): envolver o fetch das 5 SSR pages em
     withHousehold({ userId: user.id, householdId }, (tx) => helper({ db: tx, householdId, ... })).
     Padrão RSC confirmado em ADR-003 Adenda §10.3 (withSpan outermost, withHousehold inner).
  A Parte A SOZINHA fecha o leak; a Parte B é defense-in-depth. Implementar AMBAS.

  ===== A VULNERABILIDADE (confirmada, CRITICAL, live) =====
  - getDb() liga como role postgres/rolbypassrls=TRUE → RLS inerte em runtime (ADR-003 §1.1).
  - Os 6 helpers lib/finance/* fazem queries de domínio SEM filtro household_id (grep: 0
    ocorrências em toda a lib/finance/). As pages resolvem householdId mas só o usam no
    empty-state guard — NUNCA o passam ao helper.
  - Resultado: utilizador do household A em /financas/{patrimonio,cartoes,este-mes,
    recorrentes,variaveis} vê contas/IBAN last4/saldos/cartões/transacções/recorrências
    de TODOS os households. Pior: os totais agregados CONTAMINAM (month total soma os 2
    households: 17740 = 8870 A + 8870 B no teste de prova).
  - A auditoria CROSS-TENANT de SEC-1 (docs/security/CROSS-TENANT-AUDIT-20260602.md) NÃO
    cobriu esta superfície (cobriu /api/financas/* e o RSC da Visão). Gap não-detectado.
  - PROVA: packages/db-test/src/tests/sec4_financas_ssr_leak.test.ts (Testcontainers,
    role bypassrls = runtime real, 5/5 PASS). Já está no repo — mantém como regressão.

  ===== FICHEIROS-ALVO (verificados byte-a-byte por @sm + @po) =====
  SSR pages (5) — apps/web/src/app/(app)/financas/ — getDb() na linha indicada:
    patrimonio/page.tsx:54  → getAccountBalances
    cartoes/page.tsx:55     → getCardStatements
    este-mes/page.tsx:93     → getMonthSummary + getMonthProjection (2 helpers, MESMO callback withHousehold)
    recorrentes/page.tsx:88  → listRecurrences
    variaveis/page.tsx:81    → listVariableTransactions + getVariableTxFilterOptions (2 funcs, MESMO callback)
  Guards householdId já resolvidos nas pages (linhas 39/37/65/59/52) — REUTILIZAR, não re-resolver.

  Helpers de query (6) — apps/web/src/lib/finance/ — 16 queries a filtrar (mapa exacto na AC1 da story):
    account-balances.ts        (2 queries: accounts:91, transactions:102)
    list-card-statements.ts    (4: cards:116 alias c, transactions:125, installments:136 SEM where hoje, progress:145)
    month-summary.ts           (3: totals:85, category:94 alias t, day:109)
    month-projection.ts        (2: transactions:93, recurrences:106)
    list-recurrences.ts        (1: recurrences:76 alias r — add condição ao array `conditions`)
    list-variable-transactions.ts (1 em listVariableTransactions:102 alias t + 3 em getVariableTxFilterOptions: categories:166, accounts:171, cards:176)

  FORA DE ÂMBITO (não tocar): financas/page.tsx (só redirect); helpers puros sem DB
  card-statement-helpers.ts + finance-recurrence-helpers.ts (G1 intactos); route handlers
  /api/financas/* (já SEC-3); getServiceDb()/jobs Inngest.

  ===== DECISÕES-CHAVE JÁ FIXADAS NA STORY =====
  - AC2 (ÚNICO caso divergente): em getVariableTxFilterOptions, a query de CATEGORIAS
    inclui globais: `and (household_id = $hh::uuid or household_id is null)` — espelha
    api/financas/categorias/route.ts:93. Accounts/cards são ESTRITOS (= householdId).
    As queries que fazem LEFT JOIN categories só para o NOME filtram a tabela principal
    (t./r.household_id), NUNCA o join de categorias (globais legítimas).
  - AC4: getDb() é REMOVIDO POR COMPLETO das 5 pages (read-only, 0 insertAuditLog —
    ao contrário de SEC-3 que manteve getDb p/ audit). Trocar import getDb→withHousehold.
  - AC5: guards (redirect /entrar + UI de erro com FinanceViewTabs current="...") FICAM
    como estão — NÃO centralizar (ADR-003 §10.2: cada page tem UI de erro própria).
  - installments:136 GANHA um WHERE novo (não tem hoje) — ponto mais frágil (PO-OBS-2).

  ===== TESTES (AC7 + AC8) =====
  - 6 testes de helper (lib/finance/__tests__/*.test.ts): passam a chamar com householdId;
    >=1 teste por helper captura o objecto SQL Drizzle passado a execute e assere que o
    household_id bound está presente (mirror SEC-1 AC-K2 — regressão anti-leak). Para
    getVariableTxFilterOptions asserir o ramo `household_id is null` em categories e a
    AUSÊNCIA dele em accounts/cards.
  - 5 testes de page ((app)/financas/*/__tests__/page.test.tsx): o mock de
    '@/lib/agent/db-shim' passa a expor withHousehold:
      withHousehold: (_auth, fn) => fn({ execute: vi.fn() })
    e >=1 teste assere que o helper foi chamado com householdId (objectContaining).

  ===== INVARIANTES =====
  - getServiceDb()/service_role INTOCADO. Sem migration nova (104 policies intactas).
  - Imports @/ absolutos; sem any; PT-PT em comentários/erros; prepare:false intocado.
  - Gotcha conhecido: pnpm build + next dev na mesma .next parte o CSS — limpar .next antes de dev.

  ===== PO-OBS (não-bloqueantes, já na story) =====
  - PO-OBS-1: as linhas de AC1 apontam o INÍCIO do db.execute(...), não a linha do `where`.
    Localizar a query por tabela+alias, não por offset rígido.
  - PO-OBS-2: focar a regressão bound-param (AC7) em installments:136 (where novo) e nas 3
    queries de getVariableTxFilterOptions (onde AC2 diverge).

