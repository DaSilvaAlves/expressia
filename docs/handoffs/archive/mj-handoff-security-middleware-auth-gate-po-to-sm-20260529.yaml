    - `apps/web/src/middleware.ts:36`:
        `const APP_PATH_PREFIXES = ['/visao', '/jarvis', '/conta'] as const;`
      Linha 8 (docstring) afirma que `/(app)/**` "(visão, tarefas, finanças, perfil…)"
      requer auth — mas o array omite tarefas+financas.
    - Linha 70-76: `isAppPath = APP_PATH_PREFIXES.some(p => pathname.startsWith(p))`;
