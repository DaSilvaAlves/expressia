summary: |
  ACHADO DE SEGURANÇA CONFIRMADO pelo @po (Pax) em verificação independente durante
  a sessão da Story 5.8. O auth gate do middleware (`apps/web/src/middleware.ts:36`)
  NÃO cobre `/tarefas` nem `/financas` → utilizadores não autenticados não são
  redireccionados dessas rotas (violação NFR8). É o carry-over CO-2 da Story 5.4
  ("middleware APP_PATH_PREFIXES folding 5.10") e o achado reportado pelo @sm na
  Story 5.10 (AC6/FUP-5.3.C), agora confirmado byte-a-byte. Decisão @po: tirar da
  5.10 e tratar como FIX ISOLADO PRIORITÁRIO (antes da 5.8). Registado em
  `docs/STORY-BACKLOG.md` como `[SEC-MW-F1]` HIGH.

next_action: |
  `@sm *draft` de uma micro-story de hotfix de segurança. Sugestão de nome/ID:
  `5.0-hotfix.middleware-auth-gate-tarefas-financas` (ou o ID que o @sm achar
  coerente com o esquema do Epic 5; é fix transversal, não uma feature do epic).

  A story deve cobrir:
    1. Adicionar `'/tarefas'` e `'/financas'` a `APP_PATH_PREFIXES`
       (`apps/web/src/middleware.ts:36`).
    2. Teste de regressão que assert um prefixo do auth gate por CADA rota `(app)/`
       real existente — para que uma rota futura sem cobertura PARTA o build
       (prevenir reincidência do CO-2; o array já falhou 2x: tarefas + financas).
    3. [@architect avalia no gate] defesa em profundidade: guarda server-side no
       `(app)/layout.tsx` para além do middleware (hoje não tem — delega 100% ao mw).
    4. [@qa security gate] CONFIRMAR runtime o que o fetch SSR de `/financas/este-mes`
       devolve a um utilizador anónimo (data leak ruled out ou não). O @po confirmou a
       condição estrutural (gate quebrado) mas NÃO testou a profundidade da fuga.

  Fluxo: @sm *draft → @po *validate → @dev *develop → @qa *qa-gate (security) →
  @devops *push. Depois, remover o achado da Story 5.10 (AC6/FUP-5.3.C) como resolvido.

context: |
