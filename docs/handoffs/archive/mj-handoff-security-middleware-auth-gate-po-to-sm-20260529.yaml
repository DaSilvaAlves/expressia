      `/tarefas`/`/financas`.
    - `(app)/layout.tsx:28-30`: delega ao `<AppShell>` SEM guarda server-side própria
      (linha 23 até diz "auth gate intacto"). Não há 2ª linha de defesa.
    - Rotas afectadas (Glob de `apps/web/src/app/(app)/**/page.tsx`):
        /tarefas, /tarefas/calendario, /tarefas/kanban
        /financas, /financas/este-mes, /financas/variaveis, /financas/recorrentes,
