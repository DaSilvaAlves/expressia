decision_pending:
  question: "Como arrancar Epic 3 — opção A canonical (PM-first) ou opção B lean (SM-first)?"

  option_A_pm_canonical:
    name: "PM canonical — `@pm *create-epic 3`"
    agent: "@pm (Morgan)"
    output: >
      `docs/epics/EPIC-3-EXECUTION.yaml` com plan completo: 8+ stories detalhadas +
      dependency graph + decision points (DP) + risk register (R1-RN) + estimates_summary +
      bloqueadores externos + parallelization opportunities.
    effort: "~1-2h @pm wall-clock"
    pros:
      - "Precedente Epic 2 plan (11 stories planned via EPIC-2-EXECUTION.yaml)"
      - "@sm depois tem input estruturado (vs ler PRD raw)"
      - "Decisões DPs validadas com Eurico antes de drafting"
      - "Risk register documentado upfront (R1 schema race conditions, R2 Kanban perf, etc.)"
      - "Dependency graph prevent drift entre stories 3.1-3.8"
    cons:
      - "1-2h overhead vs lean approach"
      - "Pode parecer over-engineering para Epic CRUD-standard"
    recommended_when: "Epic com >5 stories OU dependências não-triviais OU decisões estratégicas profundas"

  option_B_sm_lean:
    name: "SM lean — `@sm *draft 3.1` directo"
    agent: "@sm (River)"
    output: "Story 3.1 v1.0 Draft (Schema tasks + RLS) directamente"
    effort: "~45min @sm wall-clock"
    pros:
      - "Mais rápido — straight to value"
      - "Epic 3 é PRD-clear (CRUD standard)"
      - "Story 3.1 é técnico standard (schema + RLS), sem decisões estratégicas profundas"
      - "Próximas stories drafted incrementally se necessário"
    cons:
      - "Sem dependency graph formal"
      - "Sem risk register upfront"
      - "Stories drafted ad-hoc — risco drift entre 3.1 e 3.4 (UI complexo)"
    recommended_when: "Epic <5 stories OU PRD muito claro OU primeira story é técnica trivial"

  gage_recommendation: >
    Opção A (PM canonical). Razões:
    (1) Epic 3 tem 8 stories sugeridas com dependências não-triviais;
    (2) Stories 3.4 (Kanban drag-and-drop) + 3.5 (Calendário) são UI complexo (L estimate provável);
    (3) Story 3.7 introduz Inngest cron (provider já em codebase via Story 2.8 mas novo use-case);
    (4) Story 3.8 integra Epic 2 (3 tools cérebro novos no toolRegistry);
    (5) Precedente Epic 2 plan provou valor — 11 stories executadas com 0 drift, decision_log
        ED1-ED5 referenciado em todas as stories.

epic_3_scope:
  prd_reference: "docs/prd.md §6.3 (linhas 291-311)"

  goal: >
    Entregar CRUD completo de tarefas com recorrência, 3 vistas (lista/Kanban/calendário),
    tags globais por household, drag-and-drop, e tools de cérebro AI integradas
    (criar_tarefa, completar_tarefa, listar_tarefas).

  stories_suggested:
    - id: "3.1"
      title: "Schema tasks, task_recurrences, tags, task_tags"
      estimate_likely: M
      type: data-engineer
      executor: "@dev OR @data-engineer"
      quality_gate: "@architect"
      dependencies: []
      notes: >
        4 tabelas novas com RLS 4-policies cada (16 policies novas). Migration 0009 ou
        next sequence. Schema deve seguir convenções Stories 2.1: household_id FK +
        created_at + updated_at + (where applicable) created_by FK users.id.
        agent.ts schema já tem `tasks` reference em tools registry (Story 2.3).
        **Cross-confirm cuidado:** verify se tabelas tasks JÁ existem (provavelmente sim
        via Story 2.3 tool registry seed OR ainda não — cross-confirm com schema files).

    - id: "3.2"
      title: "API routes CRUD tarefas (auth + RLS)"
      estimate_likely: M
      type: api
      executor: "@dev"
      quality_gate: "@architect"
      dependencies: ["3.1"]
      notes: >
        REST endpoints /api/tasks (GET list/POST create/PATCH update/DELETE). Auth via
        Supabase JWT. RLS automatic via getDb() pattern Story 1.5. Pagination + filters
        via query params. Service: packages/tasks/ ou apps/web/lib/tasks/ (TBD).

    - id: "3.3"
      title: "Vista lista com filtros + ordenação"
      estimate_likely: M
      type: frontend
      executor: "@dev (com @ux-design-expert review)"
      quality_gate: "@architect (UI review)"
      dependencies: ["3.2"]
      notes: >
        Next.js page /tasks com lista server-side rendered (RSC). Filtros (status, tag,
        due date range) + ordenação (created/due/priority). Empty state PT-PT.

    - id: "3.4"
      title: "Vista Kanban com colunas + drag-and-drop"
      estimate_likely: L
      type: frontend
      executor: "@dev (com @ux-design-expert design)"
      quality_gate: "@architect"
      dependencies: ["3.2"]
      notes: >
        UI complexo. Library candidata: @dnd-kit/core (modern, accessible, mouse+keyboard).
        Colunas configuráveis per household (kanban_columns table — JÁ EXISTE schema per
        Story 1.3 tenancy.ts). Persistência drag-end via PATCH /api/tasks/:id { status }.

    - id: "3.5"
      title: "Vista calendário semanal com drag entre dias"
      estimate_likely: L
      type: frontend
      executor: "@dev (com @ux-design-expert design)"
      quality_gate: "@architect"
      dependencies: ["3.2"]
      notes: >
        UI complexo. Vista semanal Mon-Sun com tarefas agrupadas por due_date.
        Drag-and-drop entre dias persiste via PATCH /api/tasks/:id { due_date }.
        Library candidata: react-big-calendar OR custom implementation.

    - id: "3.6"
      title: "Sistema de tags globais (criar/listar/aplicar)"
      estimate_likely: S
      type: full-stack
      executor: "@dev"
      quality_gate: "@architect"
      dependencies: ["3.1", "3.2"]
      notes: >
        CRUD tags + many-to-many task_tags. UI inline tag autocomplete.

    - id: "3.7"
      title: "Geração automática instâncias recorrentes (cron diário Inngest)"
      estimate_likely: M
      type: backend-job
      executor: "@dev"
      quality_gate: "@architect"
      dependencies: ["3.1", "3.2"]
      notes: >
        Reuse Inngest setup Story 2.8 (apps/web/src/lib/inngest/). Function
        `generate-recurring-tasks` cron `0 3 * * *` UTC. Lê task_recurrences (rrule string)
        + gera instances até 90 dias horizon (PRD AC2 Epic 3). Library: rrule.js.
        EB4 Inngest workspace EU Frankfurt deve estar provisionado pre-push (já era
        bloqueador Story 2.8 — verificar status).

    - id: "3.8"
      title: "Tools cérebro: criar_tarefa, completar_tarefa, listar_tarefas, listar_atrasadas"
      estimate_likely: M
      type: integration
      executor: "@dev"
      quality_gate: "@architect"
      dependencies: ["3.2", "Epic 2 ✓"]
      notes: >
        Reuse Story 2.3 toolRegistry pattern. 4 tools novos com Zod schemas. Reverse
        ops para criar_tarefa + completar_tarefa (FR6 undo Story 2.8 pattern). Pricing
        OK (anthropic + openai unchanged). Integration test E2E via /api/agent/prompt
        chamando estes tools.

  acceptance_criteria_epic:
    - AC1: "Criar tarefa via UI ou via cérebro tem mesmo resultado persistido"
    - AC2: "Recorrência semanal/mensal/dias-úteis funciona em horizonte de 90 dias"
    - AC3: "Drag-and-drop em Kanban e calendário persiste sem reload"
    - AC4: "Tarefa criada num household não é visível noutro household (RLS)"

  quality_gates_note: "AS de Epic 2 + UX review de @ux-design-expert"

  estimated_effort: "1S + 4M + 2L = 7-9 sprints (1 dev, dependendo Kanban/Calendário UI complexity)"

