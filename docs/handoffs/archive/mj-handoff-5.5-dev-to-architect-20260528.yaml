decisions:
  - id: D-5.5.1
    description: |
      REQ-INLINE-1 APLICADO INTEGRALMENTE — todos os 7 route handlers usam
      pattern canónico (`@/lib/agent/db-shim` + `requireAuth` + `withSpan` +
      `apiError` + `childLogger`) observado em 28+ route handlers existentes
    rationale: |
      Dev Notes prescreveu pattern divergente (`@meu-jarvis/db` direct +
      `createServerSupabaseClient` inline), mas @po Pax registou REQ-INLINE-1
      como mandatory inline fix. @dev aplicou directamente durante
      implementação. Razão técnica: `db-shim.ts:5-17` documenta que
      `@meu-jarvis/db` não resolve `@/schema` cross-package no tsc do
      apps/web — sem o shim, `pnpm typecheck` parte. Pattern unidireccional:
      route handler → db-shim → @meu-jarvis/db (compilado). Mocks de teste
      idem (`vi.mock('@/lib/agent/db-shim', ...)`). Briefing handler é
      stub sem DB query mas mantém auth+observability pattern.

  - id: D-5.5.2
    description: |
      OBS-1 (AC2 2-query pattern) — mantido COUNT(*) separado + SELECT limit 20
      (2 queries em vez de COUNT(*) OVER () window function)
    rationale: |
      Handler precisa devolver `count` real (até > LIMIT) para o widget
      exibir "N atrasadas" mesmo quando há mais que 20 tarefas. Alternativa
      COUNT(*) OVER () adicionaria custo às 20 rows do payload sem benefício
      mensurável vs. 2 queries index-supportadas (`tasks_overdue_idx`).
      Postgres planner usa o mesmo índice para ambas. KISS preservado.

  - id: D-5.5.3
    description: |
      OBS-4 (defensive parse) — helper `parseFinanceTotal(value)` em
      `financas-mes/route.ts` e `saldo-contas/route.ts` com `Number.isFinite()`
    rationale: |
      Drizzle retorna `sum()` como `string | null` (via Postgres `numeric`).
      Helper defensivo converte `string | number | null | undefined` para
      `int` cobrindo 3 casos: NULL (SUM tabela vazia → 0), string numérica
      (Postgres numeric), int (count). Sem `NaN` ou string vazia leaking
      para a response. Co-localizado mas duplicado (não extraído para utility)
      — apenas 2 consumers; abstração prematura evitada (KISS).

  - id: D-5.5.4
    description: |
      OBS-2 (Europe/Lisbon timezone) — todas as queries SQL usam
      `(now() at time zone 'Europe/Lisbon')::date` em vez de `CURRENT_DATE`;
      calendario-semana adiciona helper TS `toLisbonDateString()` via
      `Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Lisbon' })`
    rationale: |
      PT-PT user base é constraint absoluto (FR1). `CURRENT_DATE` retorna
      data em UTC do servidor Vercel — uma tarefa due hoje 23:30 Lisbon
      seria classificada como "hoje" até 00:30 UTC (ou seja, até 01:30
      Lisbon do dia seguinte). Solução: timezone explícito Europe/Lisbon
      em SQL + bucketing TS alinhado via `Intl.DateTimeFormat('en-CA')`
      (`en-CA` produz 'YYYY-MM-DD' lexicograficamente comparável).

  - id: D-5.5.5
    description: |
      OBS-5 (forward-compat briefing) — schema `BriefingResponseSchema`
      inclui `version: z.literal(1)` reservado para evolução
    rationale: |
      Briefing real (gerado pelo agente AI) virá de uma tabela cache
      populada por Inngest job nocturno em story futura (Epic 5 ou
      integração Epic 2). Schema v1 actual: stub. v2 poderá adicionar
      `sections`, `summary`, `actionItems`, etc. sem partir consumidores
      que validam contra v1. Forward compatibility pattern recomendado
      para stubs com evolução conhecida.

  - id: D-5.5.6
    description: |
      OBS-3 (enums byte-a-byte) — schemas Zod confirmados contra `finance.ts`
      antes de definir
    rationale: |
      Verificados em `packages/db/src/schema/finance.ts`:
        - transactionKindEnum (linha 52): ['expense', 'income', 'transfer']
        - recurrenceFreqFinanceEnum (linha 68): ['daily', 'weekly',
          'biweekly', 'monthly', 'quarterly', 'yearly', 'custom']
      ATENÇÃO: `recurrenceFreqFinanceEnum` NÃO tem `weekdays`/`weekends` —
      esses pertencem ao `recurrenceFrequencyEnum` de tarefas (tasks.ts)
      que NÃO é usado nesta story. Confirmação byte-a-byte preveniu
      regressão Constitution Article IV (No Invention).

