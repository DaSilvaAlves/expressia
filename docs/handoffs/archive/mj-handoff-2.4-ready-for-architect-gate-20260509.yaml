      - "Pedir CodeRabbit pre-gate (cmd: wsl bash -c 'cd /mnt/c/.../meu-jarvis && ~/.local/bin/coderabbit --prompt-only -t uncommitted')"
    questions:
      - "Aceita o skip ou pede execução antes do gate?"

