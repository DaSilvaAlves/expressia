    location: "classifier.ts:296"
    description: |
      `void trace` e `void z` no fim do ficheiro são side-effects para evitar
      tree-shaking agressivo. Solução pragmática mas pode ser substituída por
      configuração tsconfig (`importsNotUsedAsValues`) ou import direct usage.
    impact: "Baixo (cosmetic)."

  - id: "NIT-002"
    location: "schemas.test.ts:33"
    description: |
      DB_AGENT_SCHEMA_PATH é path relativo via fileURLToPath. Se a estrutura
      do monorepo mudar (e.g. `packages/db` → `packages/database`), o test
      falhará com erro claro. Documentado em commit message como Directive.
    impact: "Baixo (failure mode é limpo, não silent)."

  - id: "NIT-003"
    location: "language-gate.ts:42-65"
    description: |
      19 padrões cobrem PT-BR/EN/ES. Falta cobertura para FR/IT/DE/etc. — não
      requerido pela story (PT-PT exclusivo) mas Story 2.5 Planner pode querer
