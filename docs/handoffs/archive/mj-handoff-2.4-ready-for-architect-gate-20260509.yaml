# 3. ÁREAS-CHAVE PARA REVIEW @architect
# -----------------------------------------------------------------------------
review_focus_areas:

  area_1_structured_outputs:
    description: |
      Validar que o payload OpenAI com `response_format: { type: 'json_schema',
      json_schema: { strict: true, schema: zodToJsonSchema(...) } }` está
      semanticamente correcto e robusto.
    files: ["packages/classifier/src/classifier.ts:225-260"]
    questions:
      - "JSON Schema gerado por zod-to-json-schema é compatível com OpenAI strict mode?"
      - "$refStrategy: 'none' é o trade-off correcto (vs preserving refs)?"
      - "max_tokens: 256 é suficiente para 5 intents output?"

  area_2_language_gate_conservatism:
    description: |
      Validar que a lista de 19 padrões PT-BR/EN/ES é suficientemente
      conservadora — zero falsos positivos em PT-PT legítimo, falsos
      negativos aceites (LLM decide).
    files: ["packages/classifier/src/language-gate.ts:42-65"]
    decision_to_review: "[AUTO-DECISION D3 do @sm — regex sem ML; D11 do @dev — Unicode-aware lookbehind/lookahead com flag iu]"
    test_evidence: "12 frases PT-PT legítimas pass + 8 non-PT-PT fail + 4 edge cases (24 tests language-gate.test.ts)"
    questions:
      - "Faltam padrões obviamente non-PT-PT?"
      - "Algum padrão tem risco de falso positivo PT-PT?"

  area_3_defense_in_depth_pii:
    description: |
      Validar 3 camadas de defesa NFR12 — error messages, sanitizeHint,
      OTel whitelist.
    files:
      - "packages/classifier/src/errors.ts (todas as 4 subclasses)"
      - "packages/classifier/src/tracing.ts (whitelist 12 keys)"
      - "packages/classifier/src/__tests__/errors.test.ts (10 testes PII assertions)"
      - "packages/classifier/src/__tests__/tracing.test.ts (4 testes whitelist)"
    questions:
      - "Algum path em classifier.ts pode logar input.text sem o noticiar?"
      - "trace_id é sempre seguro de logar (não é PII)?"
      - "user_hash via hashForCorrelation é resistente a rainbow tables?"

  area_4_error_taxonomy_completeness:
    description: |
      Validar a taxonomia 4-class:
      - ClassifierValidationError (input rules — não retryable, error)
      - ClassifierLanguageError (gate — não retryable, warn)
      - ClassifierLLMError (wraps ProviderError — retryable=delegated)
      - ClassifierOutputError (Zod validation — retryable=true, retry 1×)
    decision_to_review: "[AUTO-DECISION D4 do @sm — sem ClassifierConfidenceError]"
    questions:
      - "Falta alguma categoria (ex: ClassifierTimeoutError separado)?"
      - "ClassifierLanguageError severity warn é defensável?"
      - "Retry 1× para Output é suficiente (vs 2× exponential)?"

  area_5_d8_max_5_intents_guardrail:
    description: |
      [AUTO-DECISION D8 — adicionada por @po na validation]: max(5) intents é
      guardrail anti-hallucination. Architecture.md:327 só impõe min(1).
      PRD AC1 Epic 2 ilustra cenário com 2 intents. PRD não fixa máximo.
    decision_to_review: "[AUTO-DECISION D8] manter / aumentar para max(10) / remover (só min(1))"
    impact_of_alternatives:
      - "Manter max(5): Story 2.4 stays as-is. Prudência intacta."
      - "max(10): permitir prompts mais densos; risco de hallucination LLM gerar 8-9 intents fracas. Recalcular threshold needs_confirmation?"
      - "Remover max: literal Architecture; risco max real — uma única misclassification do LLM gera resposta absurda."
    recommendation_dev: "Manter max(5) — bom equilíbrio. Validável em telemetry pós-2.5 (Story 2.11)."

  area_6_ac3_recalculation_in_classifier:
    description: |
      Decisão @dev: Classifier RECALCULA needs_confirmation e
      overall_confidence a partir do array de intents (linha 311-323
      classifier.ts via applyConfidenceDerivation). Protege contra LLM gerar
      output com flags incoerentes (ex: confidence < 0.70 mas
      needs_confirmation: false).
    files: ["packages/classifier/src/classifier.ts:311-323"]
    questions:
      - "Esta recalculação é a estratégia certa, ou devíamos REJEITAR outputs incoerentes?"
      - "Algum risco de divergência semântica vs o que o LLM 'queria' transmitir?"

  area_7_d9_d10_zero_risk_exports:
    description: |
      Story 2.2 (Done) modificada para expor OpenAIClientLike + sanitizeHint
      + mapOpenAIError. Modificações zero-comportamentais (apenas tornam
      pública uma type/function já existentes).
    files:
      - "packages/agent/src/errors.ts (sanitizeHint export added)"
      - "packages/agent/src/index.ts (3 re-exports added)"
    verification: "pnpm --filter @meu-jarvis/agent typecheck + test passam inalterados"
    questions:
      - "Modificar uma story Done é aceitável neste escopo (zero comportamento)?"
      - "Alternativa rejected: redefinir OpenAIClientLike localmente — viola AC7 da 2.4"

  area_8_d11_sanity_check_strategy:
    description: |
      Article IV sanity-check via fs.readFile + regex sobre agent.ts (em vez
      de import directo). Pattern análogo a Story 2.2 LLM_MODEL_VALUES_SANITY_CHECK
      mas via I/O em vez de import.
    files: ["packages/classifier/src/__tests__/schemas.test.ts:31-43"]
    rationale_dev: "TS cross-package não resolve @/* aliases internos do @meu-jarvis/db."
    questions:
      - "I/O em test é aceitável? (alternativa: project references no tsconfig do db)"
      - "Path absoluto frágil se monorepo muda (ver Directive em commit message)?"

  area_9_d12_skip_coderabbit:
    description: |
      CodeRabbit skipped por [AUTO-DECISION D12]. Precedente: Stories 2.2/2.3
      skipparam. Justificativa: 23 ficheiros (abaixo limite 150 mas adicional
      10-15min); decisões arquitecturais ficam para este gate; 5 quality
      gates já verde.
    options_for_architect:
