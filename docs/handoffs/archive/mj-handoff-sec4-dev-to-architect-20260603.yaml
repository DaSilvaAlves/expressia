context: |
  ===== O QUE FOI IMPLEMENTADO =====
  PARTE A (1.ª rede — fecha o leak): filtro `household_id` app-enforced nas 16 queries
  dos 6 helpers lib/finance/*, sempre via parâmetro bound (`${householdId}::uuid`), nunca
  concatenação. Distribuição: account-balances 2 · list-card-statements 4 (incl.
  installments WHERE NOVO) · month-summary 3 · month-projection 2 · list-recurrences 1
  (condição no array) · list-variable-transactions 1 + getVariableTxFilterOptions 3.
  Verificação: grep `household_id` em lib/finance passou de 0 → 16 query-lines (+1 comentário).

  PARTE B (2.ª rede — RLS viva): as 5 pages envolvem o fetch em
  `withHousehold({ userId: user.id, householdId }, (tx) => helper({ db: tx, householdId }))`
  DENTRO do `withSpan` (ADR-003 Adenda §10.3). `este-mes` e `variaveis` mantêm o
  `Promise.all` DENTRO do mesmo callback (partilham tx/contexto RLS — AC3). `getDb()`
  REMOVIDO por completo das 5 pages (grep: 0); import trocado para `withHousehold` via
  `@/lib/agent/db-shim` (AC4/AC5). Guards (redirect /entrar + UI de erro por-página com
  FinanceViewTabs) INALTERADOS (AC5 — não centralizado).

  ===== DECISÕES HONRADAS (já fixadas pela story) =====
  - AC2: getVariableTxFilterOptions → categorias `and (household_id = $hh::uuid or
    household_id is null)` (globais partilhadas); accounts/cards ESTRITOS. Os LEFT JOIN
    categories (month-summary/list-recurrences/list-variable) filtram a tabela principal
    (t./r.household_id), NUNCA o join — confirmado.
  - AC6: getServiceDb()/jobs/helpers puros (card-statement-helpers, finance-recurrence-helpers)
    INTOCADOS. Sem migration (104 policies intactas).

  ===== TESTES (AC7/AC8) =====
  - AC7 (regressão bound-param): os 6 testes de helper capturam o objecto SQL Drizzle
    passado a `execute` e asserem `household_id` nos params bound, via util partilhado NOVO
    `apps/web/src/lib/finance/__tests__/_sql-bound-params.ts` (mirror SEC-1 AC-K2 —
    `boundParamValues`, sem sufixo .test. → não é colectado como suite). PO-OBS-2 honrada:
    card-statements assere as 4 queries (incl. installments nova); month-summary as 3;
    variable-tx-options as 3 + discriminante AC2 (`household_id is null` SÓ em categorias,
    ausente em accounts/cards).
  - AC8: mock de `@/lib/agent/db-shim` nas 5 pages passou a expor
    `withHousehold: (_auth, fn) => fn({ execute: vi.fn() })`; cada page assere o helper
    chamado com `householdId: 'h1'` (objectContaining).

  ===== FILE LIST (24 ficheiros) =====
  6 helpers + 5 pages + 6 testes helper + 5 testes page + 1 util novo (_sql-bound-params.ts)
  + 1 diag pré-existente verificado (sec4_financas_ssr_leak.test.ts). Lista completa na
  secção File List da story.

  ===== DEV-DECISIONS A RATIFICAR NO GATE =====
  - [DEV-DECISION-1] AC9.1: o diag `sec4_financas_ssr_leak.test.ts` (criado no kickoff) NÃO
    foi expandido para as 16 queries — cobre as 5 query-shapes principais (accounts,
