context: >
  Story 4.5 é o job Inngest cron diário (03:00 UTC, alinhado Stories 2.8 + 3.7) que materializa
  transacções financeiras recorrentes. DP4=A (só dia corrente, `next_run_on <= today`) e DP8=A
  (prestações NÃO são scope — geradas atomicamente pela Story 4.4 na criação do installment).

  Precedente directo: Story 3.7 Done v1.4 (`generate-recurring-tasks.ts`) — padrão Inngest
  idêntico com adaptações para domínio Finanças:
    - Entidade: `recurrences` (Finance, não task_recurrences)
    - Output: INSERT em `transactions` (não em `tasks`)
    - Frequências: aritmética date-fns simples (daily/weekly/biweekly/monthly/quarterly/yearly/custom)
      em vez de RRULE; `recurrenceFreqFinanceEnum` tem `quarterly` e NÃO tem `weekdays`/`weekends`.
    - Horizonte: só dia corrente (DP4=A) vs 90 dias para Tarefas
    - is_projected=false (transacção do dia corrente, NÃO futura)
    - Enum audit: `finance_recurrences_generated` (migration 0015), NÃO `recurrences_generated` (Story 3.7)

  13 anti-hallucination verificações executadas:
    - Schema `recurrences` (`finance.ts:232-282`) + enum `recurrenceFreqFinanceEnum` (`finance.ts:68-76`)
    - Schema `transactions` (`finance.ts:358-431`) incl. CHECKs obrigatórios
    - Infra Inngest (`route.ts` já com 2 functions — 4.5 adiciona a 3ª)
    - `auditActionEnum` (`audit.ts:28-107`) — `finance_recurrences_generated` NÃO existe, migration 0015 cria
    - Índice unique `transactions_recurrence_id_date_unique` NÃO existe — migration 0015 cria
    - `getServiceDb()` padrão confirmado para jobs sistémicos
    - `recurrences.nextRunOn` inicializado = `starts_on` pela Story 4.4 AC1 POST confirmado

