# ───────────────────────────────────────────────────────────────────────────
# 📝 LIÇÕES (para gotchas.json futuro)
# ───────────────────────────────────────────────────────────────────────────
licoes:
  - 'Quando MIDDLEWARE_INVOCATION_FAILED em Next.js 15 + Vercel, sempre comecar por `vercel logs --source edge-middleware --expand` para apanhar o stack trace runtime (NÃO build logs). O comando precisa de --project e --scope explícitos quando o repo não está linkado a um project local.'
  - '@supabase/ssr `createServerClient` valida `supabaseUrl` em runtime e lança Error sincronamente — qualquer corrupção do valor (aspas, whitespace, newline) crasha o middleware antes de ele ter chance de fazer try/catch.'
  - 'Vercel UI não normaliza valores ao guardar env vars. Copy/paste de `.env.local` que tenha aspas (formato dotenv) preserva-as como caracteres literais. Validação manual em Edit mode é a única forma de detectar.'
  - 'turbo.json `tasks.build.env` deve listar TODAS as env vars usadas em build, mesmo as que apenas o middleware/runtime consomem — Vercel/Turborepo emite warning visível em build logs caso falte. Não é causa de crash mas é tech debt visível.'

