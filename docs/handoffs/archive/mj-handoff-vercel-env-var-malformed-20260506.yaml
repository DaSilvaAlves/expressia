# ───────────────────────────────────────────────────────────────────────────
# TL;DR
# ───────────────────────────────────────────────────────────────────────────
summary: >
  Sessão 22:37–22:55 executou Passo 1 do playbook anterior. Vercel CLI
  (`vercel logs --source edge-middleware`) revelou stack trace exacto:
  `[Error: Invalid supabaseUrl: Provided URL is malformed.]`
  Causa: pelo menos 1 das 5 env vars Supabase em Vercel UI tem aspas
  literais, whitespace, ou newline embebido. @supabase/ssr `createServerClient`
  valida a URL e rejeita. Fix é manual Eurico (~3 min). Não é trabalho de
  codebase. Cleanup paralelo já feito: commit local c7901a7 adiciona
  SUPABASE_SERVICE_ROLE_KEY a turbo.json.

# ───────────────────────────────────────────────────────────────────────────
# 🔴 CAUSA EXACTA (evidence)
# ───────────────────────────────────────────────────────────────────────────
causa:
  comando_diagnostico: |
    vercel logs https://expressia-black.vercel.app --no-follow --since 30m \
      --source edge-middleware --expand \
      --project expressia --scope euricojsalves-4744s-projects
  output_decisivo: |
    TIME         HOST                        LEVEL
    22:50:15.02  expressia-black.vercel.app  error  ε GET /
    [Error: Invalid supabaseUrl: Provided URL is malformed.]
  origem_codigo: |
    apps/web/src/middleware.ts:29
      createServerClient(
        process.env.NEXT_PUBLIC_SUPABASE_URL!,  // ← este valor é malformado
        process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
        ...
      )
    @supabase/ssr valida a URL e lança Error em runtime → middleware crash → 500.
  hipoteses_descartadas:
    - 'H2 (turbo.json): build warnings não afectam middleware (só usa NEXT_PUBLIC_*). Cleanup feito mesmo assim.'
    - 'H3 (Edge Runtime incompat): false — error message é validação de URL, não API incompat.'
    - 'H4 (versão @supabase/ssr quebrada): false — error é input validation.'

# ───────────────────────────────────────────────────────────────────────────
# 🎯 PLAYBOOK PRÓXIMA SESSÃO
# ───────────────────────────────────────────────────────────────────────────
playbook:
  passo_1_eurico_corrige_env_vars:
    quem: Eurico (manual UI)
    duracao: ~3 min
    accao: |
      1. Abrir https://vercel.com/euricojsalves-4744s-projects/expressia/settings/environment-variables
      2. Para CADA uma das 5 env vars (NEXT_PUBLIC_SUPABASE_URL,
         NEXT_PUBLIC_SUPABASE_ANON_KEY, DATABASE_URL, DATABASE_URL_DIRECT,
         SUPABASE_SERVICE_ROLE_KEY):
         a. Click ⋯ → Edit
         b. VERIFICAR o início e o fim do valor:
            - NÃO começa com aspa literal (")
            - NÃO termina com aspa literal (")
            - NÃO termina com espaço, tab ou newline
         c. NEXT_PUBLIC_SUPABASE_URL deve começar com `https://` e
            terminar com `.supabase.co` (sem trailing slash)
         d. Se houver corrupção: clear field, copiar valor fresh do
            `apps/web/.env.local` (ou pedir ao gestor de secrets) e colar.
            Save.
      3. Após editar, ir a Deployments → ⋯ no current deployment →
         "Redeploy" → DESMARCAR "Use existing Build Cache" → Redeploy.
      4. Esperar Build complete (~30s) + Deploy Ready.
      5. Confirmar com curl:
         curl -i https://expressia-black.vercel.app/
         Esperado: 200 OK (landing) OU 307 redirect para /entrar.
         NÃO 500.

  passo_2_devops_push:
    quem: '@devops Gage'
    duracao: ~2 min
    comando: '@devops *push'
    pre_condicao: 'Passo 1 completo + curl OK'
    accao: |
      Push 2 commits locais para origin/main (origin/main já tem 3991453):
        - c7901a7 chore(turbo): expor SUPABASE_SERVICE_ROLE_KEY no pipeline de build [Story 1.6]
        - 4c45068 docs(handoffs): close Vercel middleware crash investigation, escalate env var fix to Eurico
      CI corre quality + rls-gate + build. Vercel auto-redeploy em paralelo.

  passo_3_dev_retoma_tasks_4_5:
    quem: '@dev Dex'
    duracao: ~30-60 min
    comando: '@dev *develop docs/stories/active/1.6.canary-endpoint-me.md'
    pre_condicao: 'Passo 2 completo + Vercel deploy verde'
    accao: |
      Tasks 4 (Playwright E2E RLS isolation) + 5 (latency p95 < 200ms).
      Pré-requisitos: Gage configura 3 GitHub secrets primeiro (Eurico
      partilha SUPABASE_SERVICE_ROLE_KEY → gh secret set).

