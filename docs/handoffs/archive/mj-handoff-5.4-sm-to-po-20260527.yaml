decisions:
  - id: DRAFT-5.4.A
    description: |
      Story 5.4 drafted seguindo formato canónico das Stories 5.x meu-jarvis
      (executor @dev + quality_gate @architect; 9 ACs com PASS criteria;
      9 Tasks com checkboxes [ ]; 7 DPs documentadas no AC9; Dev Notes com
      Previous Story Insights + Source Tree + Architecture Trace + Testing
      Standards + Known Issues/Carry-overs).
    rationale: |
      Formato custom do projecto meu-jarvis bate certo com precedente Stories
      5.1, 5.2, 5.3 (todas executor @dev + quality_gate @architect, ACs
      numerados com PASS criteria explícitos). Story template AIOX padrão
      (`product/templates/story-tmpl.yaml`) é mais minimal e não capta as
      convenções desenvolvidas pelo projecto — adoptado o pattern do precedente
      consistente (3 stories Done em sequência).

  - id: DRAFT-5.4.B
    description: |
      DP-5.4.A: <ChatPanel> em apps/web/src/components/chat/ (NÃO packages/ui)
    rationale: |
      architecture.md §8.4 linha 727 prescreve EXACTAMENTE:
      "apps/web/src/components/chat/ # ChatPanel, MessageList, PreviewCard,
      UndoToast". Chat é app-específico — consome next/navigation,
      @sentry/nextjs, endpoint /api/agent/prompt. packages/ui é design
      system genérico. Promoção para packages/ui/chat/ é trivial se houver
      segunda app — zero lock-in. Alinhado com Story 5.3 DP-5.3.A (shell em
      apps/web também).

  - id: DRAFT-5.4.C
    description: |
      DP-5.4.B: PascalCase para tsx (ChatInput.tsx, PreviewCard.tsx,
      ResultMessage.tsx) + kebab-case para utility (error-messages.ts)
    rationale: |
      Precedente Stories 5.2 (MoneyDisplay.tsx, DateDisplay.tsx) + 5.3
      (Sidebar.tsx, TopBar.tsx, ChatPanelSlot.tsx, AppShell.tsx,
      SidebarNav.tsx, BreadcrumbLabel.tsx, HamburgerButton.tsx,
      TopBarHamburger.tsx). Story 2.7 (mais antiga) usou kebab-case por
      convenção anterior; Story 5.4 alinha com pattern consolidado. Risco
      identificado: case-insensitive filesystems (Windows/macOS default) —
      @dev deve verificar `git config core.ignorecase` pre-`git mv` para
      evitar duplicação ghost.

  - id: DRAFT-5.4.D
    description: |
      DP-5.4.C: chatStore Zustand vs alternativas — Zustand wins
    rationale: |
      (i) architecture.md §8.3 linha 711-712 prescreve Zustand para "UI
      ephemeral"; (ii) prop drilling exigiria <ChatPanel> em layout root =
      coupling pesado; (iii) URL params não cabem para arrays de mensagens;
      (iv) TanStack Query é para server data, chat é client state puro.
      Pattern alinhado com shellStore Story 5.3 (precedente testado).

  - id: DRAFT-5.4.E
    description: |
      DP-5.4.D: prop mode vs 2 componentes irmãos — prop wins KISS
    rationale: |
      95% da lógica é idêntica entre panel e fullscreen (mesmo state,
      mesmo endpoint, mesmo branching). Duplicar em 2 componentes seria
      over-engineering. Re-avaliar Fase 2 se modes divergirem (ex: fullscreen
      ganhar right rail de histórico per wireframe §5.5).

  - id: DRAFT-5.4.F
    description: |
      DP-5.4.F: chatStore NÃO persiste mensagens em localStorage
    rationale: |
      (i) Story 2.7 actual não persiste (re-load reinicia); (ii) privacy
      concern (prompts plaintext no browser sem encryption); (iii) histórico
      cross-session é dado server-side futuro — quando existir schema
      chat_history em DB, fetch via RSC no mount; (iv) sem benefício real
      até existir esse backend. Re-avaliar Fase 2.

  - id: DRAFT-5.4.G
    description: |
      DP-5.4.G: label "Chat" + URL /jarvis carry-over Story 5.3 DP-5.3.D
    rationale: |
      "Jarvis" é nome próprio do agente AI internamente (PRD §3.1); "Chat"
      é função user-facing per front-end-spec §5.4 linha 500. Mudar URL
      para /chat exigiria refactor middleware + redirects retro-compatibilidade
      — out-of-scope. metadata.title preservado "Jarvis — Expressia". Carry-over
      consciente assumido em Story 5.3 e mantido aqui.

  - id: DRAFT-5.4.H
    description: |
      Carry-over Vercel AI SDK useChat divergência (architecture §8.3 linha 711)
      preservado SEM mudança nesta story
    rationale: |
      Story 2.7 não adoptou useChat apesar de architecture §8.3 prescrever —
      esta story preserva fetch directo a /api/agent/prompt byte-a-byte.
      Refactor para useChat é story dedicada futura (provavelmente Fase 2)
      se houver real streaming SSE — fora-de-scope refactor cirúrgico desta
      story.

  - id: DRAFT-5.4.I
    description: |
      Carry-over middleware APP_PATH_PREFIXES = ['/visao', '/jarvis', '/conta']
      preservado SEM mudança nesta story
    rationale: |
      `/tarefas` e `/financas` cobertos por requireAuth() server-side mas não
      pelo middleware (Story 5.3 DP-5.3.E identificou). NÃO é falha de
      segurança (RLS Postgres protege; requireAuth no server route). UX
      degradada apenas: utilizador deslogado vê erro em vez de redirect
      directo. Folding decidido em Story 5.10 (sweep responsive + branding
      auth). Esta story (5.4) NÃO toca middleware.

