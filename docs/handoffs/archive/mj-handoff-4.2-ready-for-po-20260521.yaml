  Scope: 4 route handlers (~10 métodos de endpoint) sob
  apps/web/src/app/api/financas/{contas,cartoes}/ — CRUD de accounts e cards
  com auth, RLS via getDb(), audit log, soft-delete via archived_at, variant
  delete_owner_admin, validação composta de cartão de crédito. 2 Zod schema
  files + extensão do helper audit.ts. ~25 tests integration mockable-friendly.

  ACHADO: o helper api-helpers/audit.ts tem o type union `TasksAuditAction`
  (tasks-scoped) — a 4.2 estende-o com account.*/card.* (os valores JÁ
  existem no enum Postgres audit_action via migration 0014 da Story 4.1 —
  zero migration nova, zero feature flag, contraste com o caso kanban da
  Story 3.4).

  12 ACs + 8 Tasks/Subtasks + 4 DPs. Cross-confirm anti-hallucination @sm
  contra codebase real (finance.ts schema, 0001 RLS policies, helpers,
  api-schemas/tags.ts pattern).

