        const res = await fetch(`/api/agent/prompt/${runId}/confirm`, ...);
        const data = (await res.json()) as { results?: unknown };
        onConfirm(data.results);  // ← DESCARTA undo_url + undo_expires_at !
        ```
        A response do confirm endpoint JÁ tem undo_url+undo_expires_at (per
        confirm/route.ts:295-303 verified) mas PreviewCard descarta esses campos.
