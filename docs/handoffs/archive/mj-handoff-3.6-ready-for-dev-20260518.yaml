summary: >
  Story 3.6 v1.3 Ready for Dev YOLO — @architect Aria ratify PASS HIGH 7/7 DPs (2 RATIFY EXPLICIT + 5 APPROVE silent).
  Phase 3 SDC complete. Story passou de v1.2 (PO GO 9.0/10) para v1.3 (Architect Ratified) sem regression nem
  pré-condições. Eurico delegou YOLO autónomo — @dev pode iniciar `*develop 3.6` immediately.

  **Verdicts DPs:**

  1. **DP-3.6.6 APPROVED A** (query design `json_agg` LEFT JOIN + GROUP BY) — HIGH confidence técnica unânime.
     Idiomatic Postgres, 1 query, indexed (task_tags_tag_idx + tags_household_idx + tasks_select_member RLS).
     Cardinalidade controlada O(n+m). 8/9 critérios vence B (batch 2ª query). EXPLAIN ANALYZE obrigatório em T6.0
     (G1.1) em fixture ~1000 tasks × 5000 task_tags. Pattern `FILTER (WHERE tags.id IS NOT NULL)` neutraliza
     LEFT JOIN edge (array vazio em vez de `[null]`).

  2. **DP-3.6.7 APPROVED A** (endpoint extension `?with_counts=true` opt-in) — HIGH confidence técnica unânime.
     Backward compat 100% (Story 3.2 tests intactos). Pattern Epic 3 query-param opt-in. Article IV
     [STORY-INVENT-DP-3.6.7] formalmente declarada. Boolean parse estrito `=== 'true'` (G2.1) +
     `current_household_id()` explicit no subquery COUNT (G2.2 defesa em profundidade RLS).

  3. **DP-3.6.1 a DP-3.6.5 APPROVE silent** — palette 8 cores defensável Article IV, soft limit 5 UI KISS,
     autocomplete prefix + criação inline canónica, modal hand-roll EditTaskModal pattern :14-20+:28-45+:80
     re-confirmado linha-por-linha, filtro `?tag_id=` pattern Epic 3 consistency.

  **Anti-hallucination Aria (6 fontes):** Read+Grep zero divergências:
  (a) EditTaskModal.tsx:1-50 hand-roll pattern · (b) package.json @dnd-kit + zero Radix ·
  (c) tasks.ts:174-221 schema (range 168-223 da story correto) · (d) 0001_rls_policies.sql:403-435 8 policies ·
  (e) 6 endpoints API tags filesystem confirmed · (f) list-tasks.ts:32-51 TaskRow 17 fields sem `tags` +
  sub-query :123-126 + SELECT canónico :142-149.

  **G-notes para @dev (3 famílias, 6 notes):**
  G1.1 EXPLAIN ANALYZE obrigatório T6.0 · G1.2 GROUP BY semantics PG 16 · G1.3 Zod `tags: z.array(TagSchema).default([])` ·
  G2.1 boolean parse estrito · G2.2 current_household_id() explicit · G3.1 click-outside hand-roll pattern T1.3+T4.1.

  Estimate ~9-9.5h escopo S. Constitution 6/6 PASS. Risks 0H/0M/3L todos mitigated. NIT-AR-3.6.1 non-blocking.

