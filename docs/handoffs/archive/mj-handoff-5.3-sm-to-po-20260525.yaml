decisions:
  - id: SM-5.3.1
    description: Estimate M (não L) — chat panel é APENAS slot vazio nesta story
    rationale: |
      Story 5.2 (M) precedente directo: workspace bootstrap + 2 componentes +
      refactor 11 imports — pieces pequenas bem definidas. Story 5.3 é
      equivalente: shell 3-zonas com 5 componentes UI puros + 1 store Zustand +
      responsive breakpoints. Não é L porque (a) chat panel é APENAS slot vazio
      (a `<ChatPanel>` real é Story 5.4 com 267+ linhas extraídas de jarvis-chat),
      (b) zero endpoints novos, (c) zero schema/migration, (d) zero refactor de
      rotas existentes (grandfather-friendly R-5.7 mitigação é feature). M
      confirmado.

  - id: SM-5.3.2
    description: Shell em apps/web (não packages/ui) — DP-5.3.A
    rationale: |
      Shell é aplicação-específico: consome `logoutAction` de apps/web,
      `usePathname` de Next.js, store Zustand local, nav items definidos pela
      árvore de rotas concreta do apps/web. packages/ui é design system genérico
      (MoneyDisplay/DateDisplay/tokens). Alinhado com architecture.md §8.4
      linha 727 que prevê `apps/web/src/components/chat/` (precedente). Se em
      Fase 2 houver segunda app, promover é trivial — zero lock-in.

  - id: SM-5.3.3
    description: Refactor zero-toque em rotas existentes (preservar grandfather)
    rationale: |
      R-5.7 do Epic 5 §6 alerta para "Layout shell quebra rotas existentes".
      Mitigação aplicada: shell apenas REFORMATA o chrome à volta; `children`
      continuam a render no `<main>` exactamente como antes. Validation
      smoke obrigatória (T8.3) em todas as 11 rotas. AC1.e enumera ficheiros
      "Sem alterações em" para tornar regressão impossível.

  - id: SM-5.3.4
    description: Carry-over DP-5.3.E middleware regression NÃO incluído em scope
    rationale: |
      `middleware.ts:36` actual APP_PATH_PREFIXES = ['/visao', '/jarvis', '/conta']
      — faltam `/tarefas` + `/financas`. Regressão pre-existente das Stories
      3.3-3.5 + 4.6-4.9 (adicionaram rotas mas não actualizaram middleware).
      Mitigação actual: `requireAuth()` nas páginas aborta server-side (UX
      degradada, não falha segurança). **Tocar middleware nesta story exige
      re-teste regressão completo Story 1.5 — fora de scope**. Recomendar a @po
      mini-story dedicada ou folding em Story 5.10.

  - id: SM-5.3.5
    description: DP5 root redirect também CARRY-OVER (não incluído)
    rationale: |
      `apps/web/src/app/page.tsx` actual é marketing landing público. DP5
      Epic 5 §8 = A: utilizador autenticado em `/` → redirect `/visao`.
      Implementação trivial (1 server check + redirect) mas ortogonal ao
      shell. Folding aqui criaria scope creep. Mesma decisão que DP-5.3.E:
      mini-story ou Story 5.10.

  - id: SM-5.3.6
    description: Zustand persist key versionado `expressia-shell-v1`
    rationale: |
      Permite invalidar estado em mudanças de schema futura sem código de
      migração (Zustand re-cria estado default se chave não existe). v1 reflecte
      shape inicial (sidebar.collapsed + chatPanel.open). Story 5.8 adicionará
      theme persist em chave separada (`expressia-theme-v1`) ou herdada — DP2
      decide. Não bloquear.

