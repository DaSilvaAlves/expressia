decisions:
  - id: DEV-5.4.1
    description: |
      Tipos location split — `ChatMessage`+`PreviewState` exportados de
      `chatStore.ts` (são shape do store); `PromptResponse*` internos em
      `ChatPanel.tsx` (resposta endpoint não reutilizada)
    rationale: |
      Separation of concerns — domain types (Message/Preview são contract
      do store e podem ser consumidos por outros componentes futuros) vs
      implementation types (PromptResponse* é shape da response HTTP do
      endpoint `/api/agent/prompt`, lifetime restrito à chamada fetch).
      Pattern KISS + reusability balance.

  - id: DEV-5.4.2
    description: |
      `makeMessageId()` movida para `chatStore.ts` como utility exportada
    rationale: |
      Função apenas utilizada no contexto de criar `ChatMessage` para
      `appendMessage()`. Co-localizar com tipos `ChatMessage` reduz cognitive
      load. ChatPanel importa do chatStore. Alternativas consideradas
      (ficheiro utility separado; inline em ChatPanel) descartadas — não
      vale a abstracção sem segundo consumer.

  - id: DEV-5.4.3
    description: |
      PO_FIX_INLINE F2 two-step rename procedure EXECUTADO COM SUCESSO
      em MINGW64 Windows 11
    rationale: |
      `git config --get core.ignorecase = true` confirmado pré-rename.
      6 two-step renames (3 source tsx + 3 test tsx) + 2 single-step
      (kebab→kebab para error-messages.ts e error-messages.test.ts)
      executados sequencialmente. `git status -s` pós-rename revelou
      8 entries `R ` (rename detectado correctamente pelo git, history
      preservada). ZERO `??` + `D` ghosts (bug case-insensitive não
      ocorreu). PO_FIX_INLINE F2 ratificada como procedure obrigatório
      para Windows.

  - id: DEV-5.4.4
    description: |
      Net change real testes = +20 (não +5 estimado por F1)
    rationale: |
      Discrepância vs F1 explicada:
        - chatStore.test.ts tem 11 testes (não 8) — adicionei 2 makeMessageId
          unit tests + 1 sanity check para hooks selectores durante
          implementação. Coverage adicional não-bloqueante.
        - ChatPanel.test.tsx tem 8 testes (match estimativa F1)
        - ChatPanel.integration.test.tsx tem 2 testes (match estimativa F1)
        - jarvis-chat.test.tsx eliminado tinha mais que 13 patterns
          contáveis (provavelmente describe + nested its inflaram count
          original; @po grep retornou 13 it patterns mas vitest pode ter
          contado 14 com describe wrapper).
        - ChatPanelSlot.test.tsx ajustes mantêm 3 testes (count preservado),
          adicionados 2 vi.mock declarations + 1 useChatStore import (zero
          test count change).
      Total real: 759 baseline + 20 net = 779 PASS. Não-bloqueante — testes
      adicionais aumentam NFR16 coverage. @architect ratificar.

  - id: DEV-5.4.5
    description: 7 DPs RATIFICADAS na implementação
    rationale: |
      DP-5.4.A: ls apps/web/src/components/chat/ confirma localização
      DP-5.4.B: 4 sub-componentes em PascalCase tsx + 1 utility kebab
      DP-5.4.C: ChatPanel + ChatPanelSlot consomem useChatStore
      DP-5.4.D: prop mode 'panel' | 'fullscreen' aplicado em outerClassName
      DP-5.4.E: zero useChatHydrated em codebase — chatStore não persiste
      DP-5.4.F: grep `persist` em chatStore.ts ZERO matches (sem middleware)
      DP-5.4.G: jarvis/page.tsx metadata.title "Jarvis — Expressia" preservado

  - id: DEV-5.4.6
    description: F3 GO-CONFIRM verificado pós-migração
    rationale: |
      grep `from '@/components/chat/'` em
      `apps/web/src/components/chat/__tests__/` retornou 4 matches
      (1 por teste — cada teste importa apenas seu component testado).
      Pattern unidireccional preservado. ChatPanel.tsx importa 4
      sub-componentes (ChatInput, PreviewCard, ResultMessage, errorMessageFor)
      + chatStore — também unidireccional. Zero imports A↔B entre
      sub-componentes. T2.9 da story PASS.

