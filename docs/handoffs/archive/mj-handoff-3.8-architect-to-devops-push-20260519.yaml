ratify_dev_decisions:
  D-3.8.1:
    title: T6.4 apply migration prod delegado a @devops
    verdict: APPROVE
    rationale: |
      Pattern consistente Stories 3.1/3.4/3.6 Done. SQL `0012` é idempotente
      (`ALTER TYPE ... ADD VALUE IF NOT EXISTS` desde PG 9.6+). T6.3 typecheck
      verde (9/9 cached) prova sincronismo Drizzle↔SQL. Ambiente local @dev sem
      credenciais Supabase production é constraint operacional válida.
  D-3.8.2:
    title: Imports relativos dentro de packages/tools/src/tasks/
    verdict: APPROVE
    rationale: |
      Constitution Article VI (NFR19) regula imports entre packages
      `@meu-jarvis/*` no workspace, NÃO imports dentro do mesmo source tree.
      Cross-confirm: `contracts.ts:79-91` JÁ documenta a limitação `paths`
      aliases cross-package (`DrizzleDbClient` definido localmente). Pattern em
      `tasks/*.ts` herda esse precedente.
  D-3.8.3:
    title: Zod default movido para execute body
    verdict: APPROVE
    rationale: |
      `z.optional().default(X)` produz `_input` asymmetric — quebra
      `inputSchema: z.ZodType<I>` em `ToolDefinition`. Solução
      `input.priority ?? 'medium'` preserva equivalência funcional sem alterar
      contract Story 2.3 Done. Description PT-PT mantém visibility do default.

