dev_decisions:
  - 'D-4.2.A — AccountUpdateSchema NÃO inclui initial_balance_cents. O AC1 PATCH não o lista como editável; editá-lo causaria drift do balance_cents (snapshot DP-4.2.4 — recompute pertence à Story 4.9). Update = name/account_type/bank_name/iban_last4.'
  - 'D-4.2.B — Semântica do filtro `archived` no GET: archived=false (default) → archived_at IS NULL (activas); archived=true → archived_at IS NOT NULL (só arquivadas). Filtro directo sobre o estado, consistente com os filtros directos account_id/card_type do GET cartões. Parse estrito (só literal "true").'
  - 'D-4.2.C — cards_credit_needs_limit no PATCH: CardUpdateSchema não tem refinamento composto (não conhece o estado existente do cartão). Mudar card_type para credit sem limite é apanhado pelo CHECK do DB; o handler PATCH detecta a violação e converte em 400 VALIDATION_ERROR (não 500). Defesa em profundidade.'

