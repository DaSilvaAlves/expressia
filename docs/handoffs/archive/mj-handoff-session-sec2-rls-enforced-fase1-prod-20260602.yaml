summary: |
  Story SEC-2 (Fase 1 do hardening RLS-enforced, ADR-003) está EM PRODUÇÃO.
  A RLS deixou de estar inerte em runtime para o piloto de tarefas — adicionada a
  2.ª rede de isolamento cross-tenant (defense-in-depth) por baixo do app-enforced
  de SEC-1. Nada a meio.

  O QUE FOI FEITO: `withHousehold(auth, fn)` em `packages/db/src/client.ts` —
  wrapper transaccional que faz `SET LOCAL ROLE authenticated` + `SET LOCAL
  request.jwt.claims` por request (reverte no COMMIT — zero fuga entre requests no
  pool pgbouncer transaction-mode 6543). Comentário falso sobre herança de
  auth.uid() corrigido. Gate CI endurecido com teste de APLICAÇÃO real
  (`rls-application.test.ts`): semeia 2 households, liga via withHousehold com o
  role do runtime, prova 0 rows cross-tenant + INSERT bloqueado (antes só validava
  existência estática de policies). Piloto: o handler GET /api/tasks envolve
  listTasksHelper em withHousehold (helper puro intacto, recebe tx injectado —
  preserva G1). getServiceDb()/service_role intactos (jobs Inngest/migrations).
  App-enforced (filtro household_id de SEC-1) NUNCA removido — é a 1.ª rede.

  Ciclo completo: @sm draft → @po GO 9,0/10 → @dev develop → @architect adversarial
  gate PASS 9,5/10 (8/8 focos de segurança limpos, 3/3 DEV-DECISION ratificadas).
  SEM migration SQL nova (as 104 policies existem desde 0001) → NÃO requereu
  db:migrate em prod.

