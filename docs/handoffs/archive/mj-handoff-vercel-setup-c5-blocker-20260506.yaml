    tree limpo. Story 1.6 status: InProgress. Tasks 4-5 ⏸ paused.

  passo_1_eurico_cria_vercel_project:
    quem: Eurico (manual — Gage não tem permissão)
    duracao: ~5 min
    accao: |
      1. Abrir https://vercel.com/new
      2. Import Git Repository → seleccionar DaSilvaAlves/expressia
      3. Configurar:
         - Team: euricojsalves-4744s-projects (ou criar novo)
         - Project Name: expressia (sugerido)
         - Root Directory: apps/web
         - Framework Preset: Next.js (auto-detect)
         - Region: fra1 (já em apps/web/vercel.json)
      4. Environment Variables (Production + Preview + Development):
         - NEXT_PUBLIC_SUPABASE_URL = <Supabase project URL eu-central-1>
         - NEXT_PUBLIC_SUPABASE_ANON_KEY = <anon key>
         - DATABASE_URL = <pooler 6543 com prepare:false>
         - DATABASE_URL_DIRECT = <pooler 5432 session-mode>
         - SUPABASE_SERVICE_ROLE_KEY = <service role key>
      5. Confirmar GitHub Integration activa (auto-deploy em PRs + push main)
      6. Após criar, validar:
         - First deploy verde (deve compilar Next.js sem problemas)
         - Custom domain expressia.pt apontado (opcional, pode ficar para depois)

  passo_2_eurico_partilha_credenciais:
    quem: Eurico → Gage
    duracao: ~1 min
    accao: |
      Fornecer ao Gage (na conversa, copy/paste — NÃO commit ao repo):
        - Vercel project name confirmado (ex: "expressia" ou outro)
        - SUPABASE_SERVICE_ROLE_KEY (para CI test setup E2E)
