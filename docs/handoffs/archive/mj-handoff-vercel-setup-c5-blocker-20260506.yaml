        gh secret set NEXT_PUBLIC_SUPABASE_URL --repo DaSilvaAlves/expressia
        gh secret set NEXT_PUBLIC_SUPABASE_ANON_KEY --repo DaSilvaAlves/expressia
        gh secret set SUPABASE_SERVICE_ROLE_KEY --repo DaSilvaAlves/expressia
      Verificar com: gh secret list --repo DaSilvaAlves/expressia

  passo_4_dex_retoma_tasks_4_5:
