# 2x verde), Eurico testou /visao e /?code=... no browser local e ambos
# mostraram Runtime Error. Causa: cache stale do `.next/` no dev server
# background que correu durante toda a sessão. CI continua verde porque
# runners constroem do zero. Este handoff documenta o gap e dá fix accionável.

