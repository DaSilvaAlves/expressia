summary: >
  Story 1.5 está formalmente Done com QA Gate PASS, 15 commits pushed para
  origin/main, e CI verde 2x (runs 25448067744 + 25448603601). MAS o dev
  server background que correu toda a sessão (`pnpm dev` job b2a084nl0)
  acumulou cache stale `.next/` durante as várias operações pós-fix do
  /visao. Eurico testou no browser /visao e /?code=... → Runtime Error:
  Cannot find module './364.js' + __webpack_modules__[moduleId] is not a
  function. CI continua verde porque builds limpos não têm o problema.
  Fix local: kill dev server, rm -rf .next/, pnpm dev (~30s).

