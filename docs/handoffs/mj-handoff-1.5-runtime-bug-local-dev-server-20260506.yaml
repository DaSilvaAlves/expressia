process_failure:
  what_orion_did_wrong: |
    1. Smoke test manual com Eurico foi feito ANTES do fix do /visao bug
       (decode JWT) e ANTES de várias operações posteriores (fix do test
        jwt-rls-isolation, push, story move, etc). Validei nessa altura
       que /visao mostrava UUID correctamente.
    2. NÃO refiz smoke test pós-todas-as-mudanças. Confiei que o dev server
       em background estava ok porque o CI passou + typecheck/test verdes.
    3. Apresentei "Story 1.5 Done" como vitória sem revalidar UI local.
    4. Quando Eurico tentou agora no browser, está partido.

  what_should_have_happened: |
    Antes de marcar Done e despachar push, deveria ter:
    1. Matado o dev server background (que correu desde início da sessão)
    2. rm -rf apps/web/.next/  (ou pelo menos apps/web/.next/cache)
    3. pnpm dev fresco
    4. curl/browser /entrar + /registar + /visao para confirmar render OK
    5. SÓ DEPOIS commitar + push + close

  lesson: |
    "Tests/CI verdes" != "produto funciona". Especialmente em Next.js dev
    mode com HMR que pode acumular state stale após muitas edições rápidas
    no mesmo ficheiro. Para fechar uma story que envolve UI: smoke final
    obrigatório com server fresco.

