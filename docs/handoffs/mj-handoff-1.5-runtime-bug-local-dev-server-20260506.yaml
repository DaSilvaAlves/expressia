# ───────────────────────────────────────────────────────────────────────────
# BUG RUNTIME LOCAL — REPRODUÇÃO E FIX
# ───────────────────────────────────────────────────────────────────────────
runtime_bug:
  affecta: Browser local (dev server). NÃO afecta produção. NÃO afecta CI.

  sintomas_observados_eurico_no_browser:
    rota_1:
      url: "http://localhost:3000/?code=36abfd0c-d2a7-4156-8c58-0e43c938020d"
      erro: "Runtime TypeError: __webpack_modules__[moduleId] is not a function"
      stack_size: 15 frames

    rota_2:
      url: "http://localhost:3000/visao"
      erro: "Runtime Error: Cannot find module './364.js'"
      require_stack:
        - "C:\\...\\apps\\web\\.next\\server\\webpack-runtime.js"
        - "C:\\...\\apps\\web\\.next\\server\\pages\\_document.js"
        - "C:\\...\\node_modules\\.pnpm\\next@15.5.15...\\dist\\server\\require.js"
        - "C:\\...\\node_modules\\.pnpm\\next@15.5.15...\\server\\load-components.js"
      call_stack: "<unknown> .next/server/app/(app)/visao/page.js (43:14832) + Object.<anonymous> (43:14878)"
      stack_size: 43 frames (41 ignore-listed)

  causa_raiz_provavel: |
    O dev server background correu toda a sessão (~2h) durante a qual fiz:
    1. Edit em apps/web/src/app/(app)/visao/page.tsx (fix decode JWT)
    2. pnpm --filter @meu-jarvis/web typecheck (em background, paralelo)
    3. pnpm test workspace (corre vitest, mexe em node_modules)
    4. pnpm build (gera build de produção em apps/web/.next/)
    5. Múltiplos git commits + git mv (move story file)
    6. Edit em rls-harness.ts (fix do test)
    7. Outro pnpm test workspace
    8. Mais commits + 2 pushes

    Algures aqui o HMR Webpack do dev server perdeu sincronia com o disco.
    O `webpack-runtime.js` ficou a referenciar chunk `364.js` que já
    não existe (foi renomeado num rebuild posterior).

    NOTA TÉCNICA: O `pnpm build` corre em `.next/` partilhado com o `pnpm dev`,
    o que provavelmente foi o gatilho — build de produção sobrescreveu o
    state que o dev server tinha em memória.

  fix_local_30_segundos:
    passos:
      - "1. Matar dev server background (Ctrl+C no terminal onde correu, ou:"
      - "   `Get-Process node | Stop-Process` no PowerShell se for único node)"
      - "2. cd C:\\Users\\XPS\\Documents\\meu-jarvis"
      - "3. Remove-Item -Recurse -Force apps\\web\\.next  (PowerShell)"
      - "   ou: rm -rf apps/web/.next  (WSL bash)"
      - "4. pnpm --filter @meu-jarvis/web dev"
      - "5. Aguardar 'Ready in Xs' (~10s primeira vez)"
      - "6. Browser: http://localhost:3000/visao"
      - "7. Confirmar render OK + Household ID UUID válido"

    porque_isto_resolve: |
      .next/ é gerado a partir do source. Apagá-lo força rebuild completo
      do zero — sem cache stale. É 100% seguro (não toca em código fonte).
      Equivalente local do que o CI faz em cada run.

  fix_alternativo_se_o_acima_nao_resolver:
    - "Verificar se há node_modules/.cache: rm -rf node_modules/.cache"
    - "Reinstalar deps: pnpm install --force"
    - "Última opção: rm -rf node_modules && pnpm install"

