# ───────────────────────────────────────────────────────────────────────────
# 🧪 HIPÓTESES A TESTAR (próxima sessão, ordem de probabilidade)
# ───────────────────────────────────────────────────────────────────────────
hipoteses:
  H1_valores_env_vars_com_aspas_ou_whitespace:
    probabilidade: HIGH
    descricao: |
      Eurico colou os valores no Vercel possivelmente:
        - com aspas literais ("https://...") porque o .env.local pode ter aspas
        - com whitespace trailing
        - com newline embebido
      Em runtime, process.env.NEXT_PUBLIC_SUPABASE_URL = '"https://..."' (com aspas)
      → createServerClient(URL_invalida, ANON_KEY, ...) → fetch falha → middleware crash
    como_validar: |
      No Vercel: Settings → Environment Variables → click ⋯ em NEXT_PUBLIC_SUPABASE_URL
      → Edit → ver início e fim do valor (Vercel revela em edit mode)
      Confirmar:
        - NÃO começa com aspas (")
        - NÃO termina com aspas (")
        - NÃO termina com espaço ou \n
        - Começa com "https://"
        - Termina com ".supabase.co" (sem trailing slash)
    como_corrigir: |
      Para cada env var com problema:
        1. ⋯ → Remove
        2. Add Environment Variable → Name + Value (sem aspas, sem whitespace)
        3. Marcar Production + Preview + Development
        4. Save
      Depois: trigger redeploy SEM cache.

  H2_turbo_json_falta_SUPABASE_SERVICE_ROLE_KEY:
    probabilidade: MEDIUM
    descricao: |
      turbo.json em "tasks.build.env" lista 5 vars mas falta SUPABASE_SERVICE_ROLE_KEY.
      Vercel avisou nos build logs. Por si só isto NÃO causa middleware crash
      (middleware só usa NEXT_PUBLIC_*) mas pode estar relacionado com bundling.
    como_validar: |
      Ler turbo.json — confirmar que "env" lista TODAS as 5 env vars
    como_corrigir: |
      Adicionar "SUPABASE_SERVICE_ROLE_KEY" ao array env em turbo.json.
      Esta correcção é trabalho de @dev (NÃO é coisa para Eurico fazer).
      Diff esperado:
        "env": [
          "NODE_ENV",
          "DATABASE_URL",
          "DATABASE_URL_DIRECT",
          "NEXT_PUBLIC_SUPABASE_URL",
          "NEXT_PUBLIC_SUPABASE_ANON_KEY",
       +  "SUPABASE_SERVICE_ROLE_KEY"
        ]
      Commit + push (via Gage). Vercel auto-redeploy.

  H3_supabase_ssr_edge_runtime_incompatibilidade:
    probabilidade: LOW
    descricao: |
      @supabase/ssr pode ter API que não funciona em Edge Runtime.
      apps/web/src/middleware.ts importa createServerClient directamente.
      Versão de @supabase/ssr instalada vs Next.js 15.5.15.
    como_validar: |
      Ler runtime logs do deploy (não build logs!) — devem mostrar stack trace
      exacto do crash. Acesso: deployment 6Fxp87Jot → tab "Logs" → filtrar Runtime.
    como_corrigir: |
      Se confirmado: forçar middleware a Node.js Runtime adicionando ao
      apps/web/src/middleware.ts:
        export const config = {
          runtime: 'nodejs',  // forçar Node, não Edge
          matcher: [...]
        }
      Mas isto introduz cold start latency — só usar se H1+H2 não resolverem.

  H4_supabase_ssr_versao_quebrada:
    probabilidade: LOW
    descricao: |
      Versão de @supabase/ssr no package.json pode ter incompatibilidade
      com @supabase/supabase-js ou Next.js 15.
    como_validar: |
      pnpm --filter @meu-jarvis/web ls @supabase/ssr @supabase/supabase-js
      cross-reference com release notes.

