# ───────────────────────────────────────────────────────────────────────────
# ⚠️ PONTOS DE ATENÇÃO CRÍTICOS (read before code)
# ───────────────────────────────────────────────────────────────────────────
pontos_de_atencao:
  - regra: 'Base64 OTLP_HEADERS imutável'
    detalhe: 'OTEL_EXPORTER_OTLP_HEADERS já tem Authorization=Basic%20<base64> formatado pela UI Grafana. SDKs OTel decodificam %20 (URL-encoded space) automaticamente. NÃO recalcular nem decodificar.'

  - regra: 'experimental.instrumentationHook obrigatório'
    detalhe: 'Sem experimental.instrumentationHook = true em next.config.ts, instrumentation.ts é IGNORADO em build serverless. Spans nunca chegam ao Grafana.'

  - regra: 'Sourcemap upload Sentry'
    detalhe: 'CI build precisa de env SENTRY_AUTH_TOKEN no job. Sem este, plugin Sentry emite warning (não bloqueante) mas stack traces ficam minificadas no Sentry — debug fica difícil.'

  - regra: 'Vercel free plan log limit'
    detalhe: '1024 MB log per function execution. Evitar logger.info verbose em hot paths produção — manter em logger.debug quando aplicável.'

  - regra: 'Sentry OTLP nativo NÃO usar (decisão arquitectural registada)'
    detalhe: 'Sentry expõe agora endpoint OTLP nativo (o4510848200278016.ingest.de.sentry.io/api/4510848213581904/integration/otlp). Permitiria emitir traces directos para Sentry. DECISÃO: NÃO usar — manter dual-emission (Sentry para errors via SDK, Grafana para tudo via @vercel/otel) conforme PRD original. Re-avaliar em Epic 2.'

  - regra: 'PII redaction em 3 camadas'
    detalhe: '(1) Pino redact paths em logger; (2) Sentry beforeSend hook scrub event.user.email + headers; (3) Sentry replayIntegration com maskAllText: true + blockAllMedia: true. Nunca logar prompt_text, email, NIF, IBAN, tokens.'

  - regra: 'data residency confirmado'
    detalhe: 'Sentry DSN tem .de. (Frankfurt EU). Grafana stack em eu-west-6 (Ireland). Region é IMUTÁVEL após criação — já validado pelo @devops 2026-05-07.'

