notas_implementacao:
  pacotes_recomendados:
    - '@vercel/otel (auto-instrumentação Next.js em Vercel — tratam serverless cold-start)'
    - '@sentry/nextjs (SDK oficial Next.js — inclui browser + node + edge runtime)'
    - '@opentelemetry/api (peer dep do @vercel/otel)'

  arquitectura_dual:
    sentry: 'Errors + issues + releases via SDK Next.js (lê SENTRY_DSN + SENTRY_AUTH_TOKEN para upload de sourcemaps no build)'
    grafana: 'Metrics + logs + traces via @vercel/otel (lê OTEL_EXPORTER_OTLP_ENDPOINT + OTEL_EXPORTER_OTLP_HEADERS automaticamente)'

  pontos_de_atencao:
    - 'OTEL_EXPORTER_OTLP_HEADERS já tem Base64 calculado pela UI Grafana — NÃO recalcular nem decodificar.'
    - 'O %20 entre "Basic" e o base64 é URL-encoded space — SDKs OTel decodificam automaticamente.'
    - 'No build do Next.js, Sentry SDK procura SENTRY_AUTH_TOKEN para upload de sourcemaps — adicionar a workflow GitHub Actions com `secrets.SENTRY_AUTH_TOKEN`.'
    - 'next.config.ts requer wrap com `withSentryConfig` (Sentry) e `experimental.instrumentationHook = true` (OTel).'
    - 'instrumentation.ts (Next.js convention) é o ponto de entrada para registar OTel — corre em runtime serverless.'
    - 'Vercel free plan tem limite de 1024 MB log per function execution — atenção a logs verbose em produção.'

  bonus_descoberto:
    sentry_otlp_native: 'Sentry expõe agora endpoint OTLP nativo (https://o4510848200278016.ingest.de.sentry.io/api/4510848213581904/integration/otlp). Permitiria emitir traces directos para Sentry em vez de Grafana — simplificaria stack mas perderia metrics/logs em Grafana. Decisão: manter dual-emission (Sentry para errors via SDK, Grafana para tudo via OTel) conforme PRD original. Re-avaliar em Epic 2 se houver duplicação.'

# ───────────────────────────────────────────────────────────────────────────
# 📊 LIÇÕES DESTA SESSÃO
# ───────────────────────────────────────────────────────────────────────────
licoes:
  - 'Sentry org region NÃO pode ser alterada após criação — verificar Settings → General → Data Storage Region antes de qualquer outro setup. Domínio {org}.sentry.io é igual em US e EU; só o DSN distingue (.de./.eu. vs .us.).'
  - 'Grafana Cloud stack region também imutável — escolher EU-Belgium / EU-Germany / EU-Ireland antes de Finish Setup. Free plan permite até 3 stacks por conta.'
  - 'OTEL_EXPORTER_OTLP_HEADERS vem da UI Grafana com prefixo "export ..=\"VALOR\"" (formato bash). Copiar APENAS o valor (depois do = e antes da aspa final) para o ficheiro .env. O fix automático com PowerShell regex funcionou bem.'
  - 'Vercel UI tem feature pouco visível mas excelente: "paste .env contents in Key input" — colar formato .env directamente no campo Key auto-detecta e expande para múltiplas vars. Muito mais rápido que adicionar uma a uma.'
  - 'gh secret set --env-file aceita ficheiro .env standard e cria 8 secrets num único comando. Funciona OK mesmo com valores que tenham = (como base64 padding ==) porque faz split apenas no PRIMEIRO =.'
  - 'Set-Clipboard em Windows PowerShell 5.1 NÃO aceita string vazia via -Value. Workaround: passar string inócua via pipe `"cleared" | Set-Clipboard` para sobrescrever conteúdo sensível.'
  - 'Vercel pode mostrar thumbnail stale com "403 Forbidden" mesmo quando deployment está acessível em runtime. Sempre validar com `curl.exe -I URL` antes de presumir problema real.'
  - 'PowerShell QuickEdit mode pode auto-copiar selecção de texto para clipboard inadvertidamente — pode sobrescrever Set-Clipboard recente sem o utilizador notar. Verificar com Get-Clipboard pós-cleanup é boa prática.'

