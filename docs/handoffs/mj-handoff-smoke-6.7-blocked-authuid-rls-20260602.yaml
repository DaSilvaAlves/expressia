summary: |
  SMOKE-6.7 (INVITE-E2E) executado com humano (aiox-master Orion + Eurico) →
  ❌ FALHA no caminho feliz. O smioke fez o seu trabalho e apanhou DOIS achados
  reais ("Done no papel ≠ funciona"):

    ACHADO-1 [HIGH, bloqueia Story 6.7] — `accept_invite()` NUNCA funciona via
    `getDb()`. A função SQL (migration 0020) depende de `auth.uid()`, mas a
    conexão runtime do `getDb()` (DATABASE_URL, pgbouncer 6543) liga como role
    `postgres` SEM injectar `request.jwt.claims` → `auth.uid()` = NULL →
    `raise AUTH_REQUIRED` → a UI mostra "Sessão inválida. Inicia sessão
    novamente." apesar de a sessão do browser ser VÁLIDA. Os testes db-test
    passaram porque lá o JWT/claims é simulado; o runtime real não o injecta.
    A accept_invite() é a 1ª função a depender de auth.uid() server-side — todas
    as rotas anteriores contornam passando household_id/user_id EXPLÍCITOS no SQL.

    ACHADO-2 [potencial HIGH/CRITICAL, NFR5 — A INVESTIGAR, não confirmado] — a
    mesma prova mostrou que a conexão de utilizador final liga como `postgres`
    (owner, ignora RLS) com `jwt_claims: NULL`. Ou seja, a RLS multi-tenant
    parece estar INERTE em runtime; o isolamento entre households dependeria
    inteiramente dos filtros `where household_id = …` explícitos em cada rota.
    Isto CONTRADIZ o pilar do CLAUDE.md/NFR5 ("cross-household bloqueado pelo
    Postgres, não pela app"). NÃO confirmado como falha aberta — precisa de
    @architect/@data-engineer (ver next_action).

  Tudo o resto do fluxo 6.7 funciona E2E: criar convite (POST /invites 201 + link
  copiável + listagem pendente sem expor token), página de aceitação (auth gate +
  redirect /entrar?next=), mapeamento de erros PT-PT. Só a chamada final à função
  é que rebenta. Migration 0020 CONFIRMADA em prod (função existe, SECURITY
  DEFINER, search_path=public, GRANT EXECUTE a authenticated — verify-0020.ts PASS).

