cross_confirms_critical_results:
  - id: "D48 — QUOTA_BY_PLAN cross-confirm"
    file_verified: "apps/web/src/lib/agent/rate-limiter.ts:40-45"
    expected_per_spec: "{free:50, pessoal:1500, familia:3000, pro:10000}"
    actual_in_codebase: "{free:100, pessoal:500, familia:2000, pro:10000}"
    verdict: "CONFIRMED BUG"
    impact: >
      Família 2000 vs spec 3000 = subdimensionado -33%. Pessoal 500 vs spec 1500 = -67%.
      Free 100 vs spec 50 = superdimensionado +100% (mas como hard-stop está broken
      por D50, isto não causa danos em prod ainda). Pre-existing bug Story 2.6 push.
    story_fix: "AC7 + D48 — corrige valores"
    severity: "MEDIUM (alinhamento spec NFR20; sem incidente reportado em prod)"

  - id: "D49 — Hard-stop 110% cross-confirm"
    file_verified: "apps/web/src/lib/agent/rate-limiter.ts:149"
    expected_per_spec: "Math.floor(limit * 1.1) — 110% threshold"
    actual_in_codebase: "if (used >= limit) — 100% threshold sem buffer"
    verdict: "CONFIRMED BUG"
    impact: >
      Hard-stop a 100% (não 110% como spec Architecture §4.6 linha 455).
      Família real = 3000 actual, deveria ser 3300 (3000 * 1.1).
      Pre-existing bug Story 2.6 push.
    story_fix: "AC8 + D49 — corrige condição"
    severity: "MEDIUM (alinhamento spec; sem incidente reportado em prod)"

  - id: "D50 — RLS critical fix cross-confirm"
    files_verified:
      - "apps/web/src/lib/agent/audit-log.ts:182-197 — incrementQuota recebe db: Database param"
      - "apps/web/src/app/api/agent/prompt/route.ts:33+59 — caller importa getDb + incrementQuota"
      - "packages/db/migrations/0001_rls_policies.sql:353-362 — RLS policies bloqueiam authenticated"
    expected_per_spec: "incrementQuota deve usar getServiceDb() — service_role ignora RLS"
    actual_in_codebase: >
      incrementQuota é chamado com getDb() (authenticated role) em todos os call sites de route.ts.
      RLS policies em agent_quotas:
        - agent_quotas_insert_blocked: with check (false) — INSERT bloqueado para authenticated
        - agent_quotas_update_blocked: using (false) with check (false) — UPDATE bloqueado
        - Comentário linha 362: "Apenas service_role gere counters (atomicidade + race conditions)."
    verdict: "CONFIRMED CRITICAL BUG LATENTE"
    impact: >
      Em PRODUÇÃO Supabase com RLS enforced, incrementQuota FALHA SILENCIOSAMENTE em
      TODOS os prompts (try/catch + Pino warn — não bloqueia response). Significa que
      `agent_quotas.prompts_used` está perpetuamente em 0 desde push Story 2.6
      (~2 semanas). Consequentemente checkQuota (que lê prompts_used) NUNCA bloqueia.
      Hard-stop NFR20 está NÃO-FUNCIONAL em prod. Em CI/dev local sem RLS enforced ou
      com Supabase local sem RLS, isto passa despercebido nos testes existentes.
    severity: "CRITICAL (mas com mitigação contextual — tráfego MVP baixo + free tier de facto sem limite)"
    story_fix: "AC9 + D50 — incrementQuota muda para getServiceDb() análogo markRunReverted Story 2.8 DN3"
    timing_recommendation: >
      Eurico (timing decision): Push 2.9 com prioridade alta pós-architect APPROVED.
      NÃO criar hotfix separado — Story 2.9 é a janela natural (push duplicado seria
      churn sem benefício; quota tracking broken há 2 semanas sem incidente).

  - id: "D53 — Cache key householdPlan cross-confirm"
    file_verified: "docs/architecture.md §4.6 linha 433"
    expected_per_spec: "sha256(normalize(prompt) + household_plan)"
    spawn_prompt_alleged: "sha256(prompt + household_id) — HALLUCINATION"
    actual_in_codebase: "NA — cache.ts não existe ainda; este é design choice da Story 2.9"
    verdict: "CONFIRMED — Architecture §4.6 explicit household_plan"
    impact: >
      Design correcto: cache per-plan tier (não per-household) maximiza hit rate.
      Sem comprometer PII porque ClassificationResult contém apenas intents detectadas
      (não dados pessoais).
    story_fix: "AC2 + D53 — cache key = sha256(normalize(prompt) + householdPlan)"

