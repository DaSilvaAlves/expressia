dev_decisions_for_architect_ratification:
  D55:
    title: "incrementQuota signature change — drop db param"
    rationale: >
      Refactor de `incrementQuota(householdId, db: Database)` para
      `incrementQuota(householdId)`. Função usa `getServiceDb()` internamente.
      Razão: o caller pre-2.9 passava getDb() (authenticated) — o próprio bug
      D50. Manter a signature seria pedir ao caller para sempre passar service
      db (caller pode esquecer → regressão futura). Análogo a markRunReverted
      Story 2.8 DN3 que também é auto-suficiente. Trade-off: 2 call sites
      tocados em vez de 1, mas elimina permanentemente regressão D50.
    trace: "Story 2.9 D50, Story 2.8 DN3 markRunReverted pattern"
    ask: "Confirmar pattern para todas as operações de escrita em tabelas service_role_only"

  D56:
    title: "Cost router fallback graceful para executor"
    rationale: >
      Se `executeDirectQuery` lançar erro (DB connection, malformed query), o
      handler em `route.ts` degrada para o path Planner+Executor normal ao
      invés de retornar 500. Pino warn log + execução continua. Razão: cost
      router é optimização de custo, não funcionalidade essencial. Padrão
      consistente com cache lookup falha (também não-fatal).
    trade_off: "Em casos onde executor ALSO falha, utilizador vê erro Planner/Executor em vez do erro original — mas isso é o mesmo erro baseline (regressão para path sem cost router). Custo é executor LLM call (não ideal mas aceitável)."
    rejected_alternative: "Fail-fast 500 imediato preservaria fail-fast mas seria mais frágil em prod"
    trace: "Architecture §4.6 'consulta directa DB' é optimização secundária"
    ask: "Confirmar que fallback graceful é preferível a fail-fast 500"

  D57:
    title: "selectTemplate keyword fix — 'transac' → 'transa' (PT-PT 'ç')"
    rationale: >
      Durante T7 testes detectei que keyword 'transac' falha matching contra
      'transações' porque 'transac' (length 7) ≠ 'transa' + 'ç' (U+00E7).
      JavaScript substring matching não faz ASCII-fold. Fix: keyword
      'transa' (6 chars — cobre todas as variantes PT-PT/PT-BR) + adicionei
      'financ' (cobre 'financeiro').
    trace: "cost-router.ts:selectTemplate linhas 89-99 post-fix. Tests cost-router.test.ts:64-67."
    ask: "Informativo — fix interno sem impacto contractual"

