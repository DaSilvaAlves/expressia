    "Um bug de payload de cada vez revelado" foi o padrão (401 → schema → metadata).
    Causa raiz: validação E2E real em produção é o ÚNICO ponto onde estes bugs
    aparecem — testes Vitest mockam o response OpenAI, portanto não detectam
    payloads bugados. Para evitar futuras cascatas similares: considerar adicionar
    contract tests reais (ex: Story 2.10 LLM Benchmark) que correm payloads contra
