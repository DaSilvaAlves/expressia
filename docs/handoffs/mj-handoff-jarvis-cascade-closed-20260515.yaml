  - "Logar SEMPRE `err.message` ou `error_code` estruturado em handlers de erro Pino — `err.constructor.name` em produção é minificado e inútil. `ProviderError.message` vem já redacted ([REDACTED]) — seguro para log."
  - "Quando um payload externo (OpenAI, Anthropic, etc.) é revelado bugado, REVISAR O PAYLOAD COMPLETO contra a spec actual da API (não só o campo erro). Esta cascata teve 3 bugs sequenciais porque cada fix expunha o seguinte — uma revisão upfront teria poupado 2 ciclos."
  - "Diagnóstico de erro em produção deve ser possível APENAS por logs Vercel sem queries manuais ao DB. Se exigir query manual a `agent_runs.error_message`, é sinal de bug de observabilidade (foi o caso desta cascata — agora resolvido)."

