# -----------------------------------------------------------------------------
# SUMMARY
# -----------------------------------------------------------------------------
summary: |
  Cascata de hotfix do /jarvis em produção foi encerrada com sucesso ao longo
  de duas sessões (2026-05-14 + 2026-05-15). Três bugs sequenciais — cada um
  revelado pela resolução do anterior — todos no caminho `POST /api/agent/prompt`
  → `classifier.callLlmOnce` → OpenAI Chat Completions:

    1. `401 unauthorized` — `OPENAI_API_KEY`/`ANTHROPIC_API_KEY` não configuradas
       no Vercel (env vars do projecto faltavam).
       → RESOLVIDO por @devops (configuração de secrets em fra1).

    2. `400 Invalid schema ... type: None` — `zodToJsonSchema` estava a enviar
       um JSON Schema malformado à OpenAI (campo `name` na raiz, sem o wrapper
       `type: object` que a API exige).
       → RESOLVIDO por @dev (remoção da opção `name` no call site).

    3. `400 The 'metadata' parameter is only allowed when 'store' is enabled` —
       payload incluía `metadata: { prompt_version }` sem `store: true`.
       → RESOLVIDO por @dev removendo o campo `metadata`. NÃO foi adicionado
       `store: true` (violaria NFR12 PII + data residency UE — armazenamento
       de 30 dias de prompts crus na OpenAI).

  Bug colateral de observabilidade resolvido no mesmo commit do bug #3:
  `handleClassifierError` + `handlePlannerExecutorError` em `route.ts` agora
  logam `error_code` + `err.message` em vez de `err.constructor.name` minificado
  (`"p"` em produção). Diagnosticar o bug #3 exigiu query manual a
  `agent_runs.error_message` porque o log estruturado Pino era inútil.

  Validação E2E em produção (`https://expressia-black.vercel.app/jarvis`,
  2026-05-15 ~02:15 WET, key OpenAI real) confirmou pipeline operável:
    - Prompt: "podes anotar uma reúnião para amanha" → `criar_tarefa (93%)`
    - Prompt: "15h no dentista em vila real" → `criar_tarefa (90%)`
    - Preview-then-confirm UI carrega com countdown TTL 5min
    - Após "ok"/confirmar: "Feito ✓ Pedido confirmado" + `run_id` exibido
    - Botão `Anular (Ns)` aparece com countdown 30s (reverse_op persistido)
    - Conversação multi-turno mantém estado sem reset
    - Robustez a typos PT-PT confirmada ("reúnião" classificado correctamente)

  ESTE É O PRIMEIRO E2E REAL do pipeline em produção desde Story 2.7 — sai do
  modo mockable-only para a parte OpenAI (classifier). Anthropic side (planner+
  executor) ainda depende de EB1 (DPA UE) — Story 2.10 — antes de poder ser
  validado real. Mas para todos os efeitos do classifier (intent detection),
  o sistema agora corre em produção contra OpenAI live.

