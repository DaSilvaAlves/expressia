# ───────────────────────────────────────────────────────────────────────────
# 10 DECISÕES ARQUITECTURAIS PARA REVIEW @architect
# ───────────────────────────────────────────────────────────────────────────
architect_focus_points:
  - id: D1
    title: "LLM_MODEL_VALUES hardcoded em vez de import directo de @meu-jarvis/db"
    rationale: >
      `packages/db/src/schema/index.ts` usa `@/schema/...` paths internos que
      o tsc do agent package não consegue resolver cross-package (limitação
      de TypeScript paths não-propagam-cross-project). Solução: hardcode os
      3 valores (`gpt-4o-mini`, `claude-sonnet-4-5`, `claude-opus-4-7`) em
      `contracts.ts` com comentário forte apontando para
      `packages/db/src/schema/agent.ts:57-61` (source-of-truth) + sanity test
      em `contracts.test.ts` que valida exactamente 3 entries + nomes
      esperados. `@meu-jarvis/db` removido das deps do agent. Outros packages
      do monorepo (web, auth, db-test) também não importam directamente de
      `@meu-jarvis/db` por esta limitação — pattern consistente.
    article_iv_compliance: >
      Article IV (No Invention) preservado por documentação + sanity test
      em vez de import directo. Divergência seria detectada por Story 2.10
      (benchmark) ao fazer call real ao DB.
    alternatives_considered:
      - "Refactor `packages/db/src/schema/index.ts` para usar imports relativos: rejeitado — out of scope desta story, afecta outros consumers"
      - "Configurar `paths` no agent tsconfig para apontar para db: rejeitado — TS paths são per-project, não cross-project"
    risk: low

  - id: D2
    title: "`override` modifier em `NetworkError.cause`"
    rationale: >
      TS strict (`noImplicitOverride: true` em tsconfig.base.json) detecta
      que `Error` standard agora tem `cause` (ES2022). Sem o modifier o
      build falhava com TS4114. Adicionado `public override readonly cause`.
    risk: low

  - id: D3
    title: "Interfaces customizadas `AnthropicClientLike` / `OpenAIClientLike`"
    rationale: >
      Em vez de `Pick<Anthropic, 'messages'>`. Razão: `Pick` falhava
      typecheck nos tests (`Parameters<typeof AnthropicProvider>` chain
      produzia `never`). Interface customizada explícita desacopla de
      breaking changes nos SDKs e simplifica mocks em tests.
    trade_off: "Mais verbosa mas estável vs versões SDK"

  - id: D4
    title: "`sanitizeHint` regex composto"
    rationale: >
      Original `[A-Za-z0-9_-]{10,}` apanhava tokens/keys/IDs longos (>= 10
      chars) mas missava NIFs portugueses (9 dígitos). Adicionado segundo
      regex `\d{9,}` para capturar especificamente sequências numéricas
      ≥ 9 dígitos (NIF PT, CPF BR, identificadores numéricos longos).
      Importante para PT-PT context.
    test_coverage: "errors.test.ts 'serialização não vaza prompt content em message' valida com NIF 123456789 mock"

  - id: D5
    title: "Circuit breaker com cooldown progressivo (30s → 60s)"
    rationale: >
      AC6 prescreve 30s cooldown inicial. Adicionei `halfOpenFailCooldownMs:
      60_000` para reabertura após half_open fail — proteção contra
      thundering herd em outages prolongados (defensive engineering padrão).
      Documentado no comment de `openCircuit`. Story 2.9 (distributed CB
      via Upstash) substituirá esta implementação per-process.
    test_coverage: "circuit-breaker.test.ts 'half_open fail → open com cooldown maior' valida"

  - id: D6
    title: "Cost calculation devolve `costUsd` + `costEur` (interface CostBreakdown)"
    rationale: >
      AC pedia só `costEur` mas expor o intermediário ajuda Story 2.9 (cost
      router) a auditar conversão FX sem ter que recomputar. Não-bloqueante,
      pode ser revertido se @architect prefere API mais minimal.

  - id: D7
    title: "Anthropic prompt cache: `cache_control` aplicado ao último tool"
    rationale: >
      Anthropic semantics: cache marker no último elemento do array `tools`
      propaga cache para todo o array (system + tool defs). Implementação
      em `buildToolsParam` linhas 167-180 de `anthropic.ts`.
    test_coverage: "anthropic.test.ts 'aplica cache_control: ephemeral ao system prompt'"

  - id: D8
    title: "OpenAI tool_calls com arguments mal-formados → `input: {}` (sem throw)"
    rationale: >
      Permite que o caller (Story 2.5 Planner+Executor) detecte tool call
      inválida via lookup de schema sem ter que `try/catch` cada parse.
      Mais robusto. Trade-off: caller perde o detalhe de WHY o JSON foi
      mal-formado — aceitável porque o LLM regenerar o tool call é melhor
      que falhar a chain inteira.
    test_coverage: "openai.test.ts 'arguments mal-formados → input vazio (sem throw)'"

  - id: D9
    title: "Factory `getProvider` cache não considera flag `AGENT_FALLBACK_OPENAI_ENABLED`"
    rationale: >
      Se a flag mudar em runtime, o cache fica stale. Trade-off aceitável
      para MVP (env não muda durante lifetime do process). Story 2.9 vai
      introduzir `RouteDecision` que substitui o factory com lógica mais
      sofisticada (Upstash-backed).

  - id: D10
    title: "`agent.fallback_used` span attribute sempre `false` no MVP"
    rationale: >
      O attribute existe na whitelist `PROVIDER_SPAN_ATTRIBUTE_KEYS` e é
      aplicado em `annotateProviderMetrics`, mas tracking real do fallback
      ficaria para Story 2.9 onde existirá routing centralizado. Para MVP,
      o factory simplesmente retorna a instância correcta — quem chamar
      sabe (ou não) se é fallback. Não há observable distinction nesta story.

