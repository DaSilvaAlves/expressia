  @dev Dex implementou a Story 4.10 — Tools do cérebro Finanças — em modo YOLO
  conforme handoff `mj-handoff-4.10-po-go-to-dev-20260523.yaml` (po→dev).

  **12/12 tasks completas + 5/5 quality gates locais GREEN + zero regressão.**

  Implementação:
    - 6 helpers puros em `packages/tools/src/finance/_helpers/` (61 testes)
    - 5 tools concretas em `packages/tools/src/finance/` (106 testes unitários)
    - Side-effect register no barrel + `export * from './finance'` no parent index
    - Bump classifier v1→v2 (11 intents canónicos, 10 few-shots incluindo 5 Finance)
    - Bump planner v1→v2 (Exemplo 1 corrigido criar_tarefa PT, Exemplo 3 simplificado
      para 1 tool call create_installment, 5 few-shots Finance novos)
    - Integration test `finance-flow.test.ts` (16 cenários E2E mockable)
    - T11 BÓNUS: Whitelist do /undo route corrigida — `card_accounts`/`card_transactions`
      (tabelas inexistentes) substituídos por `cards`; +tratamento `_noop` no-op
      silencioso (necessário para AC9 cenário consultar_dados undo). Não estava
      explícito no scope mas descoberto durante T11 e indispensável.

  Composite reverse_op aninhado D-4.10.4 implementado e testado:
    - N=12 → top-level [sub[10 tx], sub[2 tx], delete installments]
    - N=60 → top-level 7 ops (6 sub-composites de 10 tx + 1 delete installments)
    - Ordem CRÍTICA verificada empiricamente: FIFO no /undo route → transactions
      PRIMEIRO, installment delete POR ÚLTIMO (preserva CHECK constraint
      `transactions_installment_index_coherent` durante undo).

  D-4.10.5 (reuse helpers 4.6/4.9) — boundary cross-package proíbe import directo
  de `apps/web/src/lib/finance/` em `packages/tools/`. Solução: cópia controlada
  das 4 queries SQL inline em `query-finance-summary.ts` com nota de manutenção
  explícita. Invariante calculatório com a UI preservado.

