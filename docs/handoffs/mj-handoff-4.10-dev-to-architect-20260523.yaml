  No próximo terminal (ou aqui mesmo se @architect activar-se nesta sessão):

    @architect *qa-gate 4.10

  Pattern de gate por precedente directo (4.6/4.7/4.8/4.9): 7-point gate +
  verificação independente das decisões + cross-confirm anti-hallucination.

  Pontos de atenção sugeridos pelo @dev (Dex) para o @architect (Aria):

  1. **Composite reverse_op aninhado D-4.10.4** — verificar a ordem do payload
     em `create-installment.ts:reverse()`. Sub-composites de transactions
     PRIMEIRO, `delete_row installments` POR ÚLTIMO (FIFO no /undo). Comentário
     JSDoc do método documenta a expectativa exacta. Testes `create-installment.test.ts`
     incluem assertion explícita: `op.ops[op.ops.length - 1]?.table === 'installments'`.

  2. **Cálculo de prestações R-4.1** — invariante `(N-1)*per + last === total`
     testada em 9 cenários patológicos em `installment-split.test.ts` (€1.000/3,
     €100/7, €1.200/12, €333/3, €1/1, N=60 com totalAmountCents grande).
     Helper puro `computeInstallmentSplit` isolado em `_helpers/`.

  3. **/undo whitelist** (T11 bónus) — `apps/web/src/app/api/agent/prompt/[runId]/undo/route.ts`
     modificada: removidos `card_accounts`/`card_transactions` (tabelas inexistentes
     no schema real), adicionado `cards`, adicionado tratamento `_noop` no-op.
     Confirmar que o gate aceita este "scope creep necessário" — ou registar
     como SEP-handoff se preferir story separada. Eu prefiro mantê-lo em 4.10
     porque AC9 cenário "consultar_dados undo → 410 Gone" exige `_noop` handling
     e AC9 "create_card undo → row eliminada" exige `cards` na whitelist.
     11/11 testes de `undo.test.ts` continuam GREEN (zero regressão).

  4. **PII whitelist D-4.10.6** — verificada implicitamente via tracing.ts
     existente (`TOOL_SPAN_ATTRIBUTE_KEYS`). Nenhuma tool de Finanças adiciona
     amount_cents/description/last4/account_id/card_id a span attributes.

  5. **Snapshot tests dos prompts v2** — actualizados (não eram hash-fixed antes,
     o test de hash era `KNOWN_HASH = hash` dinâmico). Adicionei assertions
     anti-drift mais fortes: 11 intents por nome + 5 Finance tools por nome +
     `create_card_transaction`/`create_installment_plan` NÃO devem aparecer (drift
     da v1 eliminado).

  Cobertura de testes (todos GREEN):
    - tools package: 264 → 264 + 167 = ~431 testes (61 helpers + 106 tools + 264 baseline)
    - classifier: 80/80 (sem regressão; +1 teste novo para 11 intents header)
