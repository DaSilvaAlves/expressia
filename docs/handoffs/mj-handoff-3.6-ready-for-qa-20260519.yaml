  dev_decisions:
    D-3.6.1:
      title: "json_agg LEFT JOIN final design (DP-3.6.6 A confirmed)"
      decision: "json_agg(json_build_object(...) ORDER BY tags.name) FILTER (WHERE tags.id IS NOT NULL) + GROUP BY tasks.id + cols prefixadas tasks."
      rationale: "FILTER neutraliza [null] edge case; prefixo tasks. desambiguidade do JOIN; GROUP BY tasks.id aproveita PG 16 functional dependency"
    D-3.6.2:
      title: "Eliminar tag via window.confirm() simples"
      decision: "window.confirm() PT-PT em vez de modal nested hand-roll"
      rationale: "KISS — scope S; modal nested seria over-engineering para confirm simples"
    D-3.6.3:
      title: "TagPicker useRef flag vs fetchState-bailout"
      decision: "hasFetchedRef boolean em vez de checar fetchState dentro de useEffect"
      rationale: "React.StrictMode dev-mode duplica useEffect — bailout via fetchState='loading' cancelaria o primeiro fetch (cancelled=true), bloqueando state update. useRef flag é mais robusto."
    D-3.6.4:
      title: "GET /api/tasks/[id] single-task GET não estendido com tags"
      decision: "Manter route handler sem JOIN tags"
      rationale: "Não usado pela UI Story 3.6 — EditTaskModal recebe task.tags via prop drilling do parent (lista/Kanban/calendario já têm o JOIN)"

