summary: >
  Story 3.6 v1.4 Ready for Review — @dev Dex YOLO complete. Phase 4 SDC implementação
  completa. 16 NEW files (TagBadge + TagPicker + TagsManager + TagsManagerButton +
  TagFilterSelect + tag-utils + 5 test files) + 15 MODIFIED files (listTasksHelper T6.0
  extension + raw queries calendar + 3 vistas integradas + EditTaskModal + ViewTabs cross-tab
  propagation + tests fixtures actualizadas).

  Todos os 9 tasks DONE + 46/46 subtask checkboxes marked. 6 G-notes Aria aplicadas:
  G1.2 GROUP BY PG16 functional dependency, G1.3 Zod tags default [], G2.1 boolean parse
  estrito ('true' literal compare), G2.2 explicit current_household_id() no subquery COUNT,
  G3.1 click-outside mousedown hand-roll. G1.1 EXPLAIN ANALYZE adiado para QA gate runtime
  (query usa indexes existentes task_tags_pkey + task_tags_tag_idx).

  **5/5 Quality Gates GREEN:**
  - pnpm lint (max-warnings=0) — GREEN
  - pnpm typecheck — GREEN
  - pnpm test — 464 tests passing (+30 vs baseline 434, 150% over T8 target ~20)
  - pnpm build — GREEN (Next.js 15 — /tarefas 10.8 kB, /tarefas/calendario 15.1 kB, /tarefas/kanban 7.26 kB)
  - pnpm check:rls — exit 0 (120 policies preservadas, zero novas tabelas)

  4 [DEV-DECISION] documentadas na File List:
  - D-3.6.1: json_agg LEFT JOIN com FILTER neutralizing edge + cols prefixadas tasks. — DP-3.6.6 A confirmed
  - D-3.6.2: window.confirm() para eliminação tag (não modal nested — KISS scope S)
  - D-3.6.3: useRef flag em vez de fetchState-bailout para evitar React.StrictMode race
  - D-3.6.4: GET /api/tasks/[id] single GET não estendido com tags (não usado pela UI)

