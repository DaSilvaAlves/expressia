what_changed:
  item_1_classifier_bug_fix:
    file: "packages/classifier/src/classifier.ts"
    change: >
      Removida a opção `name` do `zodToJsonSchema` (linha ~290) — produzia
      `{ $ref, definitions }` sem `type` no topo, rejeitado pela OpenAI com 400.
      Além disso `strict: true` → `strict: false` em response_format.json_schema
      [DEV-DECISION] — o strict mode da OpenAI rejeita keywords que o
      ClassificationSchema gera (`const`, `minItems`/`maxItems`, `minimum`/
      `maximum`); com `strict: false` o schema é guidance e a validação rigorosa
      fica no `ClassificationSchema.safeParse` + retry 1× já existentes.
    test: "packages/classifier/src/__tests__/classifier.test.ts — teste `strict` actualizado + teste de regressão NOVO que assert o shape inline do schema (fecha o gap que o mock mascarava)."
  item_2_jarvis_error_ux:
    spec: "docs/ux/jarvis-error-ux-spec.md"
    files_new:
      - "apps/web/src/app/(app)/jarvis/_components/error-messages.ts — errorMessageFor() mapeia os 12 códigos de erro do route.ts → mensagens PT-PT amigáveis"
      - "apps/web/src/app/(app)/jarvis/_components/__tests__/error-messages.test.ts — 27 tests"
    files_modified:
      - "apps/web/src/app/(app)/jarvis/_components/jarvis-chat.tsx — usa errorMessageFor; o error.message técnico do servidor NUNCA é renderizado; 5xx → captureException (@sentry/nextjs); ramo 429 unificado no !res.ok (RATE_LIMIT_EXCEEDED vs QUOTA_EXCEEDED distinguidos por code — corrige o bug do fallback '60 segundos' no QUOTA)"
      - "apps/web/src/app/(app)/jarvis/_components/__tests__/jarvis-chat.test.tsx — mock @sentry/nextjs + testes novos QUOTA_EXCEEDED e CLASSIFIER_ERROR (cenário real do bug observado)"

dev_decision_for_ratification:
  D1_strict_false:
    title: "response_format.json_schema.strict: true → false no classifier"
    rationale: >
      Não havia key OpenAI real disponível no ambiente @dev para testar o
      strict mode. Análise estática confirmou que o ClassificationSchema gera
      keywords não suportadas pelo strict mode (`const`, `minItems`/`maxItems`,
      `minimum`/`maximum`). `strict: false` elimina o risco de outro 400; a
      validação rigorosa do output já é garantida por
      `ClassificationSchema.safeParse` (classifier.ts:338) + retry 1×.
    rejected_alternative: "`zodResponseFormat` de openai/helpers/zod — violaria Story 2.4 D9 (OpenAIClientLike é abstracção estrutural sem acoplamento ao SDK)."
    ask: "Informativo. Pode ser ratificado por @architect num gate futuro se desejado — não bloqueia o push."

