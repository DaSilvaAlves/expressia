root_cause_confirmed: |
  Hipótese vencedora: **H2 (Supabase Auth email confirmation activo + SMTP
  default rate-limited)**, com agravante crítico de UX que mascarava o
  problema.

  Trajetória probatória (sessão anterior produziu 7 evidências em sequência):
    1. `diag-auth-signup.ts` — signUp directo via anon key devolveu
       OK mas user SEM sessão (data.user existe, data.session = null) →
       primeiro sinal de email confirmation ON.
    2. `diag-auth-domains.ts` — testou .test/example.com/expressia.pt/gmail.com.
       Provou que erros `email_address_invalid` em domínios RFC reserved
       eram um falso positivo isolado: gmail.com e expressia.pt funcionam.
    3. `diag-auth-config.ts` — `select email_confirmed_at from auth.users` —
       todos os utilizadores criados via UI tinham `email_confirmed_at: NULL`,
       evidenciando que o Confirm email estava ON e que os emails de
       confirmação nunca chegavam (SMTP default rate-limited).
    4. `error-messages.ts` + 12 testes — helper criado para expor codes
       GoTrue accionáveis (`email_not_confirmed`, `over_email_send_rate_limit`,
       `email_address_invalid`, `weak_password`, `email_exists`) que estavam
       a ser mascarados pelo fallback genérico "Não foi possível concluir o
       registo. Tenta novamente." (escondendo o root cause durante dias).
    5. `dev-create-user.ts` — helper admin que cria user com
       `email_confirm: true`, bypassa confirmação para smoke local.
    6. `diag-auth-proof.ts` — **prova canónica**: criar via admin API +
       signInWithPassword via anon + verificar trigger 0003 +
       cleanup. PASSOU integralmente → trigger 0003 está perfeito, RLS
       sã, JWT custom claim household_id presente. ÚNICO bloqueio era
       o flag Dashboard.
    7. `diag-auth-e2e.ts` — replicou exactamente o caminho do Server
       Action via `@supabase/ssr/createServerClient` + cookieJar →
       PASSOU. Confirma que o Server Action funcionará logo que o
       utilizador exista confirmado.

  Conclusão integrada: a UX mascarava H2. O fix é DOIS níveis:
    - **Production code:** helper de mensagens expõe codes específicos
      em vez do fallback genérico → utilizador SABE o que correu mal.
    - **Runbook + dev helper:** documenta como recuperar (Dashboard toggle
      ou admin API via `dev-create-user.ts`).

  H1 (trigger ausente) **REFUTADA** — trigger 0003 funciona perfeitamente
  (provado em `diag-auth-proof.ts`).
  H3 (.env.local desconfigurado) **REFUTADA** — URLs + keys corretos
  (provado por signUp via anon devolver OK com user criado em auth.users).
  H4 (RLS bloqueia insert) **REFUTADA** — trigger 0003 é SECURITY DEFINER,
  bypassa RLS no insert inicial; cleanup do diag-proof confirmou todas as
  4 tabelas (households, household_members, subscriptions, audit_log)
  populadas correctamente.

