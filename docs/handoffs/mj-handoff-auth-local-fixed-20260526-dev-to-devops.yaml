production_fix_summary: |
  **actions.ts:**
    - `signInAction`: erro genérico → `mapSignInError(error)` (expõe
      `email_not_confirmed` accionável; restantes códigos colapsam em
      "Email ou palavra-passe incorrectos" anti-enumeration).
    - `signUpAction`: detecta `data.user && !data.session` (signal de
      Confirm email ON) → devolve `{ info: 'Conta criada. Verifica o
      teu email...' }` em vez de redireccionar silenciosamente para
      `/visao` (que o middleware bloquearia).
    - Type `AuthFormState` ganha campo opcional `info` distinto de `error`
      para a UI distinguir tom positivo vs negativo.

  **registar/page.tsx:**
    - Renderiza bloco `<p role="status">` com `state.info` em verde
      (`bg-emerald-50 / dark:bg-emerald-950`) quando presente —
      distinto visualmente do bloco vermelho `state.error`.

  **error-messages.ts (novo helper isolado):**
    - 6 códigos GoTrue mapeados para PT-PT accionável:
      `email_address_invalid`, `email_exists`, `weak_password`,
      `over_email_send_rate_limit`, `over_request_rate_limit`,
      `signup_disabled`, `email_provider_disabled`, `user_banned`.
    - Fallbacks anti-enumeration mantidos para signIn.
    - 12 testes (PASS isolado 4ms) cobrem mapping, fallback e
      defensive handling de null/undefined/non-object.

  **dev-create-user.ts:**
    - Helper CLI dev-only: `pnpm --filter @meu-jarvis/db exec tsx
      src/scripts/dev-create-user.ts --email=x --password=y` cria user
      via admin API com `email_confirm: true`, trigger 0003 dispara
      automaticamente, devolve credenciais prontas.

  **runbook supabase-auth-setup.md:**
    - Secção "Signup mostra mensagem genérica e login falha (TASK-1)"
      documenta sintomas + root cause + fix Dashboard + fix alternativo
      via dev-create-user.ts.
    - Secção "Prevenção" documenta o helper `error-messages.ts` e o
      branch `if (data.user && !data.session)` em `signUpAction`,
      indicando para revisitar quando Resend integrar.

