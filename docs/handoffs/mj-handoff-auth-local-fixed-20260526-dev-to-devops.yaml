deletion_justification: |
  Os 5 scripts diag-auth-* eram exploração ad-hoc cuja missão (provar root
  cause) estava concluída. Mantê-los acrescentava ruído sem valor reutilizável:
    - Nenhum era idempotente nem cobria caminho de teste real do CI.
    - `diag-auth-proof.ts` era cara (admin createUser + cleanup) — má
      escolha para integration test.
    - `diag-auth-e2e.ts` causava typecheck FAIL: importa `@supabase/ssr`
      mas essa dep só está declarada em `apps/web/package.json`, não em
      `packages/db/package.json`. Mover a dep seria piorar a hierarquia.
  Insights relevantes ficam preservados em:
    - `docs/runbooks/supabase-auth-setup.md` (secção troubleshooting +
       prevenção updated nesta sessão)
    - `apps/web/src/app/(auth)/_lib/error-messages.ts` (codes mapeados
       que apareceram durante diagnóstico)
  `dev-create-user.ts` SOBREVIVE — é reutilizável e documentado no runbook
  como ferramenta operacional para futuros smoke quando Confirm email ON.

