# ───────────────────────────────────────────────────────────────────────────
# DECISÕES ARQUITECTURAIS PARA REVIEW
# ───────────────────────────────────────────────────────────────────────────
architectural_decisions:
  - id: D1
    title: "Trigger semantics — bloquear roles aplicacionais, não só service_role"
    decision: >
      A função `prevent_update_terminal_agent_runs()` bloqueia UPDATE quando
      `current_user IN ('authenticated', 'anon')`. Tudo o resto (service_role,
      postgres superuser, supabase_auth_admin) é PERMITIDO.
    initial_design: "Bloquear todos excepto current_user = 'service_role'."
    why_changed: >
      O migration runner (`apply-migrations.ts`) conecta como `postgres` superuser.
      Bloquear postgres partia migrations + DBA ops manuais (correcção de dados,
      retention). A semântica correcta é "o utilizador final via JWT não pode
      mutar audit log post-terminal", não "apenas Inngest pode".
    tradeoffs:
      - "PRO: migrations + DBA ops + Inngest purge funcionam sem rituais"
      - "PRO: alinhado com Supabase pattern (service_role tem bypassrls + grants)"
      - "CON: superfície de bypass é mais larga — qualquer role privilegiado pode mutar (mas todos esses são interno-server, não JWT)"
    request_to_architect: >
      Validar: é aceitável que `postgres` superuser bypasse o trigger? Em produção
      Supabase, a única via para o caller chegar a `postgres` é DBA manual
      (não há JWT que mapeie para postgres). Logo invariante mantém-se.

  - id: D2
    title: "Trigger vs column-level RLS"
    decision: "Trigger BEFORE UPDATE FOR EACH ROW WHEN (OLD.status terminal)."
    rationale: >
      Postgres não suporta column-level RLS nativo. Para enforçar "agent_run com
      status terminal não pode ser mutado" de forma declarativa e semântica
      (não apenas via expressão WHERE em USING/WITH CHECK), trigger é a única
      opção. RLS layer 1 (`agent_runs_update_self`) continua aplicada.
      Defense-in-depth.

  - id: D3
    title: "DEFAULT expires_at = now() + interval '30 seconds' como safety net"
    decision: "Não substitui o caller — é redundância."
    rationale: >
      O pipeline executor (Story 2.5+) deve continuar a passar `expires_at`
      explicitamente para clareza de intenção. O DEFAULT só protege contra
      omissão acidental futura (ex: refactor do pipeline). Documentado no
      comment da column.

  - id: D4
    title: "Bootstrap test harness — grants service_role"
    decision: >
      Adicionados `grant select/insert/update/delete on tables` + `grant usage
      on schema/sequences` + `grant execute on functions` para `service_role`
      no bootstrap dos Testcontainers.
    rationale: >
      Em produção (Supabase) esses grants vêm por default. No test harness
      apenas `bypassrls` estava configurado. Sem os grants, o teste
      "service_role bypassa trigger" falhava com `permission denied for table
      agent_runs` — não pelo trigger, mas pelo grants ausentes. Fix em L4
      (test-only) para espelhar produção.

  - id: D5
    title: "Não tocar policy `agent_runs_update_self` existente"
    decision: "Policy mantém-se; trigger é layer adicional."
    rationale: >
      RLS layer 1 (policy) bloqueia cross-tenant + user_id mismatch. Trigger
      layer 2 bloqueia mutação post-terminal. Não há sobreposição — ambos
      enforcam invariantes diferentes.

