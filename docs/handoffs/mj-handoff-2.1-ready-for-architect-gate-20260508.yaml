architect_review_focus:
  - title: "Validação D1 — bypass list do trigger"
    detail: >
      Verificar racional de bloquear apenas authenticated+anon. Considerar:
      em produção Supabase, postgres superuser é alcançável apenas por DBA
      manual (sem path JWT → postgres). Logo invariante NFR9 mantém-se.
      Aria pode requerer comment SQL adicional explicando esta escolha.

  - title: "Validação D4 — test harness divergir de produção"
    detail: >
      Bootstrap em packages/db-test (test-only) foi expandido com grants
      explícitos para service_role. Em produção, esses grants são default
      Supabase. Verificar que a expansão do test harness reflecte produção
      (não introduz divergência).

  - title: "Cobertura de testes para o caso 'service_role' real"
    detail: >
      Os tests usam `admin().begin(set local role service_role)` para simular
      bypass. Aria pode requerer adição de teste que valide o comportamento
      end-to-end com uma connection real `service_role` (não set local). Por
      ora consideramos suficiente porque o postgres-js client respeita SET
      LOCAL ROLE no nível da transacção.

  - title: "Article IV (No Invention) — verificar trace completa"
    detail: >
      Migration trace: PRD FR6, NFR9; architecture §4.1 (audit imutável), §4.5
      (undo TTL). Story trace: ACs 3, 6, 8, 10. Verificar que nenhum elemento
      novo foi inventado fora destes traces.

  - title: "Defense-in-depth ainda intacto"
    detail: >
      RLS layer 1 (policies de 0001) bloqueia cross-tenant.
      Trigger layer 2 (0005) bloqueia mutação post-terminal.
      Aria deve confirmar que ambos camadas são necessárias e que remover
      qualquer uma quebra a invariante.

