  po_fix_inline_applied_v1_1:
    - id: PO_FIX_INLINE_1
      where: "AC3 + AC7 + AC8 + Dev Notes 'Endpoint contract' snippet"
      issue: |
        Story v1.0 reclamava response shape `status: 'success'|'pending_preview'`
        + `applied_operations` + `confirm_expires_at` (response key). Real shape
        Story 2.6 (verified em `apps/web/src/app/api/agent/prompt/route.ts:293-300+400-407`)
        usa `mode: 'preview'|'executed'` + `results` (`AtomicOutcome`) + `expires_at`
        (response key). Coluna DB chama-se `confirm_expires_at` mas o response key
        é `expires_at`.
      fix: |
        Substituído `status` por `mode`, `applied_operations` por `results`,
        `confirm_expires_at` (response key) por `expires_at`. Coluna DB
        `agent_runs.confirm_expires_at` permanece inalterada.
      dev_action: |
        Ao implementar T4 (refactor /api/agent/prompt) e T6-T9 (UI components),
        usar SEMPRE o shape real verificado em `route.ts:293-300+400-407`.
    - id: PO_FIX_INLINE_2
      where: "AC2 + T1 + Dev Notes Schema canónico"
      issue: |
        Story v1.0 colocava 4 RLS policies dentro de `0007_user_prefs.sql`.
        `scripts/check-rls-coverage.ts:33` lê APENAS `0001_rls_policies.sql`
        como fonte de verdade — policies em 0007 não seriam detectadas pelo
        gate NFR5.
      fix: |
        Split: 0007 cria apenas TABLE + INDEX. As 4 RLS policies vão para
        `0001_rls_policies.sql` via DO block `do $rls_user_prefs$ … end$rls_user_prefs$;`
        condicional (`if exists (select 1 from pg_tables where tablename = 'user_prefs')`).
        Pattern espelha Story 2.6 D17 em :692-708 (agent_rate_limit_counters).
      dev_action: |
        T1 actualizada com sub-task explícita para modificar AMBOS ficheiros.
        File List actualizada (+`0001_rls_policies.sql` modificado).
        Snippet completo no Dev Notes "Schema canónico user_prefs".
    - id: PO_FIX_INLINE_3
      where: "AC2 RLS predicate"
      issue: |
        Story v1.0 propunha `auth.uid() = user_id AND household_id = current_household_id()`.
        Precedent Story 2.6 D17 usa apenas `public.is_household_member(household_id)`.
        Para user_prefs (user-scoped), é defensável combinar ambos para evitar que
        owner do household consiga ler prefs cognitivas de outros membros.
      fix: |
        Predicate canónico final: `public.is_household_member(household_id) AND auth.uid() = user_id`.
      dev_action: |
        Aplicar EXACTAMENTE este predicate nas 4 policies (SELECT/INSERT/UPDATE/DELETE).
        @architect ratifica divergência vs precedent puro no gate (concern (b)).
    - id: PO_FIX_INLINE_4
      where: "AC6 + T5"
      issue: |
        Story v1.0 dizia "Auth gate herdado do middleware existente do route group `(app)/`".
        REAL: `apps/web/src/middleware.ts:24` tem `const APP_PATH_PREFIX = '/visao'` LITERAL,
        com check `:57` `request.nextUrl.pathname.startsWith(APP_PATH_PREFIX)`.
        Route groups Next.js `(app)/` são VIRTUAIS — não mapeiam para auth gate.
        Sem fix, novas rotas `/jarvis` + `/conta/preferencias` ficavam publicamente
        acessíveis (regression NFR8 / Story 1.5 AC2).
      fix: |
        Refactor middleware: `APP_PATH_PREFIX = '/visao'` →
        `APP_PATH_PREFIXES = ['/visao', '/jarvis', '/conta']` array.
        Check `:57`: `APP_PATH_PREFIXES.some(p => request.nextUrl.pathname.startsWith(p))`.
        Test unitário em `apps/web/src/__tests__/middleware.test.ts` (criar se não existir):
        `/jarvis` sem session → redirect `/entrar?next=/jarvis`.
      dev_action: |
        T5 actualizada com sub-task explícita.
        File List actualizada (+`apps/web/src/middleware.ts` modificado).
        @architect verifica no gate (concern (c)) que existing `/visao` continua a funcionar.

