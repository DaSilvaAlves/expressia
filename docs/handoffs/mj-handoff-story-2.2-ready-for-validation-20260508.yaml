# ───────────────────────────────────────────────────────────────────────────
# CONTEXT — DECISÕES TOMADAS PELO @sm (Orion delegando)
# ───────────────────────────────────────────────────────────────────────────
sm_decisions_log:
  - id: SD1
    decision: "12 ACs (vs ~6-8 típicos) com granularidade fina"
    rationale: >
      Story arquitectural — cada AC mapeia para uma componente discreta
      (package skeleton, contracts, 2 providers, retry, CB, errors, tracing,
      redaction, tests, compliance, gates). Granularidade evita ambiguidade
      no @dev e permite quality gate @architect mais cirúrgico (D1-D9 áreas
      bem delimitadas). Comparação Story 2.1: 10 ACs para scope auditoria
      + 1 migration; 2.2 tem 2 adaptadores + retry + CB + errors + ... =
      mais peças ⇒ mais ACs.

  - id: SD2
    decision: "Estimate M (não L) apesar de 12 Tasks"
    rationale: >
      Cada Task individual é small-medium. Não há decisão arquitectural
      pesada (já tomada na ED6 do EPIC-2-EXECUTION: provider abstraction
      flag-gated). Reuse extensivo de `@meu-jarvis/observability` evita
      re-build de tracing/logging. Pattern bem conhecido (provider adapter
      é livro de receitas). Validação cruzada com EPIC plan (estimate M
      lá listado) — alinhamento mantido.

  - id: SD3
    decision: "Prompt caching activo no AnthropicProvider (não diferido)"
    rationale: >
      Architecture §4.3 prescreve cache_control: ephemeral no system prompt
      + tool defs. Implementar agora evita rework em 2.5 (Planner+Executor
      pede cache hit rate ≥60% NFR20). AC3 inclui detecção `cacheHit`
      via `usage.cache_read_input_tokens > 0`. Cost router (Story 2.9)
      controla activação por path; este adaptador apenas implementa o
      mecanismo.

  - id: SD4
    decision: "Circuit breaker per-process in-memory (não distribuído)"
    rationale: >
      EPIC-2-EXECUTION ED6 + plan §6 R2: Story 2.9 entrega cluster-aware
      via Upstash. Esta story entrega in-memory para validar contract +
      semantics. Documentar no AC6 com comment `// TODO Story 2.9:
      distributed via Upstash`. Não é "tech debt" — é faseamento explícito.

  - id: SD5
    decision: "OpenAI cacheControl é silenciosamente ignorado (NÃO throw)"
    rationale: >
      AC4 — OpenAI não tem equivalente directo a Anthropic prompt caching
      no MVP scope. Throw seria barulho desnecessário; silenciar com log
      debug `cache_unsupported: true` permite call site (Story 2.5) usar
      o mesmo input shape com qualquer provider. Provider abstraction
      objectivo: hot-swap sem mudar call sites.

  - id: SD6
    decision: "AC11 cria `packages/agent/COMPLIANCE.md` (~30 linhas)"
    rationale: >
      Architecture §12.2 marca Anthropic+OpenAI como "Excepção documentada"
      mas não há doc concreto que materialize a excepção. Esta story cria
      um doc curto in-package que serve de anchor para SOC-2 / ISO-27001
      audits futuros e linka para `docs/compliance/llm-data-residency.md`
      (a criar em sprint Fase 2 quando EB1/EB2 estiverem provisionados).
      Decisão proportional ao MVP: doc curto agora vs full compliance pack
      adiado.

