po_focus_points:
  - title: "Article IV — naming reality preservada"
    detail: >
      Validar que a story usa SEMPRE os nomes reais do schema agent
      (carry-over de Story 2.1):
        - `intent_classifications` (NÃO `agent_intents`)
        - `agent_runs.tool_calls` JSONB (NÃO tabela `agent_tool_calls`)
        - `agent_runs.intents_detected` JSONB
        - enums: `agent_run_status`, `agent_intent`, `llm_model`
      Cross-check com `packages/db/src/schema/agent.ts` (linhas 36-44 enum
      run_status, 46-55 enum intent, 57-61 enum llm_model) e Story 2.1
      `Dev Notes / Article IV` notes.

  - title: "Scope guard — NÃO inclui pipeline lógica"
    detail: >
      Confirmar que a story explicitamente NÃO entrega:
        - Classifier logic (Story 2.4)
        - Planner+Executor (Story 2.5)
        - Tool registry contract definitivo (Story 2.3)
        - Endpoint /api/agent/prompt (Story 2.6)
        - Tools concretas (Stories 2.3, 3.x, 4.x)
        - Real E2E API calls (Story 2.10 benchmark)
      Lista "O que NÃO fazer" presente em Dev Notes. Validar que Tasks +
      ACs respeitam o boundary.

  - title: "Reuse `@meu-jarvis/observability` — não duplicar"
    detail: >
      AC8/AC9 obrigam a reutilizar exports da Story 1.7. Validar que NENHUMA
      Task tenta criar novo logger Pino, novo tracer OTel, ou redefinir
      `PII_REDACT_PATHS`. Cross-check com `packages/observability/src/index.ts`
      exports list (linhas 12-22 do ficheiro).

  - title: "EB1 visibility no header da story"
    detail: >
      Header da story tem secção dedicada "BLOQUEADORES EXTERNOS" com
      tabela explícita: EB1 + EB2 + estado + impacto + workaround para
      drafting/validação NÃO bloqueados. Pattern alinhado com Story 1.7
      v1.0 que tinha B3+B4 listados claramente.

  - title: "Test mock pattern Vitest"
    detail: >
      AC10 + Dev Notes "Padrão de mock Vitest para SDK Anthropic" exibe
      pattern `vi.mock('@anthropic-ai/sdk', () => ...)`. Validar que pattern
      é factível (não é só aspiracional) — pode ser confirmado lendo o
      pattern actual usado em `packages/db-test/src/tests/*.test.ts` ou
      `packages/observability/src/__tests__/*.test.ts`. Se @po não conseguir
      confirmar pattern aplicável, flagar para @architect (não bloquear GO).

  - title: "Anti-hallucination — todos pacotes/SDKs verificáveis"
    detail: >
      Story menciona:
        - `@anthropic-ai/sdk` latest — pacote npm real
        - `openai` latest — pacote npm real
        - `zod` ^3.23 — já em monorepo (`apps/web/package.json`)
        - `@meu-jarvis/db` workspace — existe
        - `@meu-jarvis/observability` workspace — existe (Story 1.7)
        - `@vercel/otel` — já em `@meu-jarvis/observability`
      Confirmar nenhuma invenção. Modelos Claude Sonnet 4.5 e GPT-4o-mini
      são real (architecture §4.2 + §4.3 referencias).

  - title: "Estimate vs scope reality check"
    detail: >
      12 Tasks parecem muitas para "M" mas são pequenas. Validar com regra
      "Task individual ≤ 1 file create + ≤ 100 LOC OR Task individual ≤
      cobertura de teste de 1 área". Se @po julgar que estimate deveria
      ser L, flagar como minor — não bloquear GO.

