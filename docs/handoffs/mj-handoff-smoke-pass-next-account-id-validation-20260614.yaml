  causa_raiz_diagnosticada: |
    PORQUÊ existiram tx cross-tenant (as 3 que o B2 apagou): a RLS de `transactions`
    valida o `household_id` DA PRÓPRIA ROW (WITH CHECK = ctx.householdId), mas NÃO
    valida que o `account_id`/`card_id` referenciado pertence ao MESMO household. O FK
    `transactions.account_id → accounts.id` aceita qualquer conta existente, mesmo de
    outro agregado.

    - Caminho SEGURO (default): quando o input NÃO traz conta nem cartão,
      `resolveDefaultAccount` (packages/tools/src/finance/_helpers/resolve-default-account.ts)
      faz SELECT RLS-scoped → a conta é garantidamente do household. Sem risco.
    - Caminho VULNERÁVEL: quando o input TRAZ `accountId` (ou `cardId`) explícito, o
      valor entra direto no INSERT sem qualquer verificação de pertença.
      Ver `create-finance-variable.ts:142-188` (accountId = input.accountId; insere
      `${accountId}::uuid` sem validar household). O CHECK `transactions_account_or_card`
      só garante "conta OU cartão preenchido", NÃO o household.

  ficheiros_afetados:
    - "packages/tools/src/finance/create-finance-variable.ts (linhas 142-188 — INSERT do accountId/cardId explícito sem validação de household)"
    - "packages/tools/src/finance/create-finance-recurrence.ts (mesmo padrão — aceita account_id/card_id explícitos)"
    - "packages/tools/src/finance/create-installment.ts (idem)"
    - "packages/tools/src/finance/create-card.ts (aceita account_id explícito — cartão↔conta)"
    - "Schema/CHECK: packages/db/src/schema/finance.ts + packages/db/migrations/0000_initial_schema.sql (constraint transactions_account_or_card — só valida presença, não household)"

  decisao_de_abordagem_pendente: |
    DUAS opções (o próximo agente deve decidir, idealmente via @data-engineer Fase 0):
      A) APP-LEVEL (mais rápido): nos callers, quando accountId/cardId é explícito,
         fazer um SELECT RLS-scoped (ctx.db) que confirma a conta/cartão existe no
         household ANTES do INSERT; senão ToolExecutionError PT-PT accionável.
         Defesa em profundidade alinhada com SEC-1 (1.ª rede app-enforced).
      B) DB-LEVEL (mais robusto, recomendado): trigger/constraint que garante
         `account.household_id = transaction.household_id` (e o mesmo p/ card). Fecha
         o buraco para SEMPRE, independente do caller. ATENÇÃO: pode exigir migration
         nova → respeitar NFR5 RLS Coverage Gate + correr db-test (Testcontainers,
         ver memória ci_rls_gate_uses_db_test) antes de push.
    Recomendação Orion: B com fallback A se a migration se revelar arriscada. Provar
    com teste db-test que um INSERT com account_id de outro household é REJEITADO.

  blockers:
