  dev_decisions_for_architect_ratification:
    decision_1_rls_choice:
      ac_ref: "AC5/DN5 / PO_FIX_INLINE 1"
      choice: "getServiceDb() (defensivamente)"
      reasoning: |
        Escolha defensiva — `undo/route.ts` já tem `serviceDb` em scope (linhas
        165-183 fazem UPDATE agent_runs + UPDATE agent_reverse_ops via
        service_role). Reutilizar minimiza acoplamento e elimina chamada extra
        a `getDb()` no caminho de pós-success. Comportamento idêntico per
        PO_FIX 1 — ambos atingem o mesmo INSERT (policy `audit_log_insert_member`
        permite a authenticated members; service_role bypassa toda RLS).
        Documentado em `[DEV-DECISION]` comment inline no código.
      ratification_required: true
      concern_ref: "po_concerns_for_architect_gate Concern 2"

    decision_2_test_3_substitution:
      ac_ref: "AC12 (iii) / PO_FIX_INLINE 3"
      choice: "SUBSTITUIR test 3 placeholder Story 2.7 (queryByRole === null) — 13 testes totais"
      reasoning: |
        Substituição é mais limpa: teste antigo asserts POSITIVAMENTE que botão
        Anular existe com `title="Em breve"`. Com D40 implementado, asserção
        quebra. Substituir elimina contradição. Paralelo (14 testes) introduziria
        2 assertions opostas (`getByRole` + `queryByRole === null`) confuso
        para futuro reader. AC12 acolhe ambas as opções — substituição é
        recomendada per PO_FIX 3 fix.
      ratification_required: false # já documentado em AC12 (acolhido)
      ratification_optional: true

    decision_3_begin_tx_deferred:
      ac_ref: "DN7 / DN9 BEGIN tx scope deferred"
      choice: "NÃO implementar BEGIN/COMMIT explicit + ordem reversa — preservar Story 2.6 pattern"
      reasoning: |
        Story 2.6 gate APPROVED 9.4/10 cobriu este flow com 9 tests passando —
        sem regression observada. Pattern: postgres-js auto-commit é suficiente
        para sequência de UPDATEs idempotentes desde que cada op aplique apenas
        DELETE/UPDATE de row específica via PK; ordem reversa só importa se ops
        referenciam-se mutuamente — restore_row + delete_row simples não têm
        essa dependência (whitelist `ALLOWED_REVERSE_TABLES` garante isto).
        Se @architect concern emergir: criar follow-up story dedicado (não
        inflacionar 2.8).
      ratification_required: true
      concern_ref: "po_concerns_for_architect_gate Concern 1"

  debug_incidents_resolved:
    incident_1_sentry_nextjs_resolution:
      severity: "transient build issue"
      resolved: true
      summary: |
        Após `pnpm add inngest@^3` ao workspace, o primeiro `pnpm test` web
        falhou com `Cannot find module './config/withSentryConfig.js'` em
        @sentry/nextjs. Cause: pnpm hoisting rearrumou node_modules
        temporariamente. Fix: `pnpm install` root re-linkou os deps —
        testes passaram imediatamente. Lesson para futuros agents: após
        `pnpm add` num workspace, correr `pnpm install` root antes de tests.

    incident_2_db_test_docker_env:
      severity: "environment-only, pre-existing"
      resolved: false (env-blocker, não bloqueia Story 2.8)
      summary: |
        `pnpm --filter @meu-jarvis/db-test test` falha com `Could not find a
        working container runtime strategy` durante sessão @dev. Docker daemon
        Windows offline (Docker Desktop process not running). Baseline session
        start (antes de qualquer edição Story 2.8) reportou db-test 103 passed
        — Docker estava up. ~30min depois Docker stopped. Issue 100%
        environmental, zero código tocado em Story 1.4 RLS harness por 2.8.
        Recomendação: re-run `pnpm test` em CI (provisiona Postgres 16 service
        per `ci-setup.md`) para confirmar — `rls-gate` job cobre cenário.

