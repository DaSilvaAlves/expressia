        em Dev Agent Record (precedente: 2.4 acumulou D9-D12 do @dev sobre
        os D1-D8 do @sm/@po). @architect gate avaliará todas em conjunto.

    - point: "Skip CodeRabbit pre-commit (D14)"
      details: |
        Decisão final fica para @dev no fim. Precedente 2.2/2.3/2.4 todos
        skipparam (architect gate é canónico para decisões arquitecturais).
        Se @dev decidir RUN CodeRabbit, documentar razão em Dev Agent Record.
        Se SKIP, documentar [AUTO-DECISION D14] confirmation em Dev Agent
        Record com referência ao precedente 2.4 D12.

    - point: "Quality gates 5/5 obrigatórios (Task 12)"
