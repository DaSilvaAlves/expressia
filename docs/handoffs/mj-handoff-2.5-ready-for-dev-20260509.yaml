dev_focus_points:

  critical:
    - point: "Task 2 — Verificar/aplicar D9-anthropic equivalent (re-export AnthropicClientLike)"
      details: |
        Story AC3 + Task 2 dedicada. Pre-flight check (~2min):
        - Ler `packages/agent/src/index.ts` — ver se exporta `AnthropicClientLike`
        - Se ausente: adicionar 1 linha
          `export type { AnthropicClientLike } from './providers/anthropic';`
        - Padrão idêntico ao D9 da Story 2.4 (OpenAIClientLike re-export by
          @dev, zero-risk type expose validado por @architect APPROVED 9.4/10).
        - Verificar `pnpm --filter @meu-jarvis/agent typecheck` + `test`
          continuam exit 0 inalterados.
        - Documentar em Dev Agent Record como "D9-anthropic equivalente".
        - Se já está exportada: AC3 é no-op, marcar Task 2 done com nota.

    - point: "Reutilização agressiva de packages predecessores (anti-duplicação)"
      details: |
        Esta story é coesão: thin wrappers sobre infraestrutura já entregue:
        - **Planner** consome `getProvider({preferredProvider:'anthropic'})`,
          `ProviderInterface.complete()`, `CLAUDE_SONNET_DEFAULT` da 2.2.
          NÃO recriar SDK Anthropic wrapper.
        - **Executor** consome `executeAtomic`, `toolRegistry`,
          `ToolExecutionContext`, `AtomicResult/AtomicFailure` da 2.3.
          NÃO recriar transaction wrapper.
        - **Errors**: 5 PlannerError novas + 1 ExecutorValidationError.
          Executor DELEGA `ToolError` da 2.3 (D13). NÃO criar hierarquia
          paralela tipo ExecutorExecutionError (seria duplicação).
        - **PII redaction**: `sanitizeHint` reutiliza re-export da 2.2
          (D10 da Story 2.4).
        Se sentir tentação de reescrever lógica de transacção, retry,
        circuit breaker, RLS, error mapping — STOP. Já existe nas
        predecessoras Done.

    - point: "cache_control: 'ephemeral' default (D11) — implementação correcta"
      details: |
        Architecture §4.3 explícito: cache no system + tool definitions JSON.
        Em ProviderCompleteInput a passar a `provider.complete()`:
        - `cacheControl: 'ephemeral'` (default desta story; override `null`
          apenas em testes específicos para verificar `cacheHit: false`).
        - System prompt no INÍCIO do messages array (prefix-based caching).
        - Tools array é serializado pelo AnthropicProvider (Story 2.2 AC3) —
          o cache_control é aplicado pelo provider conforme contrato 2.2.
        Verificar test `planner.test.ts` cenário "payload tem cache_control:
        ephemeral em system block" — confirma payload OK ANTES do mock LLM.

    - point: "TOOL_TO_INTENT_MAP cobertura 8 intents (D6)"
      details: |
        Schema MAP estático em schemas.ts. Test contract.test.ts garante
        que MAP cobre os 8 valores do IntentSchema (importado de
        @meu-jarvis/classifier — Story 2.4):
        criar_tarefa, criar_financa_variavel, criar_financa_recorrente,
        criar_cartao, criar_parcelada, consultar_dados, cancelar_ultima,
        unknown.
        Tools mock no fixture mock-tool-registry.ts (3 tools determinísticas)
        devem ter nomes que estejam no MAP (ex: mockCreateTaskTool com
        name='create_task'). Fallback 'unknown' para tools fora do MAP é
        tratado em Planner step 6.

  secondary:
    - point: "Mock Drizzle tx (mock-db-tx.ts)"
      details: |
        Reutilizar/inspirar do padrão da Story 2.3 (`packages/tools/src/__tests__/atomic.test.ts`).
        Não importar mock real do package tools — recriar minimal nesta
        story para isolamento. O mock tx deve expor `transaction(fn)`,
        `insert`, `select`, `rollback` mockados.

    - point: "Mock AnthropicClientLike — formato resposta SDK"
      details: |
        Resposta Anthropic tem estrutura:
          content: [
            { type: 'tool_use', id: 'toolu_xxx', name: 'create_task', input: {...} },
            { type: 'text', text: 'Vou criar 1 tarefa...' }  // planReasoning
          ]
          usage: {
            input_tokens: 500,
            output_tokens: 50,
            cache_read_input_tokens: 450  // > 0 = cache hit
          }
          stop_reason: 'tool_use' | 'end_turn'
        O AnthropicProvider (Story 2.2 AC3) já mapeia para
        ProviderCompleteOutput { toolCalls[], cacheHit, ... } — o mock deve
        produzir resposta SDK que o provider possa mapear correctamente.

    - point: "Test count target ≥45 (47 mapeados — over-coverage aceitável)"
      details: |
        Distribuição mapeada (story AC13):
        - schemas.test.ts: 5
        - planner.test.ts: 14
        - executor.test.ts: 12
        - errors.test.ts: 7
        - tracing.test.ts: 5
        - prompts.test.ts: 2
        - contract.test.ts: 2
        Se entregares mais (precedente: 2.2 entregou 102, 2.4 entregou 78),
        over-coverage é aceitável e sinal de robustez. Architect aprecia.

    - point: "[AUTO-DECISION] markers a manter ou substituir"
      details: |
        Os 9 [AUTO-DECISIONS] @sm (D5/D5b/D6/D8/D9-anthropic/D11/D13/D14/D15)
        já estão validados por @po. Se durante implementação encontrares
