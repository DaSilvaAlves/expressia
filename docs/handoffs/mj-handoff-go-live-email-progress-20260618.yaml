      subject: "Repor a tua palavra-passe na Expressia"
      body: |
        <h2>Repor a tua palavra-passe</h2>
        <p>Ola! Recebemos um pedido para repor a palavra-passe da tua conta Expressia.</p>
        <p><a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=recovery">Definir nova palavra-passe</a></p>
        <p>Se nao foste tu, ignora este email — a tua palavra-passe continua igual.</p>
      nota_critica_ampersand: >
        Usa &token_hash (com &, NAO ?) e type=recovery. Razao: resetPasswordAction
        (apps/web/src/app/(auth)/actions.ts) define redirectTo = {origin}/callback?next=%2Frecuperar%2Fnova-palavra-passe
        — ou seja {{ .RedirectTo }} JA contem uma query string (?next=...), logo o
        token_hash tem de ser anexado com & (senao ficavam dois ? na URL e partia).
        No confirm-sign-up e ?token_hash porque emailRedirectTo = {origin}/callback (sem query).
      porque_funciona: >
        callback/route.ts: resolveNext() tem /recuperar/nova-palavra-passe na ALLOWED_NEXT_PATHS;
        type 'recovery' esta em EMAIL_OTP_TYPES; com token_hash presente faz
        verifyOtp({type:'recovery', token_hash}) → cria sessao de recovery → redirect para next →
        pagina nova-palavra-passe chama updateUser({password}).

