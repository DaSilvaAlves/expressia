top_issues:
  - id: 'TEST-001'
    severity: low
    finding: 'O Cenário E do teste (linhas 123-142) não importa nem exercita o ramo gracioso real do script CLI — replica a guarda (if (!accessToken) exitCode=0) num bloco inline dentro do próprio teste. É um teste parcialmente tautológico: prova a forma da guarda e que fetch não é chamado, mas não cobre o código de produção do script (scripts/audit-supabase-allowlist.ts:72-79). Justificado por design (D-SEC11.2: o script tem side-effects no import, não é importável limpo em jsdom). O núcleo de segurança — a lógica de DETECÇÃO — está genuinamente testado. Não bloqueante.'
    suggested_action: 'Opcional (nice-to-have): extrair a guarda de credenciais para uma função pura evaluateCredentials(token, ref) no módulo puro (à semelhança de evaluateAuthConfigResponse), e testá-la directamente. Fecharia a última lacuna entre teste e código de produção do CLI. Não bloqueia PASS.'

