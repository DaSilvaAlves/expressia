security_notes: |
  Story de segurança avaliada com profundidade (Risk-Based Testing, Quinn Guardian).
  Foco adversarial obrigatório (lição do ciclo PO): a v1.0 era NO-GO porque o
  auditor daria SEMPRE verde (endpoint /auth/v1/settings + anon key → uri_allow_list
  undefined → exit 0 permanente). A v1.2-DEV fecha o defeito:
    1. Fonte correcta: Supabase Management API (/v1/projects/{ref}/config/auth) com
       Bearer PAT — expõe genuinamente uri_allow_list (CSV).
    2. Detecção provada por 16 casos adversariais: o regex /\*\.vercel\.app/i apanha
       o wildcard em qualquer posição do CSV, com espaços e em qualquer caixa.
    3. hasTotalWildcard cobre https://**, ** solto e *://, sem classificar
       expressia.pt/** (path curinga legítimo) como risco.
    4. Parsing CSV correcto: split(',') + trim + filter(Boolean) — espaços não
       permitem evasão (provado adversarialmente).
  Modo gracioso não mascara risco: ausência de PAT → exit 0 (operacional, CI sem
  credencial); MAS 401 (token inválido) e qualquer status não-2xx → exit 1 com
  diagnóstico PT-PT (script:107-121, evaluateAuthConfigResponse:161-176). Erro de
  rede / JSON inválido também → exit 1. Um auditor de segurança que não falha quando
  devia seria o defeito mais perigoso — aqui está demonstrado que falha correctamente.

