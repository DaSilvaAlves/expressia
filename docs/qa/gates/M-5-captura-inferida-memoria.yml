nfr_validation:
  security:
    status: PASS
    notes: >-
      R5 (nunca captura sem consentimento) é o eixo de segurança desta story e está
      fechado em CÓDIGO, não no prompt: ALWAYS_CONFIRM_INTENTS força needs_confirmation
      independentemente da confiança e de user_prefs.always_preview (default false). O
      gate de preview (run-agent.ts L598) é um OR — needs_confirmation:true entra sempre
      no ramo de preview; needs_confirmation só é LIDO a jusante (L548/598/783), nunca
      reatribuído. Tenancy: sugerir_memoria.execute() usa EXCLUSIVAMENTE ctx.db (role
      authenticated, RLS 2ª rede); household_id/created_by_user_id derivados de ctx,
      NUNCA do input. source='inferred' é literal fixo no SQL (input sem campo source —
      LLM não pode declarar proveniência). check:rls EXIT 0, jarvis_memories coberta.
      SEC-8 HOLD respeitado (withHousehold/db-shim/client.ts intactos). Billing intocado.
      PII: content nunca em spans/logs (só memoryId em agent_reverse_ops).
  performance:
    status: PASS
    notes: >-
      Zero query nova de histórico (single-turn — content vem da mensagem actual, não de
      mineração de tasks/transactions). memoryContext (M-2) reutilizado sem alteração —
      prompt caching preservado (sem novo prefixo). estimatedTokens=50 (= memorizar).
      Ausência de toolCall (Planner não propõe) → drafts.length===0 → fallback ao label
      genérico, sem novo kind tipo forget_zero_match (mecanismo genérico existente).
  reliability:
    status: PASS
    notes: >-
      Undo 30s REAL — reverse_op delete_row (INSERT desfeito por DELETE), jarvis_memories
      já em ALLOWED_REVERSE_TABLES (undo/route.ts L399, desde M-4 — sem alteração). Binding
      preview==memória guardada: sugerir_memoria em PREVIEW_RENDER_INTENTS (texto exacto)
      + REUSE_PERSISTED_PLAN_INTENTS (confirm reutiliza plano persistido, sem re-extracção
      às cegas). NÃO em EXTERNAL_WRITE_INTENTS nem IRREVERSIBLE_WRITE_TOOLS (undo é honesto).
      Migration 0036 idempotente (ADD VALUE IF NOT EXISTS, sem uso na mesma tx). db-test
      210 GREEN (0036 aplica em Postgres real via Testcontainers).
  maintainability:
