top_issues:
  - id: 'SEC-001'
    severity: low
    finding: 'getRequestOrigin() não normaliza trailing slash em SITE_URL. Se um operador configurar SITE_URL="https://expressia.pt/" (com barra), o resultado é "https://expressia.pt//callback" (barra dupla). NÃO é vector de segurança (o host fica fixo, não controlável; o callback valida o host via request.url e o ?next via allowlist ALLOWED_NEXT_PATHS). É robustez de input de configuração — barra dupla pode partir o matching exacto da rota /callback no Next.js (link de reset quebrado), nunca redireccionar para domínio hostil.'
    suggested_action: 'Opcional (nice-to-have): adicionar .replace(/\/$/, "") defensivo na leitura de SITE_URL. Mitigado por documentação em 3 sítios (JSDoc actions.ts:47-49, .env.example:83, runbook:253-254). Não bloqueante para PASS.'

waiver: { active: false }

code_intel_advisory: 'Blast radius baixo: getRequestOrigin() consumida apenas por signUpAction e resetPasswordAction (grep confirmado), ambos com cobertura de teste para os dois ramos. Sem fan-out adicional.'

security_notes: |
  Story de segurança avaliada com profundidade (Risk-Based Testing, Quinn Guardian).
  Defesa em profundidade verificada — 3 camadas independentes:
    1. SITE_URL (app, SEC-9) — elimina dependência de headers em prod.
    2. Allowlist Redirect URLs do Supabase Dashboard (camada externa).
    3. Open-redirect guard no callback (?next validado contra ALLOWED_NEXT_PATHS;
       host derivado de request.url, nunca de input do atacante).
  O vector password-reset-poisoning fica inviável em produção independentemente
  da allowlist, desde que SITE_URL esteja definida na Vercel Production
  (acção de configuração [EURICO] documentada no runbook §5, pré-soft-launch).

  Nota residual (config, não código): enquanto SITE_URL não estiver definida em
  Vercel Production, a app cai no fallback por headers e o vector residual de
  baixa probabilidade persiste (mitigado pela allowlist). A obrigatoriedade está
  documentada como bloqueador de configuração [EURICO] no runbook.

