      adicionada — implementação de getServiceDb() inalterada (lógica
      `?? `/throw intacta). Nenhuma protecção enfraquecida.

  - focus: 'AC4 — teste unitário getServiceDb'
    verdict: PASS
    evidence: >-
      getServiceDb.test.ts cobre os 3 casos exigidos (var definida; fallback
      SUPABASE_DB_URL; erro sem nenhuma — string PT-PT exacta) + 2 extra
      (não usa DATABASE_URL de runtime; precedência da var primária).
      vi.resetModules() em beforeEach + import dinâmico isolam o singleton
      _serviceDb. Não-tautológico: captura o URL passado ao driver postgres()
      mockado e asserta a fonte correcta. 22/22 db tests verde (5 novos
      incluídos).

  - focus: 'AC6 — [AUTO-DECISION] sem guard app-level de rate-limiting'
    verdict: PASS
    evidence: >-
      Justificação sólida e bem documentada (runbook §9): rate-limiter em-memória
      é inútil em serverless Vercel fra1 (estado não partilhado entre lambdas,
      não sobrevive a cold starts — falsa protecção); guard robusto exigiria
      Upstash/Redis fora do âmbito MVP. Limites nativos GoTrue cobrem IP+email;
      app comunica em PT-PT. Critério de reavaliação definido. Decisão coerente
      com o contexto soft-launch de baixo volume por convite.

