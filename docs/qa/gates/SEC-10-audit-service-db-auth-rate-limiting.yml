      undo/route.ts:183. Confirma a tabela da story byte-a-byte. db-shim.ts:76
      (wrapper) e client.ts:172 (definição) não são usos de utilizador.
      Todas as restantes ocorrências são imports, comentários "NUNCA
      getServiceDb()", anotações de tipo, ou mocks de teste. ZERO invocações em
      RSC/route handlers de utilizador/Server Actions fora das 3 excepções.

  - focus: 'PO-FIX-1 — reset de password anti-enumeration intacto'
    verdict: PASS
    evidence: >-
      git status e git diff de apps/web/src/app/(auth)/** = vazio (clean).
      resetPasswordAction (actions.ts:240-243) continua a colapsar todos os erros
      do GoTrue numa mensagem neutra ("Não foi possível enviar o email. Tenta
      novamente.") e devolve estado neutro em sucesso. NENHUM mapping de
      rate-limit introduzido no reset. Zero regressão de segurança.

  - focus: 'AC3 — guards JSDoc'
    verdict: PASS
    evidence: >-
      client.ts e db-shim.ts: guards enumeram as 3 excepções permanentes (jobs
      Inngest, incrementQuota D50, undo D-12C), com refs rastreáveis (CLAUDE.md
      §Multi-tenancy, ADR-003 §D6/§12.3/§12.5, SEC-10) e a string indexável
