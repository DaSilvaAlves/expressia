story: 'J-8'
slug: 'gmail-reply-thread'
title: 'Gmail reply — responder em thread a partir do Telegram (preview→confirm, threading RFC 2822)'
gate: PASS
status_reason: 'Primeira story da v1.2: reply a email em thread via Telegram. Threading correcto (In-Reply-To/References com o Message-ID RFC 2822 do original — NÃO o id interno da Gmail — + threadId no corpo do POST), preview puro/síncrono intacto (resolução corre em renderExternalWritePreview ANTES do Planner, nunca dentro de tool.preview()/execute()), prompt caching preservado (shortlist como prefixo da user message, provado por teste que a exclui de system/tools), parsing do from para endereço nu (Zod .email() satisfeito), zero-match honesto que o utilizador VÊ sem inventar threadId, guard multi-intent + os 4 Sets generalizados extendidos coerentemente, undo honesto (_noop + supressão do botão Cancelar), enum-sync 8 pontos completo. Restrições respeitadas: SEC-8/billing/família não tocados, sem any, sem novo scope OAuth, RLS/household_id intactos. Cobertura de testes material e verificada independentemente (31/31 GREEN no subconjunto crítico re-executado por @qa).'
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-03T02:55:00Z'

# Verificação independente (lane de revisão — NÃO autor). Leitura do código de
# produção real + re-execução de um subconjunto crítico + auditoria git.
