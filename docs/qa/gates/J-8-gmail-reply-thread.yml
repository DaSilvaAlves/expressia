fix_review_20260704:
  context: |
    O E2E live de AC17 [EURICO] REPROVOU e revelou um bug REAL de correcção/segurança
    em produção: perante "responde ao email euricojoseia@gmail.com que confirmo a
    presença", o bot respondeu e ENVIOU ao endereço ERRADO (info@cursoemvideo.com,
    newsletter da shortlist). Causa: o Planner (gpt-4o-mini) ignorou a instrução
    SÓ-PROMPT ("se nenhum candidato corresponder, não emitas responder_email") e casou
    o pedido com o candidato errado. O zero-match honesto [D-J8.2] só disparava com
    inbox VAZIO. A minha classificação anterior de ARCH-J8-1 como LOW assentava na
    premissa "nada é enviado" — o E2E provou-a FALSA para o vector de email explícito.
  verdict: PASS
  score: 9.0
  checks:
    - id: 'guard-fecha-vector'
      verdict: CORRECTO
      evidence: |
        checkExplicitReplyEmailGuard (run-agent.ts:186-208) corre DEPOIS de planner.plan()
        (L960) e ANTES de updateAfterPlanner/persist (L986) — o pós-check está no ponto
        certo (run-agent.ts:976-983). (a) email explícito não-correspondente → devolve
        reply_zero_match, plano descartado (não persiste, Planner não re-corre), nada enviado,
        mensagem NOMEIA o endereço pedido; (b) email explícito correspondente (case-insensitive
        após trim) → guard devolve null → preview normal; (c) referência por nome (sem email no
        texto) → extractExplicitEmailAddresses devolve [] → guard devolve null → inalterado.
        Fail-closed: se input.to é null/não-string, extractReplyToAddress→null → bloqueia.
    - id: 'determinismo'
      verdict: CORRECTO
      evidence: |
        A decisão de segurança é 100% string-comparison — não depende do LLM. Helper puro
        extractExplicitEmailAddresses (resolve-reply-target.ts:88-112): regex
        /[^\s<>@]+@[^\s<>@]+\.[^\s<>@]+/g + limpeza de bordos (strip de <("'` à esquerda,
        pontuação de fim de frase à direita) + toLowerCase + dedup preservando ordem. Robusto
        em formatos comuns (nu, em frase, entre <>/(), subaddressing +tag, domínio multi-nível,
        maiúsculas, pontuação agarrada). Provado por 7 testes do helper.
    - id: 'invariantes'
      verdict: CORRECTO
      evidence: |
        preview()/execute() das tools continuam puros (o guard vive no pipeline, não na tool);
        prompt caching intacto (nada mexido em system/tools do Planner — o guard lê plan.toolCalls
        e o prompt RAW, não injecta contexto); binding preview==envio preservado (single-shot: no
        mismatch descarta ANTES de persistir → confirm nunca reutiliza plano mau; no match persiste
        normal); SEC-8 HOLD e billing intactos (git diff: zero ficheiros withHousehold/client.ts/
        stripe/subscription); sem any (grep vazio nos ficheiros de produção); imports @/ e
        @meu-jarvis/*; PT-PT europeu.
    - id: 'regressao-zero'
      verdict: CORRECTO
      evidence: |
        O guard só actua sobre call.toolName === "responder_email"; enviar_email/Calendar/tarefas/
        finanças inalterados. Referência por nome inalterada. 16/16 run-agent (inclui guard
        multi-intent, enviar_email, Calendar) + 14/14 resolve-reply-target GREEN.
    - id: 'evidencia-real'
      verdict: CORRECTO
      evidence: |
        pnpm --filter @meu-jarvis/web test -- run resolve-reply-target run-agent → 30/30 GREEN
        (2 ficheiros). Logs de runtime confirmam AMBOS os caminhos de bloqueio: reason=
        "reply_zero_match" (inbox vazio) E reason="reply_explicit_email_mismatch" (guard
        determinístico) — nenhum envio em qualquer caso. pnpm --filter @meu-jarvis/web lint →
        exit 0 (No ESLint warnings or errors). pnpm --filter @meu-jarvis/web typecheck → exit 0.
    - id: 'teste-anti-regressao'
      verdict: CORRECTO
      evidence: |
        run-agent.test.ts:549-615 "FIX [D-J8.6] — email explícito que NÃO corresponde" reproduz
        EXACTAMENTE o cenário de prod: prompt euricojoseia@gmail.com, shortlist com
        info@cursoemvideo.com (inbox CHEIO, não vazio), Planner escolhe o errado → assere
        executed/direct_query, summary /não encontrei/i + contém "euricojoseia@gmail.com",
        Executor NOT called. O mock usa importActual → o helper REAL é exercitado (não stub).
        Par positivo (617-679): Pedro@Example.com (maiúsculas) casa case-insensitive → preview
        "Para: pedro@example.com". Sem o guard o 1.º teste devolveria preview e falharia.

# ARCH-J8-1 — REAVALIADO no fix 04/07. Fecha para o vector de email explícito.
arch_j8_1_reassessment: |
  ARCH-J8-1 (o vector demonstrado em prod) está FECHADO deterministicamente para o caso
  de EMAIL EXPLÍCITO: quando o utilizador escreve um endereço concreto, o guard força
  zero-match se o Planner não escolher exactamente esse endereço — nada é enviado, provado
  por teste que reproduz o cenário de produção. Débito residual (Opção B, v2): a resolução
  por NOME ("responde ao Pedro", sem email no texto) continua a depender do Planner para
  escolher o candidato certo — SEM enforcement determinístico. Mitigação existente: o
  preview-then-confirm mostra "Para: <email resolvido>" ao utilizador ANTES do envio, pelo
  que a referência por nome (fuzzy por natureza) é de risco genuinamente inferior ao email
  explícito (onde o utilizador deu o endereço exacto e esperava que fosse honrado). Fecho
  correcto do vector de maior risco.

