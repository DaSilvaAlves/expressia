notes: |
  Gate PASS (9,5/10, confiança alta) para a primeira story da epic v2 (Memória rica). Revisão em lane
  INDEPENDENTE (não autor): leitura dos 18 ficheiros de código real + re-execução de evidência com pnpm
  + auditoria git das restrições.

  O ponto de maior risco — PO-FIX-1 (ordering das RLS policies) — está CORRECTO e provado EMPIRICAMENTE.
  A subtileza: db-test aplica todas as migrations em ordem lexicográfica num só passo, a 0001 corre ANTES
  da 0034; se as policies vivessem só no DO-block da 0001 (guard `if exists jarvis_memories`), o guard
  avaliaria FALSE (a tabela ainda não existe) e a tabela ficaria SEM RLS → household B veria as memórias
  de A. A solução (policies na 0034 junto do CREATE TABLE para aplicação real + espelho na 0001 só para o
  check:rls estático que lê APENAS a 0001) é a de menor risco e está implementada com idempotência
  (drop policy if exists nos dois blocos). O teste RLS dedicado jarvis_memories.rls.test.ts (5/5 em Postgres
  real) é precisamente a prova de que as policies estão VIVAS — é a primeira tabela pós-0001 com teste RLS
  dedicado, pelo que também valida o padrão para futuras tabelas.

  Disciplina de âmbito exemplar: M-1 captura e guarda, mais nada. A tabela nasce fria (nenhum código a lê),
  não esquece, não infere — usar=M-2, brief=M-3, esquecer=M-4, inferência=v2.x, todos fora e explicitamente
  documentados. AC8 (ZERO alteração a run-agent.ts/confirm/route.ts/irreversible.ts) confirmado por git —
  memorizar é escrita interna reversível por SQL (delete_row), herda o caminho genérico de criar_tarefa sem
  tocar nos 4 Sets de escrita externa da J-7/J-8.

  Enum-sync 6 pontos completo e coerente; reverse() reversível de verdade; RLS/PII cuidada; restrições
  respeitadas na íntegra (SEC-8/billing/família não tocados, sem any, PT-PT, household_id + 4 policies +
  trigger com o helper canónico, gotcha J-2 evitado). 9/9 gates GREEN, o subconjunto crítico re-executado
  independentemente por @qa (check:rls / db-test / tools / classifier / planner-executor / lint / typecheck).

  Zero issues bloqueantes, zero CONCERNS. Score 95/100 (95 e não 100 apenas por prudência de que o E2E live
  ainda não correu — não por qualquer deficiência de código). A story fica PRONTA para @devops push + deploy
  0034 (idempotente, cria tabela + 4 policies numa só operação, SEM passo manual no SQL Editor) + E2E live
  [EURICO] (dizer "lembra-te que odeio reuniões antes das 10h" → confirmar row em jarvis_memories + testar
  undo 30s). AC11 (deploy + E2E) é precondição externa [EURICO]+@devops, NÃO gap de código — é o único item
  em aberto para transitar a Done.
