# Avaliação dos 7 pontos críticos do foco de review
critical_points:
  - id: 'PO-FIX-1-ordering-RLS'
    verdict: CORRECTO
    evidence: |
      As 4 policies estão em DOIS sítios com papéis distintos: (a) 0034 linhas 89-105 —
      DO-block $rls_jarvis_memories$ APÓS o CREATE TABLE (linha 50), com enable+force RLS
      e drop policy if exists antes de cada create policy (idempotente); dispara porque a
      tabela já existe neste ponto. (b) 0001 linhas 929-945 — DO-block idêntico com guard
      if exists (pg_tables jarvis_memories); no-op em runtime (0001 corre ANTES da 0034,
      tabela ainda não existe) mas fornece o TEXTO que o check:rls estático detecta.
      SEM dupla-criação: em db-test ambos correm em ordem lexicográfica no mesmo passo —
      o de 0001 é no-op (guard FALSE), o de 0034 aplica; o drop policy if exists garante
      idempotência mesmo se ambos disparassem. Prova empírica: db-test 210/210 com o teste
      RLS dedicado a passar significa que a RLS está viva (aplicada pela 0034).
  - id: 'teste-RLS-cross-household'
    verdict: CORRECTO
    evidence: |
      jarvis_memories.rls.test.ts (5 testes, Postgres real): (1) userA vê as suas 2 memórias
      ordenadas; (2) cross-household SELECT — userB vê 0 rows das memórias de A; (3) cross-household
      INSERT com household_id de A por userB → expectRlsBlocks true + admin confirma count 0
      (WITH CHECK rejeita); (4) cross-household UPDATE → result.count 0, admin confirma content
      inalterado ("Original"); (5) cross-household DELETE → result.count 0, admin confirma a row
      persiste (count 1). Bootstrap correcto (N2 do @po): seedTwoHouseholds() insere os users em
      auth.users ANTES da memória — FK created_by_user_id é on delete restrict. insertMemory helper
      local, admin() (sem RLS) prepara, asUser()/expectRlsBlocks() (RLS activo) verifica. Isolamento
      real provado, não mockado (lição SEC-8.1 respeitada).
  - id: 'ambito-sem-creep'
    verdict: CORRECTO
    evidence: |
      M-1 NÃO usa a memória (M-2), NÃO esquece (M-4), NÃO infere (v2.x). A tabela nasce "fria" —
      nenhum código a lê ainda (intencional, mesmo estado de jarvis_facts entre J-3 e agora).
      AC8 verificado por git: run-agent.ts/confirm/route.ts/irreversible.ts ausentes do diff;
      grep memorizar nesses 3 ficheiros = vazio. memorizar NÃO entra em EXTERNAL_WRITE_INTENTS/
      PREVIEW_RENDER_INTENTS/REUSE_PERSISTED_PLAN_INTENTS/IRREVERSIBLE_WRITE_TOOLS — segue o
      caminho genérico de criar_tarefa (escrita interna reversível por SQL). generate-daily-brief.ts
      não tocado. Disciplina de âmbito exemplar.
  - id: 'enum-sync-6-pontos'
    verdict: CORRECTO
    evidence: |
      (1) 0034 ADD VALUE IF NOT EXISTS memorizar; (2) agentIntentEnum agent.ts:84 (21) +
      memory.ts novo (jarvisMemories + tipos, exportado no index.ts); (3) INTENT_VALUES
      classifier/schemas.ts:91 (21) e explicitamente NÃO em READ_ONLY_INTENTS (linhas 82-91
      documentam a decisão); (4) TOOL_TO_INTENT_MAP planner-executor/schemas.ts:279
      (memorizar: memorizar); (5) classifier-system.ts v7→v8 (CLASSIFIER_SYSTEM_PROMPT_VERSION
      linha 39), tabela 21 intents com descrição que distingue lembra-ME (tarefa) de lembra-TE
      (memória), Exemplos 25/26 few-shots (memorizar não força confirmação + distinção criar_tarefa);
      (6) TOOL_DOMAIN_VALUES contracts.ts:55 memory (7) + JSDoc. Sem omissões — os sanity-checks
      automáticos (contracts.test.ts/schemas.test.ts/contract.test.ts/prompts.test.ts) leem o código
      real e passam com as contagens actualizadas.
  - id: 'reversibilidade-real'
    verdict: CORRECTO
    evidence: |
      memorizar.reverse(output) devolve { kind: 'delete_row', table: 'jarvis_memories', id: output.memoryId }
      (memorizar.ts:138-144) — reversível DE VERDADE, ao contrário de enviar_email/responder_email
      (que usam _noop porque são escrita externa irreversível). Padrão exacto de criar_tarefa (Story 3.8),
      infra de undo já provada em prod. 2 testes dedicados (delete_row com memoryId + assert que NÃO é _noop
      + id em formato UUID). execute() insere só (household_id, created_by_user_id, content) via
      ctx.db.execute(sql`...`) parametrizado — household_id/created_by_user_id de ctx (NUNCA do input),
      source no default 'explicit', RETURNING id, content; erro defensivo se não devolver row.
  - id: 'restricoes'
    verdict: CORRECTO
    evidence: |
      git diff confirma ZERO ficheiros SEC-8 (withHousehold/db-shim/client.ts) ou billing (stripe/subscription).
      Sem any nos ficheiros novos (execute usa cast tipado JarvisMemoriesInsertReturn, não any; test usa unknown +
      type guards em captureSqlText). Imports @/ (dentro do package) e relativos ../contracts para o boundary
      cross-package documentado (mesma excepção de tasks/index.ts). PT-PT europeu em comentários/erros/preview
      ("Vou lembrar-me disso: ..."). household_id + 4 policies + trigger set_updated_at (helper canónico, NÃO
      update_updated_at_column — gotcha J-2 evitado). Família removida: jarvis_memories é mais uma tabela
      household-scoped, tenancy intacta.
  - id: 'evidencia-real-pnpm'
    verdict: CORRECTO
    evidence: |
      Re-executado independentemente com pnpm (não npm): check:rls (32 tabelas / jarvis_memories coberta) +
      db-test (210/210, jarvis_memories.rls 5/5 em PG real) + tools (456) + classifier (92) + planner-executor (78)
