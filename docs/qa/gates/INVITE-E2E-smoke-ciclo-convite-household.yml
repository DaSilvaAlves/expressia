verdict_rationale: |
  CONCERNS (não PASS): o trabalho autónomo entregue está completo no seu scope, é factualmente
  correcto (cada path de UI/endpoint, nome de erro, mensagem PT-PT, código HTTP e limite de plano
  do runbook foi verificado contra o código de produção e bate à risca) e honesto (Article IV
  cumprido — tabela de evidência vazia, T2 deferida, zero invenção). Mas PASS exigiria todos os
  ACs cumpridos — AC6 fica aberto por desenho. CONCERNS exprime exactamente o estado: nada está
  mal feito, há trabalho rastreado pendente de acção externa do Eurico, e a story mantém-se
  InReview com blindagem PO-S1/FIX-3 contra Done prematuro.
  Não é FAIL: zero erros factuais no runbook, scope doc-only respeitado, gates de código intactos.
  Não é WAIVED: não há defeito a aceitar — o deferimento é planeado, não uma dívida.

