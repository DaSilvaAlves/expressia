score: 9.5
score_rationale: >-
  Story doc/config-only exemplar: queries byte-a-byte alinhadas com a fonte de
  verdade declarada (§6), regressão de risco PO-FIX-1 evitada com precisão
  cirúrgica, JSON válido e fiel ao precedente, acções [EURICO] explícitas e
  accionáveis, PT-PT correcto. -0.5 por dois NITs não-bloqueantes (forma da query
  p95 difere do painel 1 de grafana-epic1.json; preferência estilística
  utilizar>usar) e porque o valor entregue depende de activação manual posterior
  na UI Grafana (acção [EURICO]) — o artefacto não é garantidamente import-and-go
  no free-tier (limitação reconhecida e documentada na própria story).

nits_non_blocking:
  - id: 'DOC-001-NB'
    severity: low
    finding: >-
      A query p95 do alerta usa
      'histogram_quantile(0.95, rate(...bucket{...}[5m]))' (alinhada com §6 do
      runbook, a fonte de verdade da AC1), enquanto o painel 1 de
      grafana-epic1.json usa a forma mais robusta com agregação por label le:
      'histogram_quantile(0.95, sum(rate(...bucket{...}[5m])) by (le))'. Em
      ambientes multi-série, a ausência de 'sum(...) by (le)' pode produzir
      resultados incorrectos do quantil. NÃO bloqueia: o JSON cumpre a AC
      (espelhar a §6) e a inconsistência é pré-existente entre §6 e o painel.
    suggested_action: >-
      Em follow-up de higiene, harmonizar a §6 do runbook E o alerta para a forma
      'sum(rate(...)) by (le)' do painel 1, para consistência e correcção do
      quantil em produção multi-instância.
  - id: 'DOC-002-NB'
    severity: low
    finding: >-
      '## §10' do bloco §-prefix tem título 'Referências Story 2.11' enquanto '##
      10.' do bloco number-dot é 'Referências'. Coexistência por design (já assim
      antes da story), mas dois headings 'Referências' no mesmo ficheiro podem
      confundir uma leitura rápida.
    suggested_action: >-
      Opcional: qualificar a '## 10. Referências' como '## 10. Referências
      (Epic 1)' num futuro toque ao runbook.

