# ─────────────────────────────────────────────────────────────────────────────
# Pontos críticos verificados (leitura de código real, não só documentação)
# ─────────────────────────────────────────────────────────────────────────────
critical_checks:
  rls_isolation:
    verdict: PASS
    evidence: >-
      resolveMemoriesSection(db, householdId) (build-brief.ts:84-102) recebe o
      MESMO `db` RLS-scoped que buildBriefForHousehold obtém de withHousehold
      (generate-daily-brief.ts:109-126, role authenticated, 2ª rede RLS viva).
      getServiceDb() só toca telegram_link para identidade (linhas 90-96, SEC-10
      legítimo) — NUNCA os dados de domínio. Query com filtro app-level explícito
      `where household_id = ${householdId}::uuid` (defesa-em-profundidade, 1ª rede),
      idêntico a resolveCalendarSection/resolveEmailSection. Grep confirma: as 4
      ocorrências de getServiceDb/run-agent no ficheiro são todas comentários,
      zero invocações/imports. Isolamento de memórias entre households garantido.
  memory_llm_only_not_fallback:
    verdict: PASS
    evidence: >-
      buildFallbackBrief (synthesize.ts:264-303) NÃO referencia data.memories em
      lado nenhum — o template determinístico ignora memória por completo (AC5).
      Teste dedicado synthesize.test.ts:298-308 prova
      buildFallbackBrief(comMemórias) === buildFallbackBrief(semMemórias) e a
      ausência de "O que sabes sobre o Eurico"/"odeio reuniões". O bloco entra SÓ
      em serializeBriefData (linhas 211-215), como PRIMEIRO bloco, ANTES da agenda.
  mock_discriminates_by_sql:
    verdict: PASS
    evidence: >-
      makeDb (build-brief.test.ts:69-79) inspecciona sqlText(query) e encaminha
      queries com 'jarvis_memories' para memoryImpl; as restantes
      (google_oauth_tokens) para executeImpl. Sem isto, a 3ª query concorrente do
      Promise.all daria falso-positivo (calendar/email poluídos com linhas de
      memória, ou memories com forma de token). O teste M-3(a) assere ainda que a
      query emitida contém 'jarvis_memories' + 'limit 50' — a prova do AC8 é limpa,
      não passa pela razão errada. Nota should-fix do @po honrada byte-a-byte.
  pii_n1:
    verdict: PASS
    evidence: >-
      Catch de resolveMemoriesSection (build-brief.ts:97-101) é silencioso: devolve
      [], SEM qualquer log (nem { err }). content das memórias (PII sensível,
      comentário da migration 0034) nunca é tocado no caminho de erro nem em spans.
      Segue o padrão silencioso de resolveCalendarSection (sem logger acessível
      neste ponto). memoryCount NÃO foi adicionado ao GenerateDailyBriefSummary —
      opcional por design, omitido para não tocar generate-daily-brief.ts (SEC-8).
  scope_no_creep:
    verdict: PASS
    evidence: >-
      File List = 4 source/test do módulo brief + a story. ZERO migrations
      (jarvis_memories + 4 RLS policies já em prod desde M-1/0034). Sem novo intent
      (agent_intent/TOOL_TO_INTENT_MAP/TOOL_DOMAIN_VALUES intocados). run-agent.ts /
      planner.ts / generate-daily-brief.ts NÃO tocados (SEC-8 HOLD respeitado).
      Captura (M-1), motor (M-2), esquecer (M-4), retrieval (v2.x) fora de âmbito.
  duplication_not_import:
    verdict: PASS
    evidence: >-
      resolveMemoriesSection é função local privada de build-brief.ts, SQL idêntico
      ao de buildMemoryContext (M-2) mas SEM import de run-agent.ts — segue o
      precedente exacto de resolveCalendarSection/resolveEmailSection (leem
      google_oauth_tokens sem importar helpers de agent/). Contratos de retorno
      divergentes justificam (readonly string[] vs { content }[] do
      MemoryContextSchema). Menor blast radius = duplicação. Grep confirma zero
      imports cruzados agent↔brief.
  constraints:
    verdict: PASS
    evidence: >-
      Sem `any` em build-brief.ts (grep: 0 matches; interface JarvisMemoryRow
      tipada; casts `as never` só em mocks de teste). Imports @/ e @meu-jarvis/*.
      PT-PT europeu em bloco [O que sabes sobre o Eurico], regra do system prompt,
      comentários e testes. SEC-8 (withHousehold/db-shim/client) e billing intocados.

