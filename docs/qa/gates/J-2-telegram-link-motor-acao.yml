    finding: 'handleCallbackQuery não envolve executeUndo/executeConfirm em try/catch. Um runId malformado faria o cast ::uuid lançar PostgresError não-capturado → 500 → potencial reentrega do update pelo Telegram. Caso teórico: callback_data é sempre gerado pelos botões do próprio bot (UUID válido) e o canal exige identidade em telegram_link (só o Eurico).'
    suggested_action: 'Aceitável para J-2. Hardening futuro: validar runId como UUID em parseCallbackData (devolver null se inválido) ou envolver os callbacks num try/catch que responde 200 + mensagem neutra (paridade com handleTextMessage).'
