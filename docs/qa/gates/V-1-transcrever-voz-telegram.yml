schema: 1
story: 'V-1'
story_title: 'Transcrever nota de voz do Telegram e agir (STT input-first)'
gate: CONCERNS
status_reason: >-
  Primeira story da epic v2.x (Voz), input-first STT. Implementação exemplar e
  verdadeiramente mínima: message.voice → downloadVoiceFile (getFile + endpoint de
  ficheiros, fetch nativo) → GoogleSpeechProvider (STT v2 europe-west4, chirp_2,
  JWT RS256 à mão via node:crypto, zero dependência nova) → runAgentForHousehold
  (o MESMO ponto de entrada do texto, zero branch nova no motor). Privacidade
  sólida e provada no código real: o áudio (bytes) só existe em memória dentro do
  withSpan e nunca é escrito em disco/DB (teste NFR-V2 confirma 1 só SELECT de
  identidade, sem INSERT); a transcrição nunca é logada em claro (teste dedicado
  com IBAN); o segredo STT_SERVICE_ACCOUNT_JSON e o token/chave nunca são logados
  (só código de estado HTTP). Degradação graciosa completa (download/STT/vazio →
  sempre 200 + mensagem PT-PT, sem reentrega infinita). AC8 zero-migration/motor
  confirmado por git (só toca telegram/ + providers/stt/). Todos os 6 gates
  re-corridos por mim em verde com evidência real. CONCERNS (não-bloqueante) por um
  único ponto: a zona-morta 60-120 s — a guarda de duração da AC3 é 120 s mas o
  recognize síncrono do Google STT v2 aceita ~60 s, pelo que uma nota entre 60 e
  120 s passa a guarda, falha na STT e devolve "tenta de novo" (mensagem que sugere
  erro transitório quando o retry falhará sempre). Fix trivial e estritamente
  melhor (baixar VOICE_MAX_DURATION_S de 120 para 60), já antecipado pela AC11d.
