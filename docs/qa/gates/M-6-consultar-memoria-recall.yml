  no WHERE (1ª rede) + public.jarvis_memories schema-qualificado (PO-FIX-2); RLS
  suite (M-1) prova cross-household SELECT bloqueado contra Postgres real. Âmbito
  exemplar: input SÓ limit (query/topic descartados por teste), zero retrieval/
  tsvector/embeddings, cap 50 order by created_at desc (= buildMemoryContext M-2).
  Migration 0037 só-enum idempotente; check:rls EXIT 0 sem alteração de cobertura.
  M-6 é via de leitura NOVA e independente — run-agent.ts NÃO alterado
  (buildMemoryContext M-2 intacto). Tarefa 7 (deploy + E2E live) = externo
  [EURICO]+@devops, fora deste ciclo sem --push.
