  security:
    status: PASS
    notes: >-
      Tenancy/RLS (NFR5) fechada: listar_memorias.execute() usa EXCLUSIVAMENTE
      ctx.db (role authenticated, RLS 2ª rede) + household_id derivado de ctx no
      WHERE (1ª rede, defesa em profundidade), NUNCA getServiceDb() nem input.
      public.jarvis_memories schema-qualificado (PO-FIX-2, igual ao modelo M-2). A
      RLS suite jarvis_memories.rls.test.ts (M-1) prova cross-household SELECT
      bloqueado contra Postgres real via asUser() (userB não vê memórias de A) —
      db-test 210 GREEN. check:rls EXIT 0, jarvis_memories coberta. READ-ONLY
      determinístico impede escrita/undo indevido: sem side-effects, reverse()=
      sentinela _noop (410 Gone genérico). SEC-8 HOLD respeitado (withHousehold/
      db-shim/client.ts NÃO tocados — File List confirma). Billing intocado.
      PII (NFR12): content das memórias nunca em span attributes/logs de erro.
  performance:
    status: PASS
    notes: >-
      Query única SELECT com cap (input.limit ?? 50), order by created_at desc —
      mesma forma de buildMemoryContext (M-2). Sem retrieval semântico/tsvector/
      embeddings (rejeitado, brief D3). Prompt caching preservado: memoryContext
      (M-2) não é tocado; esta é uma via de leitura sob pedido explícito,
      independente da injecção automática. estimatedTokens=100 (= listar_tarefas,
      output até 50 memórias). Cost router / mecanismo read-only genérico reutilizado
      (zero código novo em run-agent.ts além da entrada no Set READ_ONLY_INTENTS).
  reliability:
    status: PASS
    notes: >-
      Leitura pura → sem estado a reverter. reverse() devolve sentinela inerte
      { delete_row, _noop, <uuid> } (R1b v1.1, mesmo pattern de listar_tarefas/
      listar_atrasadas); endpoint /undo trata _noop genericamente (410), sem
      alteração. isReadOnlyPlan salta preview mesmo com always_preview=true e não
      oferece undo (sem "Feito."+"Cancelar" sem sentido). buildSummaryText já chama
      renderReadToolResults genericamente antes do fallback. Migration 0037
      idempotente (ADD VALUE IF NOT EXISTS, sem uso na mesma tx) — db-test 210 GREEN
      (0037 aplica em Postgres real via Testcontainers).
  maintainability:
    status: PASS
    notes: >-
      Sem `any` (typecheck 10/10; isMemoryListOutput usa unknown + type guard). PO-FIX-1
      é o ponto de manutenção crítico e está correcto e testado: type guard desembrulha
      output.memories (objecto embrulhado), NÃO copia Array.isArray(output) de isEmailArray
      — teste de não-interferência com consultar_emails presente. Imports @/ e @meu-jarvis/*
      (excepção relativa documentada em memory/index.ts, herdada de tasks/index.ts). PT-PT
      europeu em copy (mensagens 0/1/N memórias), descrição da tabela de intents,
      comentários. Modelada em listar-atrasadas.ts + buildMemoryContext (M-2). Âmbito
      exemplar: retrieval/keyword/UI de gestão rejeitados explicitamente e ausentes do
      código (input só limit, provado por teste que descarta query/topic). Prompt v11 (24
      intents, +2 few-shots: Ex.31 positivo + Ex.32 negativo memorizar vs listar_memorias);
      regra 5 (needs_confirmation) inalterada — listar_memorias fora da lista de confirmação.

