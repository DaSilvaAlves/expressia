  em READ_ONLY_INTENTS e NÃO em ALWAYS_CONFIRM_INTENTS; isReadOnlyPlan
  (run-agent.ts L538-540) é genérico via isReadOnlyIntent e o gate de preview L598
  (`needs_confirmation || (alwaysPreview && !isReadOnlyPlan)`) faz a leitura saltar
  preview→confirm mesmo com always_preview=true; recall-memory-e2e Fase 1 prova
