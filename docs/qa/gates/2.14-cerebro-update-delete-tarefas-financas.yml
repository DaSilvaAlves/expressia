critical_audit_findings:
  - point: 'R-2.14.1 — undo de eliminação funciona (reinsert_row)'
    verdict: PASS
    detail: >-
      Branch reinsert_row em undo/route.ts:335-359 monta INSERT com id original
      + colunas do snapshot, dentro da whitelist ALLOWED_REVERSE_TABLES (validação
      em :324 antes do branch). AC2/AC4 emitem kind 'reinsert_row' (não
      restore_row) — confirmado em eliminar-tarefa.ts:238 e
      delete-finance-variable.ts:299. Testes de engine reais em undo.test.ts:244
      (tasks) e :295 (transactions) provam: id original preservado, colunas
      snake_case, apóstrofe escapada (O''Brien), enum (expense) e date
      (transaction_date) re-inseridos. Cobertura load-bearing presente.
  - point: 'PO-FIX-1 — snapshots em snake_case'
    verdict: PASS
    detail: >-
      Os 4 ficheiros de tool usam exclusivamente chaves snake_case nos snapshots
      (atualizar-tarefa.ts:197-223 due_date/completed_at; update-finance-variable.ts:220-243
      amount_cents/transaction_date/category_id/payment_method; eliminar-tarefa.ts
      buildSnapshot:144-163; delete-finance-variable.ts buildSnapshot:185-206).
      Espelha o precedente completar-tarefa.ts:232. Testes asseguram
      out.snapshot.created_by_user_id / due_date / is_recurrence_template.
  - point: 'Preview-then-confirm (FR4 / DP-2.14.B)'
    verdict: PASS
    detail: >-
      Eliminações forçam preview com confirmed !== true (eliminar-tarefa.ts:210,
      delete-finance-variable.ts:267) — early-return sem DELETE e sem reverse_op.
      Endpoint reutiliza flow previewToken Story 2.7 via outcomeNeedsConfirmation
      (route.ts:601-618). Ambiguidade múltiplos matches → lista cap 3
      (listTopMatches em delete-finance-variable.ts:168-183). Classifier força
      needs_confirmation=true para intents destrutivos (classifier-system.ts:57).
      Testado.
  - point: 'RLS NFR5 — ctx.db, nunca getServiceDb em código de utilizador'
    verdict: PASS
    detail: >-
      As 4 tools usam exclusivamente ctx.db. Resolução por id/fuzzy sem
      household_id explícito no WHERE replica o padrão gate-aprovado de
      completar-tarefa.ts (Done v1.3) e create-finance-variable.ts. Dupla rede
      activa via executeAtomic: 1.ª app-enforced, 2.ª withHousehold (SET LOCAL
      ROLE authenticated + claims → 104 policies vivas) em atomic.ts:133-149.
      O getServiceDb() no undo route é pré-existente (Story 2.8) e justificado
      (trigger de imutabilidade terminal — NFR9), não introduzido por esta story.
  - point: 'Atomicidade transaccional + expires_at (FR6)'
    verdict: PASS
    detail: >-
      Tools correm dentro de executeAtomic (transacção única, rollback em falha);
      reverse_op persistido com expires_at = now() + interval 30 seconds
      (atomic.ts:264). Padrão inalterado por esta story.
  - point: 'Segurança — SQL injection / PII'
    verdict: PASS
    detail: >-
      reinsert_row escapa strings (replace /'/g) e usa whitelist de tabela; o
      vector table é controlado pela whitelist. Valores das tools são
      parametrizados via sql template (ILIKE/desambiguadores). PII: spans seguem
      TOOL_SPAN_ATTRIBUTE_KEYS, householdId hashado (atomic.ts:34-37).
  - point: 'Migration 0026 + sync de enum (4 contratos)'
    verdict: PASS
    detail: >-
      0026 usa ALTER TYPE ADD VALUE IF NOT EXISTS (idempotente, append-only).
      Sincronização confirmada: agent.ts:62-65 (Drizzle), classifier
      schemas.ts:56-59 (INTENT_VALUES), planner schemas.ts:220-223
      (TOOL_TO_INTENT_MAP). O @dev corrigiu dessincronização real (D-2.14.2/3)
      apanhada pelo sanity-check Article IV — validado.
  - point: 'PT-PT exclusivo'
    verdict: PASS
    detail: >-
      Error messages, previews, few-shots e warnings em PT-PT europeu
      (actualizar, eliminar, transacção). Sem PT-BR. EUR com vírgula decimal via
      formatEuroCents.

