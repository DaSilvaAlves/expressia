top_issues:
  - id: 'REL-001'
    severity: low
    finding: 'Tree-shaking residual: registration.test.ts prova o registo das tools em Vitest (sem tree-shaking), mas não prova definitivamente que o turbopack de produção preserva o side-effect import em run-agent.ts/confirm/route.ts em runtime. Build passou mas não exercita o registo runtime.'
    suggested_action: 'Verificar registo runtime durante o E2E live (Tarefa 9.5): se o motor responder "tool não encontrada" ao "marca reunião", o side-effect foi eliminado — mitigar com referência explícita às tools ou allowlist sideEffects.'
  - id: 'REL-002'
    severity: low
    finding: 'Atomicidade residual aceite (Dev Notes): se a chamada HTTP ao Calendar tiver sucesso mas o passo Postgres seguinte (persistir reverse_op) falhar, o evento fica órfão sem registo local.'
    suggested_action: 'Aceitável para v1.1 (baixa frequência + undo 30s). Monitorizar em produção; reavaliar two-phase execution se a frequência subir.'
  - id: 'REQ-001'
    severity: low
    finding: 'Resolução de evento em reagendar usa o 1.º resultado (maxResults=5, orderBy=startTime) em vez de erro em ambiguidade ">5 candidatos" como a AC7 literalmente sugere; o preview mostra o query do utilizador, não o título do evento resolvido.'
    suggested_action: 'Mitigado por needs_confirmation obrigatório + undo 30s (single-user). Considerar mostrar o título do evento resolvido no preview em iteração futura para reduzir risco de reagendar o evento errado.'

