# CI/CD Pipeline — meu-jarvis (Expressia)
#
# Quality gates pre-merge bloqueantes para PRs e push em main.
# Trace: Story 1.2, PRD NFR5/NFR8/NFR17, Architecture §11.4, Epic 1 AC1 (< 5 min).
#
# Jobs:
#   - quality   : lint + typecheck + test (sequencial dentro do job; bloqueante)
#   - rls-gate  : aplica migrations num Postgres 16 efémero e corre check-rls-coverage (NFR5)
#   - build     : valida `pnpm build` Next.js (depende de quality para poupar minutos quando quality falha)
#
# Paralelismo: `quality` e `rls-gate` correm em paralelo. `build` espera por `quality`
# (decisão consciente — AC5 "onde possível"; evita gastar minutos de build quando quality falha).
# `build` corre em paralelo com `rls-gate` se `quality` passar primeiro.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY
# Detalhes em docs/runbooks/ci-setup.md.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs anteriores no mesmo PR para poupar minutos CI
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissões mínimas (princípio least privilege)
permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.3'

jobs:
  # -----------------------------------------------------------------------
  # quality — lint + typecheck + test (AC1, AC2, AC9)
  # -----------------------------------------------------------------------
  quality:
    name: Quality (lint + typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Configurar Node.js (com cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache adicional pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Typecheck (TypeScript strict)
        run: pnpm typecheck

      - name: Testes unitários (Vitest)
        run: pnpm test

  # -----------------------------------------------------------------------
  # rls-gate — RLS coverage estática + suite de testes RLS dinâmica (NFR5)
  # -----------------------------------------------------------------------
  # Story 1.4: o job agora faz dois níveis de validação:
  #   1. Coverage estática: `pnpm check:rls` valida que cada tabela com
  #      `household_id` tem 4 policies (SELECT/INSERT/UPDATE/DELETE).
  #   2. Suite dinâmica: `@meu-jarvis/db-test` sobe Postgres 16 efémero via
  #      Testcontainers e prova que o RLS bloqueia tudo cross-household.
  #
  # Já não precisamos do service `postgres:16` do GitHub Actions porque o
  # `db-test` package gere o seu próprio container via Testcontainers
  # (Docker disponível em ubuntu-latest por default). Deixamos a opção activa
  # para o step `db:migrate` que ainda assenta sobre uma DB real para validar
  # que as migrations aplicam contra um Postgres 16 limpo.
  rls-gate:
    name: RLS Coverage Gate (NFR5)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      DIRECT_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Configurar Node.js (com cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache adicional pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Aguardar Postgres ready (service do GH Actions)
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test; then
              echo "Postgres pronto."
              exit 0
            fi
            echo "A aguardar Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres não ficou ready em 60s." >&2
          exit 1

      # Provisiona o schema `auth` + roles Supabase ANTES das migrations de produção.
      # As migrations 0000/0001 referenciam `auth.uid()` e `auth.users` (Supabase
      # nativo) — não existem em Postgres vanilla. Decisão arquitectural deliberada:
      # bootstrap vive APENAS no harness de testes (ver packages/db-test/src/harness/bootstrap.ts),
      # não nas migrations. Aqui reusamos a mesma lógica via wrapper standalone para
      # garantir paridade entre CI e Testcontainers (single source of truth).
      - name: Provisionar schema auth + roles Supabase (stub Postgres CI)
        run: pnpm --filter @meu-jarvis/db-test db:bootstrap

      - name: Aplicar migrations contra Postgres 16 (smoke check de aplicação)
        run: pnpm --filter @meu-jarvis/db db:migrate

      - name: Verificar cobertura estática RLS (NFR5 — check-rls-coverage)
        run: pnpm check:rls

      - name: Suite dinâmica RLS (Story 1.4 — Testcontainers Postgres 16 efémero)
        run: pnpm --filter @meu-jarvis/db-test test

  # -----------------------------------------------------------------------
  # build — Next.js production build (AC4)
  # -----------------------------------------------------------------------
  # `needs: [quality]` é decisão consciente: AC5 pede paralelismo "onde possível";
  # encadear build após quality poupa minutos CI quando lint/typecheck/test falham.
  # `build` continua a correr em paralelo com `rls-gate` (que não tem dependência).
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Configurar Node.js (com cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache adicional pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Compilar Next.js (production build)
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
